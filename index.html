const GLOSSARY = {
  "Términos gramaticales": [
    {term:"Adjetivo",def:"Clase de palabras que acompañan al sustantivo con el que concuerdan en género y número. Indica cualidades del nombre o lo determina.",ex:"azul, dulce, inteligente"},
    {term:"Adjetivo adverbial",def:"Adjetivo con significado semejante al del adverbio relacionado (de tiempo, de modo…).",ex:"actual, presunto, frecuente"},
    {term:"Adjetivo calificativo",def:"Expresa cualidades del sustantivo. Puede ir antepuesto o pospuesto. Se clasifica en específico y explicativo.",ex:"azul, dulce, redondo, grande"},
    {term:"Adjetivo determinativo",def:"Señala al sustantivo y aporta información sobre cantidad, proximidad, etc. Puede ser cuantificativo o no cuantificativo.",ex:"diversas personas"},
    {term:"Adjetivo relacional",def:"Expresa el ámbito al que pertenece el sustantivo. Tiene base nominal, no admite anteposición ni gradación.",ex:"solar, policiaco, literario, estudiantil"},
    {term:"Adjunto",def:"Complemento no exigido por el verbo."},
    {term:"Adverbio",def:"Clase de palabras invariables con significado propio. Núcleo del grupo adverbial; modifica verbos, adjetivos u otros adverbios."},
    {term:"Adverbio de afirmación",def:"Denota afirmación, aceptación o asentimiento.",ex:"sí, claro, ciertamente"},
    {term:"Adverbio de cantidad",def:"Denota grado, frecuencia, duración o intensidad.",ex:"muy, bastante, mucho, poco, demasiado"},
    {term:"Adverbio de duda",def:"Adverbio modal que denota duda.",ex:"quizá(s), posiblemente"},
    {term:"Adverbio de foco",def:"Enfatiza o resalta ciertos segmentos.",ex:"incluso, solo"},
    {term:"Adverbio de lugar",def:"Denota lugar.",ex:"acá, allí, adónde, dondequiera"},
    {term:"Adverbio de manera",def:"Expresa la manera en que tiene lugar la situación del predicado.",ex:"posiblemente, agradablemente (-mente)"},
    {term:"Adverbio de negación",def:"Expresa significado negativo.",ex:"apenas, jamás, no, nunca, tampoco"},
    {term:"Adverbio de tiempo",def:"Denota tiempo.",ex:"antes, hoy, frecuentemente, entonces"},
    {term:"Adverbio demostrativo",def:"Señala lugar, tiempo o modo.",ex:"allí, ahora, así"},
    {term:"Afijo",def:"Morfema que se inserta en una palabra mediante derivación o flexión.",ex:"des-, -ero, -as, -aban"},
    {term:"Afijo derivativo",def:"Prefijo, infijo o sufijo que unido a un lexema crea una nueva palabra."},
    {term:"Afijo flexivo",def:"Morfema que modifica gramaticalmente una palabra (género, número, persona, tiempo…)."},
    {term:"Agente (papel temático)",def:"Expresión que designa quien realiza la acción verbal."},
    {term:"Agramaticalidad",def:"Irregularidad de una expresión que infringe alguna regla gramatical.",ex:"*Se ocurrió una idea brillante."},
    {term:"Alomorfo",def:"Variante formal de un morfema.",ex:"y/e, im-/i-/in-, dormir/duermo"},
    {term:"Ambigüedad",def:"Situación en que un enunciado puede interpretarse de diferentes formas.",ex:"Llevó al cole a su hija alegre."},
    {term:"Anáfora (cohesión)",def:"Relación entre una palabra y la información ya nombrada en el discurso."},
    {term:"Antonimia",def:"Relación de oposición entre significados. Tipos: graduales, recíprocos y complementarios.",ex:"grande/pequeño, comprar/vender, entrar/salir"},
    {term:"Aposición",def:"Sustantivo o grupo nominal que complementa a otro sustantivo para aclarar su significado.",ex:"Quedamos en la calle Pelayo."},
    {term:"Argumento",def:"Grupo o sintagma seleccionado por el predicado en función de su significado.",ex:"Lavar exige sujeto + CD."},
    {term:"Artículo",def:"Palabra variable que modifica a un grupo nominal y limita su extensión (definido) o no (indefinido)."},
    {term:"Aspecto gramatical",def:"Información sobre el desarrollo de la acción verbal. Perfectivo: acción acabada. Imperfectivo: inacabada."},
    {term:"Aspecto léxico",def:"Modalidad determinada por el significado del predicado. Tipos: actividades, realizaciones, logros y estados."},
    {term:"Atributo",def:"Complementa a los verbos copulativos. Concuerda en persona/número con el verbo y en género/número con el sujeto."},
    {term:"Caso (marca de función)",def:"Categoría que expresa funciones sintácticas mediante marcas flexivas. En español solo los pronombres.",ex:"lo, la (CD), le (CI)"},
    {term:"Catáfora",def:"Relación entre una palabra y la información que aún no ha sido mencionada.",ex:"Esto es lo que quería: un ascenso."},
    {term:"Categoría gramatical",def:"Clase de palabras cerrada con significado abstracto (tiempo, aspecto, modo, negación…).",ex:"determinantes, pronombres, preposiciones, conjunciones"},
    {term:"Categoría léxica",def:"Conjunto de palabras que el hablante puede seguir aumentando.",ex:"sustantivos, adjetivos, verbos, adverbios"},
    {term:"Clítico",def:"Palabra átona que se apoya en una tónica formando un grupo acentual.",ex:"Les pedí información."},
    {term:"Complemento agente",def:"Grupo preposicional con «por» en estructuras pasivas que designa quien realiza la acción."},
    {term:"Complemento circunstancial",def:"Adjunto que expresa circunstancias (lugar, tiempo, modo…). No exigido por el verbo."},
    {term:"Complemento de régimen",def:"Grupo preposicional exigido por algunos verbos para completar su significado."},
    {term:"Complemento directo",def:"Grupo nominal o preposicional (a) seleccionado por un verbo transitivo. Se pronominaliza con lo/la/los/las."},
    {term:"Complemento indirecto",def:"Grupo preposicional con «a» (o pronombre me/le/nos…) que indica receptor, destinatario o experimentador."},
    {term:"Complemento locativo argumental",def:"Complemento de ubicación exigido semánticamente por el predicado.",ex:"Vivo en Barcelona. / Guarda los calcetines en el cajón."},
    {term:"Complemento predicativo",def:"Grupo adjetival que acompaña a verbos predicativos y concuerda con el sujeto o el CD.",ex:"Compró caros los muebles."},
    {term:"Composición",def:"Voz formada por la unión de dos o más términos.",ex:"limpiaparabrisas, sacacorchos"},
    {term:"Concordancia",def:"Relación entre la información morfológica (género, número, persona) de dos palabras relacionadas."},
    {term:"Condicional simple",def:"Tiempo relativo del indicativo: sitúa la acción en un punto posterior a otro pasado o en marco hipotético.",ex:"Dijo que volvería. / Si lo supiera te lo diría."},
    {term:"Conector discursivo",def:"Palabra o grupo de palabras que une partes del discurso."},
    {term:"Conjunción adversativa",def:"Une oraciones cuyas ideas se oponen.",ex:"pero, mas, sino que"},
    {term:"Conjunción causal",def:"Expresa relación de causa.",ex:"porque, ya que, puesto que"},
    {term:"Conjunción concesiva",def:"Indica un obstáculo sin impedirlo.",ex:"aunque"},
    {term:"Conjunción condicional",def:"Señala una condición.",ex:"si"},
    {term:"Conjunción copulativa",def:"Suma oraciones.",ex:"y, e, ni"},
    {term:"Conjunción disyuntiva",def:"Presenta varias opciones.",ex:"o, u, o bien"},
    {term:"Connotación",def:"Significado subjetivo de una palabra.",ex:"perro, ocaso…"},
    {term:"Coordinación",def:"Unión de oraciones en el mismo nivel jerárquico mediante nexos coordinantes."},
    {term:"Cuantificador",def:"Elemento que expresa número, cantidad o grado.",ex:"determinante numeral"},
    {term:"Cultismo",def:"Vocablo de lengua clásica que no pasa por las transformaciones fonéticas de las voces populares.",ex:"álbum, déficit, hábitat, médium"},
    {term:"Deixis",def:"Alusión a elemento del discurso anterior (anafórico) o posterior (catafórico) mediante pronombres, adverbios…"},
    {term:"Demostrativo",def:"Elemento que señala un referente en el contexto. Puede ser adjetivo, determinante o pronombre."},
    {term:"Dequeísmo",def:"Uso agramatical de «de que» donde no se admite.",ex:"*Creo de que vendrá."},
    {term:"Desinencia",def:"Morfema flexivo de un verbo."},
    {term:"Determinante definido",def:"Limita la extensión del nombre a entidades identificables por los interlocutores.",ex:"el libro, estas carpetas, nuestro amigo"},
    {term:"Determinante indefinido",def:"Limita la extensión del nombre a entidades no identificables.",ex:"muchos niños, poca gente, cualquier momento"},
    {term:"Discurso directo",def:"El hablante reproduce textualmente las palabras de otro."},
    {term:"Discurso indirecto",def:"El hablante reproduce lo enunciado por otro mediante la deixis."},
    {term:"Elipsis",def:"Omisión de una parte del enunciado sobreentendida por el contexto."},
    {term:"Especificativo",def:"Modificador del sustantivo que restringe una propiedad del referente del SN.",ex:"Eligió la taza blanca."},
    {term:"Explicativo",def:"Modificador del sustantivo que aumenta su intensión sin restringirlo.",ex:"Admiraba la hermosa puesta de sol."},
    {term:"Familia léxica",def:"Grupo de términos resultantes de añadir prefijos y sufijos a un lexema.",ex:"guerra, guerrero, guerrear, guerrilla"},
    {term:"Flexión",def:"Alteración de palabras mediante marcas de género, número, persona, tiempo, etc.",ex:"rápido/rápida/rápidos/rápidas"},
    {term:"Forma no personal",def:"Forma verbal que no expresa persona ni número.",ex:"infinitivo, gerundio, participio: amar, amando, amado"},
    {term:"Forma personal",def:"Forma verbal conjugada con desinencia de tiempo, aspecto, modo, número y persona.",ex:"cantarán, hemos cantado"},
    {term:"Futuro simple",def:"Tiempo absoluto del indicativo: referencia a situaciones posteriores al momento de la enunciación.",ex:"El próximo año iremos a Finlandia."},
    {term:"Laísmo",def:"Uso incorrecto de la/las (CD) en función de CI femenino.",ex:"*La dije que viniera."},
    {term:"Leísmo",def:"Uso de le/les (CI) en función de CD masculino.",ex:"Le vi ayer. (en vez de Lo vi)"},
    {term:"Paciente (papel temático)",def:"Entidad que recibe o experimenta la acción sin ser agente de ella."},
    {term:"Parasíntesis",def:"Adición simultánea de prefijo y sufijo a una base sin que existan las formas intermedias.",ex:"embalaje"},
    {term:"Perífrasis verbal",def:"Verbo auxiliar + verbo auxiliado en forma no personal (infinitivo, gerundio o participio)."},
    {term:"Perífrasis verbal aspectual",def:"Expresa la fase o desarrollo de la acción.",ex:"llevar + gerundio, empezar a + inf."},
    {term:"Perífrasis verbal modal",def:"Expresa posibilidad, obligación o necesidad.",ex:"deber + inf., tener que + inf., poder + inf."},
    {term:"Pluralia tantum",def:"Palabras que solo existen en plural.",ex:"nupcias, víveres, natillas, alrededores, celos"},
    {term:"Polisemia",def:"Propiedad de una palabra de tener varios significados relacionados."},
    {term:"Queísmo",def:"Omisión incorrecta de una preposición necesaria antes de «que».",ex:"*Estoy seguro que vendrá."},
    {term:"Se dativo aspectual",def:"«Se» que añade matiz de completitud a la acción verbal.",ex:"Se comió todo el pastel."},
    {term:"Se impersonal",def:"«Se» que introduce oraciones sin sujeto. Verbo en 3.ª persona singular.",ex:"Se trabaja mucho aquí."},
    {term:"Se pasivo reflejo",def:"«Se» que forma la pasiva refleja. El verbo concuerda con el sujeto paciente.",ex:"Se venden pisos."},
    {term:"Se pronominal",def:"«Se» parte de un verbo pronominal.",ex:"arrepentirse, jactarse"},
    {term:"Se recíproco",def:"«Se» que indica que varios sujetos realizan y reciben la acción mutuamente.",ex:"Se abrazaron."},
    {term:"Se reflexivo",def:"«Se» que indica que el sujeto realiza y recibe la acción sobre sí mismo.",ex:"Se peina."},
    {term:"Singularia tantum",def:"Palabras que solo existen en singular.",ex:"caos, sed, tez, cenit, salud"},
    {term:"Sintagma adjetival",def:"Grupo cuyo núcleo es un adjetivo."},
    {term:"Sintagma adverbial",def:"Grupo cuyo núcleo es un adverbio."},
    {term:"Sintagma nominal",def:"Grupo cuyo núcleo es un sustantivo."},
    {term:"Sintagma preposicional",def:"Grupo formado por preposición + término."},
    {term:"Sintagma verbal",def:"Grupo cuyo núcleo es un verbo."},
    {term:"Sujeto tácito",def:"Sujeto no expreso recuperable por la desinencia verbal o el contexto.",ex:"[Yo] Voy al cine."},
    {term:"Verbo auxiliar",def:"Verbo en tiempos compuestos, voz pasiva y perífrasis. Pierde parte de su significado léxico.",ex:"haber, ser"},
    {term:"Verbo copulativo",def:"Une sujeto y atributo sin aportar significado pleno.",ex:"ser, estar, parecer"},
    {term:"Verbo inacusativo",def:"Verbo intransitivo cuyo argumento único es interno (tema/paciente). No admite pasiva perifrástica.",ex:"llegar, aparecer, nacer, morir"},
    {term:"Verbo inergativo",def:"Verbo intransitivo cuyo argumento único es externo (agente).",ex:"trabajar, nadar, cantar"},
    {term:"Verbo irregular",def:"No mantiene las formas del paradigma regular. Irregularidades vocálicas, consonánticas o mixtas.",ex:"poner→pongo, ir→voy, ser→fuimos"},
    {term:"Verbo modal",def:"Expresa modalidad (posibilidad, obligación, necesidad).",ex:"poder, deber, querer, soler"},
    {term:"Verbo predicativo",def:"Tiene significado léxico pleno y no funciona como cópula.",ex:"correr, escribir, dormir"},
    {term:"Verbo pronominal",def:"Se conjuga obligatoriamente con pronombre clítico.",ex:"arrepentirse, jactarse, quejarse"},
    {term:"Verbo transitivo",def:"Selecciona un complemento directo.",ex:"comer, escribir, romper"},
    {term:"Vocativo",def:"Elemento que apela al interlocutor, separado por comas del resto de la oración.",ex:"María, ven aquí."},
  ],
  "Sociolingüística": [
    {term:"Argot",def:"Variedad lingüística de grupo cerrado, de carácter críptico.",ex:"jerga delictiva"},
    {term:"Bilingüismo",def:"Situación en que un hablante o comunidad usa con competencia dos lenguas."},
    {term:"Diglosia",def:"Coexistencia de dos variedades lingüísticas con funciones socialmente diferenciadas (una de prestigio y una coloquial)."},
    {term:"Glotofobia",def:"Discriminación o rechazo hacia personas por razón de su lengua o variedad lingüística."},
    {term:"Idiolecto",def:"Variedad lingüística propia e individual de cada hablante."},
    {term:"Jerga",def:"Variedad lingüística de un grupo profesional o social.",ex:"jerga médica, jerga jurídica"},
    {term:"Lengua minorizada",def:"Lengua que ocupa una posición subordinada en una comunidad bilingüe o diglósica."},
    {term:"Prejuicio lingüístico",def:"Actitud negativa o valoración desfavorable hacia una lengua o variedad."},
    {term:"Registro formal",def:"Variedad diafásica usada en situaciones de mayor distancia social o protocolarias."},
    {term:"Registro informal",def:"Variedad diafásica usada en situaciones de confianza o cercanía."},
    {term:"Variedades diafásicas",def:"Variaciones en el uso de la lengua según la situación comunicativa (registro)."},
    {term:"Variedades diatópicas",def:"Variaciones geográficas o dialectales.",ex:"español peninsular, español de América"},
    {term:"Variedades diastráticas",def:"Variaciones sociales según el nivel sociocultural del hablante.",ex:"nivel culto, medio, vulgar"},
    {term:"Estereotipo lingüístico",def:"Valoración social compartida sobre una forma lingüística, con conciencia de que es un marcador social."},
  ],
  "Figuras retóricas": [
    {term:"Aliteración",def:"Repetición de sonidos iguales o similares en palabras próximas.",ex:"'Con el ala aleve del leve abanico'"},
    {term:"Anadiplosis",def:"Repetición al inicio de un verso del final del verso anterior.",ex:"'Todo pasa y todo queda, / pero lo nuestro es pasar'"},
    {term:"Anáfora (retórica)",def:"Repetición de palabras al inicio de varios versos o frases consecutivos."},
    {term:"Antítesis",def:"Contraposición de dos ideas de significado opuesto.",ex:"'Ayer naciste y morirás mañana'"},
    {term:"Apóstrofe",def:"Interrupción para dirigirse a alguien ausente o a una abstracción.",ex:"'¡Oh muerte!, ven callada'"},
    {term:"Asíndeton",def:"Omisión de conjunciones entre elementos de una enumeración.",ex:"'Vine, vi, vencí'"},
    {term:"Epanadiplosis",def:"Comenzar y terminar un verso con la misma palabra.",ex:"'Verde que te quiero verde'"},
    {term:"Epíteto",def:"Adjetivo que expresa una cualidad inherente al sustantivo.",ex:"'la blanca nieve', 'el fiero león'"},
    {term:"Eufemismo",def:"Sustitución de una expresión tabú por otra más suave.",ex:"'persona de la tercera edad'"},
    {term:"Hipérbaton",def:"Alteración del orden sintáctico habitual.",ex:"'Del salón en el ángulo oscuro…'"},
    {term:"Hipérbole",def:"Exageración de una realidad con fines expresivos.",ex:"'Érase un hombre a una nariz pegado'"},
    {term:"Interrogación retórica",def:"Pregunta que no espera respuesta sino que tiene valor afirmativo o expresivo."},
    {term:"Ironía",def:"Expresión de lo contrario de lo que se dice, con intención crítica o humorística."},
    {term:"Lítote",def:"Afirmación de algo mediante la negación de lo contrario.",ex:"'No está mal' (= está bien)"},
    {term:"Metáfora",def:"Identificación directa entre un término real y uno imaginario sin nexo comparativo.",ex:"'La vida es sueño'"},
    {term:"Metonimia",def:"Sustitución de un término por otro basada en contigüidad o causa-efecto.",ex:"'Leer a Lorca'"},
    {term:"Oxímoron",def:"Unión de dos palabras con significados contradictorios.",ex:"'un silencio ensordecedor'"},
    {term:"Paradoja",def:"Combinación de ideas aparentemente contradictorias que encierran una verdad.",ex:"'Vivo sin vivir en mí'"},
    {term:"Paralelismo",def:"Repetición de una misma estructura sintáctica en varios versos o frases."},
    {term:"Personificación",def:"Atribución de cualidades humanas a seres inanimados o abstractos.",ex:"'El viento gime en los árboles'"},
    {term:"Polisíndeton",def:"Repetición de conjunciones entre los elementos de una enumeración.",ex:"'Y el cielo y la tierra y el mar'"},
    {term:"Pleonasmo",def:"Adición de palabras redundantes que refuerzan expresivamente el mensaje.",ex:"'Lo vi con mis propios ojos'"},
    {term:"Quiasmo",def:"Estructura en que los elementos de dos grupos aparecen en orden invertido (ABBA)."},
    {term:"Símil",def:"Relación explícita entre dos realidades mediante nexo comparativo.",ex:"'Tus ojos son como el mar'"},
    {term:"Sinestesia",def:"Combinación de sensaciones de sentidos diferentes.",ex:"'el sonido amarillo'"},
    {term:"Zeugma",def:"Elisión de un elemento que ya apareció, aplicándolo a varios miembros."},
  ],
  "Términos literarios": [
    {term:"Analepsis (flashback)",def:"Salto narrativo hacia el pasado dentro de una narración en otro tiempo."},
    {term:"Anagnórisis",def:"Reconocimiento de la identidad de un personaje en el momento culminante."},
    {term:"Estilo directo",def:"Reproducción literal de las palabras de un personaje, entre comillas o tras guión.",ex:"—Vendré mañana —dijo María."},
    {term:"Estilo indirecto",def:"Reproducción de las palabras de un personaje transmitidas por el narrador.",ex:"María dijo que vendría al día siguiente."},
    {term:"Estilo indirecto libre",def:"Fusión de narrador y personaje sin verbos introductores ni marcas tipográficas."},
    {term:"Flujo de conciencia",def:"Técnica que reproduce el pensamiento interior sin estructura lógica aparente."},
    {term:"In media res",def:"Técnica que comienza la obra en medio de la acción."},
    {term:"Intertextualidad",def:"Relación que un texto mantiene con otros textos, explícita o implícita."},
    {term:"Monólogo interior",def:"Discurso del personaje que reproduce su pensamiento en primera persona sin interlocutor."},
    {term:"Narrador externo omnisciente",def:"Fuera de la historia; accede a los pensamientos y sentimientos de todos los personajes."},
    {term:"Narrador externo observador",def:"Fuera de la historia; solo narra lo que observa desde fuera."},
    {term:"Narrador interno protagonista",def:"Cuenta su propia historia en primera persona."},
    {term:"Narrador interno testigo",def:"Personaje secundario que narra lo que observa del protagonista."},
    {term:"Prolepsis (flashforward)",def:"Salto narrativo hacia el futuro, anticipando hechos posteriores."},
    {term:"Yo poético",def:"Voz lírica que expresa sentimientos en la poesía; no equivale al autor."},
  ],
  "Tópicos literarios": [
    {term:"Amor post mortem",def:"El amor que vence a la muerte; la amada persiste en el recuerdo.",ex:"Coplas de Jorge Manrique"},
    {term:"Aurea mediocritas",def:"Elogio de la vida sencilla y moderada.",ex:"Horacio"},
    {term:"Beatus ille",def:"Elogio de la vida retirada en el campo.",ex:"Fray Luis de León"},
    {term:"Carpe Diem",def:"'Aprovecha el día': exhortación a disfrutar el presente porque la vida es breve.",ex:"Horacio; Garcilaso"},
    {term:"Contemptus Mundi",def:"Desprecio del mundo terrenal frente a los valores espirituales."},
    {term:"Descriptio Puellae",def:"Descripción idealizada de la belleza femenina según un canon fijo.",ex:"Poesía petrarquista"},
    {term:"Donna angelicata",def:"La mujer idealizada como ser angélico que eleva espiritualmente al amante.",ex:"Dante, Petrarca"},
    {term:"Locus Amoenus",def:"Lugar ideal y apacible donde transcurre la poesía amorosa.",ex:"Garcilaso: 'Égloga I'"},
    {term:"Omnia mors aequat",def:"La muerte iguala a todos sin distinción de rango o fortuna."},
    {term:"Tempus Fugit",def:"'El tiempo vuela': el tiempo pasa imparable.",ex:"Virgilio; Garcilaso"},
    {term:"Theatrum mundi",def:"El mundo como teatro en el que los hombres representan un papel.",ex:"Calderón"},
    {term:"Ubi sunt",def:"'¿Dónde están?': lamento por la fugacidad de lo glorioso.",ex:"Jorge Manrique"},
    {term:"Vanitas Vanitatum",def:"'Vanidad de vanidades': todo es efímero en el mundo terrenal.",ex:"Quevedo"},
    {term:"Vita Flumen",def:"La vida como río que fluye hacia el mar (la muerte).",ex:"Jorge Manrique"},
  ],
  "Métrica": [
    {term:"Arte mayor",def:"Versos de más de 8 sílabas.",ex:"endecasílabo (11), alejandrino (14)"},
    {term:"Arte menor",def:"Versos de 8 sílabas o menos.",ex:"octosílabo (8), heptasílabo (7)"},
    {term:"Verso libre",def:"Verso sin metro ni rima fija."},
    {term:"Verso suelto",def:"Verso con metro fijo pero sin rima."},
    {term:"Rima consonante",def:"Coinciden todos los sonidos desde la última vocal tónica.",ex:"amor / dolor"},
    {term:"Rima asonante",def:"Solo coinciden las vocales desde la última vocal tónica.",ex:"alma / casa"},
    {term:"Romance",def:"Serie de versos octosílabos con rima asonante en los pares."},
    {term:"Soneto",def:"14 versos endecasílabos: dos cuartetos y dos tercetos."},
    {term:"Silva",def:"Combinación libre de endecasílabos y heptasílabos con rima consonante."},
    {term:"Serventesio",def:"4 versos endecasílabos con rima ABAB."},
  ],
};

function glAllTerms(){
  const all=[];
  for(const cat in GLOSSARY) GLOSSARY[cat].forEach(e=>all.push({...e,cat}));
  return all;
}

let glTab='list', glSearch='', glFcIdx=0, glFcFlipped=false, glFcOrder=[], glFcSeen=new Set();
let testN=10, testQs=[], testQIdx=0, testScore=0, testAnswered=false, testDone=false;

function bGlossary(){
  return `<div id="gl-app">
    <div class="gl-tabs">
      <button class="gl-tab ${glTab==='list'?'active':''}" onclick="glSetTab('list')">📖 Glosario</button>
      <button class="gl-tab ${glTab==='fc'?'active':''}" onclick="glSetTab('fc')">🃏 Flashcards</button>
      <button class="gl-tab ${glTab==='test'?'active':''}" onclick="glSetTab('test')">✏️ Test</button>
    </div>
    <div id="gl-panel-list" class="gl-panel ${glTab==='list'?'active':''}">
      ${glRenderList()}
    </div>
    <div id="gl-panel-fc" class="gl-panel ${glTab==='fc'?'active':''}">
      ${glRenderFC()}
    </div>
    <div id="gl-panel-test" class="gl-panel ${glTab==='test'?'active':''}">
      ${glRenderTest()}
    </div>
  </div>`;
}

function glSetTab(t){
  glTab=t;
  if(t==='fc'&&glFcOrder.length===0) glInitFC();
  const app=document.getElementById('gl-app');
  if(!app) return;
  app.querySelectorAll('.gl-tab').forEach((b,i)=>{
    b.classList.toggle('active',['list','fc','test'][i]===t);
  });
  app.querySelector('#gl-panel-list').className='gl-panel'+(t==='list'?' active':'');
  app.querySelector('#gl-panel-fc').className='gl-panel'+(t==='fc'?' active':'');
  app.querySelector('#gl-panel-test').className='gl-panel'+(t==='test'?' active':'');
  if(t==='fc'){app.querySelector('#gl-panel-fc').innerHTML=glRenderFC();}
  if(t==='test'){app.querySelector('#gl-panel-test').innerHTML=glRenderTest();}
}

function glRenderList(){
  const q=glSearch.toLowerCase().trim();
  let h=`<input class="gl-search" id="gl-search-inp" placeholder="Buscar término…" value="${glSearch.replace(/"/g,'&quot;')}" oninput="glDoSearch(this.value)">`;
  for(const cat in GLOSSARY){
    const items=GLOSSARY[cat].filter(e=>!q||e.term.toLowerCase().includes(q)||(e.def&&e.def.toLowerCase().includes(q)));
    if(!items.length) continue;
    h+=`<div class="gl-cat"><div class="gl-cat-title">${cat}</div>`;
    items.forEach((e,i)=>{
      const uid=`gl_${cat.replace(/\W/g,'_')}_${i}`;
      h+=`<div class="gl-entry" id="${uid}">
        <div class="gl-entry-head" onclick="glToggle('${uid}')">
          <span class="gl-entry-term">${e.term}</span>
          <span class="gl-entry-arrow">▾</span>
        </div>
        <div class="gl-entry-body">
          <div class="gl-def">${e.def||'<em>Sin definición disponible.</em>'}</div>
          ${e.ex?`<div class="gl-ex">${e.ex}</div>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  return h;
}

function glDoSearch(v){glSearch=v;const p=document.getElementById('gl-panel-list');if(p)p.innerHTML=glRenderList();}
function glToggle(uid){const el=document.getElementById(uid);if(el)el.classList.toggle('open');}

function glInitFC(){
  const all=glAllTerms();
  glFcOrder=all.map((_,i)=>i).sort(()=>Math.random()-.5);
  glFcIdx=0;glFcFlipped=false;glFcSeen=new Set();
}
function glShuffle(){
  glFcOrder=glFcOrder.sort(()=>Math.random()-.5);
  glFcIdx=0;glFcFlipped=false;glFcSeen=new Set();
  const p=document.getElementById('gl-panel-fc');if(p)p.innerHTML=glRenderFC();
}
function glRenderFC(){
  const all=glAllTerms();
  if(!glFcOrder.length) glInitFC();
  const total=glFcOrder.length;
  const entry=all[glFcOrder[glFcIdx]];
  glFcSeen.add(glFcIdx);
  const pct=Math.round(glFcSeen.size/total*100);
  const dots=glFcOrder.slice(0,Math.min(40,total)).map((_,i)=>{
    const cls=i===glFcIdx?'fc-dot current':glFcSeen.has(i)?'fc-dot seen':'fc-dot';
    return `<span class="${cls}"></span>`;
  }).join('');
  return `<div class="fc-progress">
    <div class="fc-prog-bar"><div class="fc-prog-fill" style="width:${pct}%"></div></div>
    <div class="fc-prog-txt">${glFcSeen.size}/${total}</div>
  </div>
  <div class="fc-card-wrap" onclick="glFlipFC()">
    <div class="fc-card${glFcFlipped?' flipped':''}" id="fc-card">
      <div class="fc-face fc-front">
        <div class="fc-label">${entry.cat}</div>
        <div class="fc-term">${entry.term}</div>
        <div class="fc-hint">Pulsa para ver la definición</div>
      </div>
      <div class="fc-face fc-back">
        <div class="fc-label">Definición</div>

    <button class="fc-shuffle-btn" onclick="glShuffle()">⇄ Barajar tarjetas</button>
  </div>`;
}
function glFlipFC(){glFcFlipped=!glFcFlipped;const c=document.getElementById('fc-card');if(c)c.classList.toggle('flipped',glFcFlipped);}
function glNavFC(d){
  glFcIdx=Math.max(0,Math.min(glFcOrder.length-1,glFcIdx+d));
  glFcFlipped=false;glFcSeen.add(glFcIdx);
  const p=document.getElementById('gl-panel-fc');if(p)p.innerHTML=glRenderFC();
}

function glBuildTest(n){
  const all=glAllTerms().filter(e=>e.def&&e.def.length>20);
  const shuffled=all.sort(()=>Math.random()-.5);
  testQs=shuffled.slice(0,n).map(entry=>{
    const mode=Math.random()<0.5?'def2term':'term2def';
    const dis=all.filter(e=>e.term!==entry.term).sort(()=>Math.random()-.5).slice(0,3);
    if(mode==='term2def'){
      const opts=[entry.def,...dis.map(d=>d.def)].sort(()=>Math.random()-.5);
      return {q:`¿Cuál es la definición de «${entry.term}»?`,correct:entry.def,options:opts,expl:entry.ex?`Ej.: ${entry.ex}`:''};
    } else {
      const short=entry.def.length>120?entry.def.slice(0,120)+'…':entry.def;
      const opts=[entry.term,...dis.map(d=>d.term)].sort(()=>Math.random()-.5);
      return {q:`¿A qué término corresponde?\n«${short}»`,correct:entry.term,options:opts,expl:entry.ex?`Ej.: ${entry.ex}`:''};
    }
  });
  testQIdx=0;testScore=0;testAnswered=false;testDone=false;
  const p=document.getElementById('gl-panel-test');if(p)p.innerHTML=glRenderTest();
}
function glRenderTest(){
  if(!testQs.length){
    return `<div class="test-setup">
      <p>Selecciona cuántas preguntas quieres:</p>
      <div class="test-n-sel">
        ${[5,10,20,30].map(n=>`<button class="test-n-btn${testN===n?' sel':''}" onclick="testSetN(${n})">${n}</button>`).join('')}
      </div>
      <button class="btn bp" onclick="glBuildTest(testN)">Empezar →</button>
    </div>`;
  }
  if(testDone){
    const pct=Math.round(testScore/testQs.length*100);
    const msg=pct>=90?'¡Excelente!':pct>=70?'¡Bien!':pct>=50?'Puedes mejorar.':'Sigue repasando.';
    return `<div class="test-result">
      <div class="score">${testScore}/${testQs.length}</div>
      <div class="score-lbl">${pct}%</div>
      <div class="msg">${msg}</div>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button class="btn bp" onclick="glBuildTest(testQs.length)">Repetir</button>
        <button class="btn bg2" onclick="testQs=[];testDone=false;const p=document.getElementById('gl-panel-test');if(p)p.innerHTML=glRenderTest()">Cambiar nº</button>
      </div>
    </div>`;
  }
  const q=testQs[testQIdx];
  const pct=Math.round(testQIdx/testQs.length*100);
  return `<div class="test-score-bar">
    <div class="fc-prog-bar"><div class="fc-prog-fill" style="width:${pct}%"></div></div>
  </div>
  <div class="test-q-num">Pregunta ${testQIdx+1} / ${testQs.length} · ${testScore} correctas</div>
  <div class="test-question">${q.q.replace(/\n/g,'<br>')}</div>
  <div class="test-opts" id="test-opts">
    ${q.options.map((o,i)=>`<button class="test-opt" id="topt-${i}" onclick="testPick(${i})">${o}</button>`).join('')}
  </div>
  <div id="test-expl" style="display:none"></div>
  <div id="test-next" style="display:none;text-align:right;margin-top:.5rem">
    <button class="btn bp" onclick="testNext()">${testQIdx===testQs.length-1?'Ver resultado':'Siguiente →'}</button>
  </div>`;
}
function testSetN(n){testN=n;const p=document.getElementById('gl-panel-test');if(p)p.innerHTML=glRenderTest();}
function testPick(i){
  if(testAnswered) return;
  testAnswered=true;
  const q=testQs[testQIdx];
  const ok=q.options[i]===q.correct;
  if(ok) testScore++;
  document.querySelectorAll('.test-opt').forEach((b,j)=>{
    b.disabled=true;
    if(q.options[j]===q.correct) b.classList.add('correct');
    else if(j===i) b.classList.add('wrong');
  });
  const ex=document.getElementById('test-expl');
  if(ex){ex.style.display='block';ex.className='test-expl';ex.innerHTML=ok?`✓ Correcto. ${q.expl}`:`✗ Incorrecto. Respuesta correcta: <strong>${q.correct}</strong>. ${q.expl}`;}
  const nx=document.getElementById('test-next');if(nx)nx.style.display='block';
}
function testNext(){testQIdx++;testAnswered=false;if(testQIdx>=testQs.length)testDone=true;const p=document.getElementById('gl-panel-test');if(p)p.innerHTML=glRenderTest();}

let pauState=null, pauExam=null, pauMcqSel={};

function buildPauExam(){
  const clTexts=EX.filter(e=>e.block===8&&e.type==='cl-text');

    p1Qs.push({ex:e,idx:i});
  }
  p1Qs=p1Qs.sort(()=>Math.random()-.5).slice(0,4);

  const redPool=EX.filter(e=>e.block===0&&e.type==='open');
  const selRed=redPool[Math.floor(Math.random()*redPool.length)];
  const corrPool=EX.filter(e=>(e.block===0&&(e.type==='fill'||e.type==='open'))||(e.block===5&&e.type==='open'));
  const corrOpts=corrPool.filter(e=>e!==selRed);

  const litPool=EX.filter(e=>[5,15,16].includes(e.block)&&['open','sent-mcq','mcq'].includes(e.type));
  const lit5=litPool.sort(()=>Math.random()-.5).slice(0,5);
  const pmPool=EX.filter(e=>(e.block===1||e.block===9)&&e.type==='open');
  const selPM=pmPool[Math.floor(Math.random()*pmPool.length)];
  const aiPool=EX.filter(e=>e.block===2&&e.type==='open');
  const selAI=aiPool[Math.floor(Math.random()*aiPool.length)];
  const rl3Pool=EX.filter(e=>[3,4,6,7].includes(e.block)&&['mcq','vocab-mcq','sent-mcq','fill'].includes(e.type));
  const selRL3=rl3Pool[Math.floor(Math.random()*rl3Pool.length)];
  const socPool=EX.filter(e=>e.block===12&&['mcq','sent-mcq','open'].includes(e.type));
  const soc3=socPool.sort(()=>Math.random()-.5).slice(0,3);

  return {
    startTime:Date.now(), submitted:false, answers:{}, fbCache:{},
    parts:[
      {id:'p1',num:'Parte 1',title:'Comprensión lectora',pts:2,
       desc:'Llegiu el text i responeu a les quatre qüestions. Podeu trobar preguntes sobre la idea principal, vocabulari, anàfores o significat en context. 0,5 punts cadascuna.',
       questions:[
         {id:'p1-txt',type:'cl-text',ex:selText,pts:0,label:'Texto'},
         ...p1Qs.map((q,i)=>({id:'p1-q'+(i+1),type:q.ex.type,ex:q.ex,pts:0.5,label:'1.'+(i+1)}))
       ]},
      {id:'p2',num:'Parte 2',title:'Expresión escrita',pts:3,
       desc:'Responeu a les dues qüestions. La redacció (2.1) ha de tenir entre 100 i 150 paraules. L\'exercici 2.2 pot incloure correcció, reescriptura o compleció de fragments.',
       questions:[
         {id:'p2-1',type:'open',ex:selRed,pts:2,label:'2.1 — Redacción',minWords:100,maxWords:150},
         {id:'p2-2',type:selCorr.type,ex:selCorr,pts:1,label:'2.2 — Revisión/reescritura'}
       ]},
      {id:'p3',num:'Parte 3',title:'Saber literario',pts:2,
       desc:'Responeu a QUATRE de les cinc qüestions (les quatre primeres que respongueu comptaran). Les preguntes fan referència a figures retòriques, tòpics literaris i altres aspectes de forma i contingut. 0,5 pts cadascuna.',
       optional:true,mustAnswer:4,
       questions:lit5.map((e,i)=>({id:'p3-q'+(i+1),type:e.type,ex:e,pts:0.5,label:'3.'+(i+1)}))},
      {id:'p4',num:'Parte 4',title:'Reflexión lingüística',pts:3,
       desc:'<strong>Bloc 1 (obligatori):</strong> 4.1 par mínim (0,75 pts) · 4.2 anàlisi invers (0,75 pts) · 4.3 reflexió lingüística (0,5 pts). <strong>Bloc 2:</strong> responeu a DOS de les tres preguntes de sociolingüística (0,5 pts cadascuna).',
       questions:[
         {id:'p4-1',type:'open',ex:selPM,pts:0.75,label:'4.1 — Par mínimo'},
         {id:'p4-2',type:'open',ex:selAI,pts:0.75,label:'4.2 — Análisis inverso'},
         {id:'p4-3',type:selRL3.type,ex:selRL3,pts:0.5,label:'4.3 — Reflexión lingüística'},
         ...soc3.map((e,i)=>({id:'p4-s'+(i+1),type:e.type,ex:e,pts:0.5,label:'4.'+(i+4)+' — Sociolingüística',bloque2:true}))
       ]}
    ]
  };
}

function bPauExam(){

  if(pauState==='result') return pauRenderResult();
  return pauRenderExam();
}

      <div class="pau-structure-row"><span class="parte">4 &middot; Reflexió lingüística</span><span class="pts">3 pts</span></div>
      <div class="pau-structure-sub">
        <strong>Bloc 1 &mdash; obligatori (2 pts):</strong><br>
        &nbsp;&nbsp;&bull; 4.1 Par mínim (0,75 pts)<br>
        &nbsp;&nbsp;&bull; 4.2 Anàlisi invers (0,75 pts)<br>
        &nbsp;&nbsp;&bull; 4.3 Reflexió morfosintàctica o semàntica (0,5 pts)<br>
        <strong>Bloc 2 &mdash; sociolingüística (1 pt):</strong><br>
        &nbsp;&nbsp;&bull; Respon 2 de les 3 preguntes × 0,5 pts
      </div>
      <div class="pau-structure-row" style="margin-top:6px"><span class="parte" style="color:var(--accent)">Total</span><span class="pts" style="font-size:13px">10 pts</span></div>
      <div class="pau-structure-sub" style="color:var(--danger)">&minus;0,1 pts per error normatiu (màx. &minus;2 pts)</div>

    <button class="btn bp" style="font-size:14px;padding:10px 28px" onclick="pauStart()">Comen&ccedil;ar simulacre &rarr;</button>

}

function pauStart(){
  pauExam=buildPauExam();
  pauState='exam';
  pauMcqSel={};
  const ea=document.getElementById('ea');
  if(ea) ea.innerHTML='<div class="ex-card">'+pauRenderExam()+'</div>';
}

function pauElapsed(){
  if(!pauExam) return '';
  const s=Math.floor((Date.now()-pauExam.startTime)/1000);
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

function pauCountAnswered(){
  if(!pauExam) return {answered:0,total:0};
  let answered=0,total=0;
  pauExam.parts.forEach(p=>p.questions.forEach(q=>{
    if(q.type==='cl-text') return;
    total++;
    const a=pauExam.answers[q.id];
    if(a!==undefined&&a!=='') answered++;
    else if(pauMcqSel[q.id]!==undefined) answered++;
  }));
  return {answered,total};
}

function pauRenderExam(){
  const {answered,total}=pauCountAnswered();
  const pct=total?Math.round(answered/total*100):0;
  let h=`<div class="pau-exam-header">
    <div class="pau-exam-title">📝 Simulacro PAU 2026</div>
    <div id="pau-timer" class="pau-exam-timer">⏱ ${pauElapsed()}</div>
  </div>`;
  pauExam.parts.forEach(part=>{
    h+=`<div class="pau-parte-header">
      <span class="pau-parte-num">${part.num}</span>
      <span class="pau-parte-title">${part.title}</span>
      <span class="pau-parte-pts">${part.pts} pts</span>
    </div>
    <div class="pau-parte-desc">${part.desc}</div>`;
    part.questions.forEach(q=>{ h+=pauRenderQ(q); });
  });
  h+=`<div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:.75rem">
    <button class="btn bg2" style="font-size:12px" onclick="pauExportPDF()">🖨 Imprimir / PDF</button>
    <button class="btn bg2" style="font-size:12px" onclick="pauExportDocx()">⬇ Descargar DOCX</button>
  </div>
  <div class="pau-submit-row">
    <div class="pau-progress-wrap">
      <div class="pau-progress-bar"><div class="pau-progress-fill" style="width:${pct}%"></div></div>
      <div class="pau-progress-txt">${answered}/${total} respondidas</div>
    </div>
    <button class="btn bp" style="font-size:13.5px;padding:9px 22px" onclick="pauSubmit()">Entregar →</button>
  </div>`;
  setTimeout(function tick(){
    const t=document.getElementById('pau-timer');
    if(t&&pauState==='exam'){t.textContent='⏱ '+pauElapsed();setTimeout(tick,10000);}
  },10000);
  return h;
}

function pauRenderQ(q){
  const ex=pauExam;
  if(q.type==='cl-text') return `<div class="pau-q" style="background:#FAFAF8;padding:.75rem 1rem">${bClText(q.ex)}</div>`;
  const ans=ex.answers[q.id]||'';
  const sel=pauMcqSel[q.id];
  const done=ex.submitted;
  const isOpen=q.type==='open'||q.type==='join';
  const isMcq=['mcq','vocab-mcq','sent-mcq'].includes(q.type);
  let h=`<div class="pau-q" id="pauq-${q.id}">
    <div class="pau-q-label">
      <span>${q.label}</span>
      <span class="pau-q-pts">${q.pts} pts</span>
    </div>
    <div class="pau-q-prompt">${q.ex.prompt}</div>`;
  if(q.ex.quote) h+=`<div class="pau-q-quote">${q.ex.quote.replace(/\n/g,'<br>')}</div>`;
  if(isOpen){
    const ph=q.minWords?`Escribe tu respuesta (${q.minWords}–${q.maxWords} palabras)…`:'Escribe tu respuesta…';
    h+=`<textarea id="pautx-${q.id}" placeholder="${ph}" oninput="pauSaveTxt('${q.id}',this.value)" ${done?'readonly':''}>${ans}</textarea>`;
    if(q.minWords){
      const wc=ans.trim().split(/\s+/).filter(Boolean).length;
      const ok=wc>=q.minWords&&wc<=q.maxWords;
      h+=`<div id="paucnt-${q.id}" style="font-size:11px;color:${ok?'var(--accent)':'var(--danger)'};text-align:right;margin-top:3px">${wc} palabras</div>`;
    }
    if(done&&ans){
      const fbId='paufb-'+q.id;
      const cached=ex.fbCache[q.id];
      h+=`<div class="pau-q-fb"><div class="pau-q-fbh"><span class="pau-q-fbd${cached?'':' loading'}"></span>Corrección IA</div><div class="pau-q-fbb${cached?'':' loading'}" id="${fbId}">${cached||'Analizando…'}</div></div>`;
    }
  } else if(isMcq){
    const opts=q.ex.options||[];
    h+=`<div class="pau-mcq-opts">`;
    opts.forEach((o,i)=>{
      let cls='pau-mcq-opt';
      if(done){if(o.correct)cls+=' pau-correct';else if(sel===i)cls+=' pau-wrong';}
      else if(sel===i) cls+=' pau-sel';
      h+=`<button class="${cls}" ${done?'disabled':''} onclick="pauPickMcq('${q.id}',${i})">
        <span class="ltr">${String.fromCharCode(65+i)}</span>${o.text}
      </button>`;
    });
    h+=`</div>`;
    if(done&&q.ex.explanation) h+=`<div class="pau-q-fb"><div class="pau-q-fbh"><span class="pau-q-fbd"></span>Explicación</div><div class="pau-q-fbb">${q.ex.explanation}</div></div>`;
  } else if(q.type==='fill'||q.type==='paronyms'){
    const ki=EX.indexOf(q.ex);
    h+=bFill(ki,q.ex,done);
  }
  h+=`</div>`;
  return h;
}

function pauSaveTxt(qid,val){
  if(!pauExam) return;
  pauExam.answers[qid]=val;
  const cnt=document.getElementById('paucnt-'+qid);
  if(cnt){
    const wc=val.trim().split(/\s+/).filter(Boolean).length;
    const q=pauExam.parts.flatMap(p=>p.questions).find(q=>q.id===qid);
    const ok=q&&q.minWords?wc>=q.minWords&&wc<=q.maxWords:true;
    cnt.style.color=ok?'var(--accent)':'var(--danger)';
    cnt.textContent=wc+' palabras';
  }
}

function pauPickMcq(qid,idx){
  if(!pauExam||pauExam.submitted) return;
  pauMcqSel[qid]=idx;
  const q=pauExam.parts.flatMap(p=>p.questions).find(q=>q.id===qid);
  const el=document.getElementById('pauq-'+qid);
  if(el&&q) el.outerHTML=pauRenderQ(q);
}

async function pauSubmit(){
  if(!pauExam||!confirm('¿Entregar el examen? No podrás modificar las respuestas.')) return;
  pauExam.parts.forEach(part=>part.questions.forEach(q=>{
    if(q.type==='open'){const ta=document.getElementById('pautx-'+q.id);if(ta)pauExam.answers[q.id]=ta.value;}
  }));
  pauExam.submitted=true;
  pauState='result';
  const ea=document.getElementById('ea');
  if(ea) ea.innerHTML='<div class="ex-card">'+pauRenderResult()+'</div>';
  pauExam.parts.forEach(part=>part.questions.forEach(q=>{
    if((q.type==='open'||q.type==='join')&&pauExam.answers[q.id]) pauGetFB(q);
  }));
}

async function pauGetFB(q){
  const ans=pauExam.answers[q.id];
  if(!ans||pauExam.fbCache[q.id]) return;
  const apiKey=GEMINI_KEY;
  if(!apiKey){
    pauExam.fbCache[q.id]='<span style="color:#991B1B">⚠️ La corrección IA no está configurada.</span>';
    const el=document.getElementById('paufb-'+q.id);
    if(el){el.classList.remove('loading');el.innerHTML=pauExam.fbCache[q.id];}
    return;
  }
  try{
    const sys='Eres corrector oficial de la PAU de Lengua Castellana (2026). Evalúa con rigor y pedagogía. Usa HTML simple (b, span, br). Estructura: 1) valoración breve con nota estimada, 2) aciertos con ✓, 3) errores con ✗ y corrección, 4) consejo. Sin markdown.';
    const rubric=q.ex.rubric?' Rúbrica: '+q.ex.rubric:'';
    const msg=`Pregunta (${q.label}, ${q.pts} pts): ${q.ex.prompt}\n${q.ex.quote?'Texto: '+q.ex.quote:''}\nRespuesta del alumno:\n${ans}`;
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:sys+rubric}]},
        contents:[{role:'user',parts:[{text:msg}]}],
        generationConfig:{maxOutputTokens:600}
      })
    });
    const data=await r.json();
    const text=data.error
      ?`<span style="color:#991B1B">⚠️ Error: ${data.error.message||'Comprueba la API key.'}</span>`
      :data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'Error al obtener corrección.';
    pauExam.fbCache[q.id]=text;
    const el=document.getElementById('paufb-'+q.id);
    if(el){el.classList.remove('loading');el.innerHTML=text;}
    const dot=el?.closest('.pau-q-fb')?.querySelector('.pau-q-fbd');
    if(dot) dot.classList.remove('loading');
  }catch(e){
    const el=document.getElementById('paufb-'+q.id);
    if(el) el.textContent='Error de conexión.';
  }
}

function pauCalcScore(){
  if(!pauExam) return {total:0,parts:{}};
  const scores={};
  pauExam.parts.forEach(part=>{
    let s=0;
    part.questions.forEach(q=>{
      if(q.type==='cl-text') return;
      if(q.type==='open'||q.type==='join'){
        const a=pauExam.answers[q.id];
        if(a&&a.trim()) s+=q.pts;
      } else if(['mcq','vocab-mcq','sent-mcq'].includes(q.type)){
        const sel=pauMcqSel[q.id];
        if(sel!==undefined){
          if(q.ex.options[sel]?.correct) s+=q.pts;
          else s-=0.15;
        }
      } else if(q.type==='fill'||q.type==='paronyms'){
        if(pauExam.answers[q.id]) s+=q.pts;
      }
    });
    scores[part.id]=Math.max(0,s);
  });
  const total=Math.min(10,Math.max(0,Object.values(scores).reduce((a,b)=>a+b,0)));
  return {total:Math.round(total*100)/100,parts:scores};
}

function pauRenderResult(){
  const sc=pauCalcScore();
  const nota=sc.total;
  const msg=nota>=9?'¡Sobresaliente!':nota>=7?'¡Notable!':nota>=5?'Aprobado.':'Suspenso. ¡Sigue practicando!';
  let h=`<div class="pau-result-hero">
    <div class="pau-result-label">Calificación simulacro</div>
    <div class="pau-result-nota">${nota.toFixed(2)}</div>
    <div class="pau-result-label" style="margin-top:.5rem">sobre 10 · ${msg}</div>
  </div>
  <div class="pau-result-breakdown">`;
  pauExam.parts.forEach(part=>{
    const s=sc.parts[part.id]||0;
    h+=`<div class="pau-rb-card">
      <div class="rb-title">${part.num}</div>
      <div class="rb-val">${s.toFixed(2)}</div>
      <div class="rb-max">de ${part.pts} pts</div>
    </div>`;
  });
  h+=`</div>
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem 1rem;font-size:12.5px;color:var(--ink3);margin-bottom:1.25rem;line-height:1.6">
    ⚠️ Las respuestas abiertas se puntúan como correctas si están escritas. La corrección real la proporciona la IA debajo de cada pregunta.
  </div>`;
  pauExam.parts.forEach(part=>{
    const s=sc.parts[part.id]||0;
    h+=`<div class="pau-parte-header">
      <span class="pau-parte-num">${part.num}</span>
      <span class="pau-parte-title">${part.title}</span>
      <span class="pau-parte-pts">${s.toFixed(2)} / ${part.pts} pts</span>
    </div>`;
    part.questions.forEach(q=>{ h+=pauRenderQ(q); });
  });
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:1.5rem">
    <button class="btn bp" onclick="pauReset()">Nuevo simulacro</button>
    <button class="btn bg2" onclick="pauState='setup';const ea=document.getElementById('ea');if(ea)ea.innerHTML='<div class=\\'ex-card\\'>'+bPauExam()+'</div>'">Volver al inicio</button>
    <button class="btn bg2" onclick="pauExportPDF()">🖨 Imprimir / PDF</button>
    <button class="btn bg2" onclick="pauExportDocx()">⬇ Descargar DOCX</button>
  </div>`;
  return h;
}

function pauReset(){
  pauState='setup';pauExam=null;pauMcqSel={};
  const ea=document.getElementById('ea');
  if(ea) ea.innerHTML='<div class="ex-card">'+bPauExam()+'</div>';
}

</script>

<script>
function pauExportPDF(){ window.print(); }

async function pauExportDocx(){
  if(!window.docx){ alert('Librería no disponible. Comprueba tu conexión a internet.'); return; }
  if(!pauExam){ alert('Primero genera un simulacro.'); return; }
  const {Document,Paragraph,TextRun,HeadingLevel,AlignmentType,Packer,BorderStyle}=window.docx;
  const line=()=>new Paragraph({
    children:[new TextRun({text:' '})],
    border:{bottom:{style:BorderStyle.SINGLE,size:1,color:'CCCCCC'}},
    spacing:{after:80}
  });
  const ch=[];
  ch.push(new Paragraph({
    text:'Simulacro PAU 2026 — Lengua Castellana y Literatura',
    heading:HeadingLevel.TITLE,alignment:AlignmentType.CENTER,spacing:{after:100}
  }));
  ch.push(new Paragraph({
    text:'Fecha: '+new Date().toLocaleDateString('es-ES')+'          Nombre: ____________________________',
    alignment:AlignmentType.CENTER,spacing:{after:400}
  }));
  pauExam.parts.forEach(part=>{
    ch.push(new Paragraph({
      children:[new TextRun({text:part.num+' — '+part.title,bold:true,size:28}),
                new TextRun({text:'  ('+part.pts+' pts)',size:22,color:'2D6A4F'})],
      spacing:{before:500,after:100}
    }));
    ch.push(new Paragraph({text:part.desc,spacing:{after:200}}));
    part.questions.forEach(q=>{
      if(q.type==='cl-text'){
        if(q.ex&&q.ex.prompt){
          ch.push(new Paragraph({children:[new TextRun({text:'TEXTO',bold:true})],spacing:{before:200,after:60}}));
          ch.push(new Paragraph({text:q.ex.prompt,spacing:{after:100}}));
        }
        return;
      }
      ch.push(new Paragraph({
        children:[new TextRun({text:q.label,bold:true,size:24}),
                  new TextRun({text:'  ('+q.pts+' pts)',size:20,color:'2D6A4F'})],
        spacing:{before:300,after:80}
      }));
      ch.push(new Paragraph({text:q.ex.prompt,spacing:{after:80}}));
      if(q.ex.quote){
        String(q.ex.quote).split('\\n').filter(Boolean).forEach(l=>
          ch.push(new Paragraph({text:l,indent:{left:720},spacing:{after:60}}))
        );
      }
      if(['mcq','vocab-mcq','sent-mcq'].includes(q.type)&&q.ex.options){
        q.ex.options.forEach((o,i)=>ch.push(new Paragraph({
          children:[new TextRun({text:String.fromCharCode(65+i)+') ',bold:true}),
                    new TextRun({text:o.text})],
          indent:{left:360},spacing:{after:60}
        })));
        ch.push(line());
      } else if(q.type==='open'||q.type==='join'){
        const n=q.minWords?8:5;
        for(let i=0;i<n;i++) ch.push(line());
        if(q.minWords) ch.push(new Paragraph({
          text:'(Entre '+q.minWords+' y '+q.maxWords+' palabras)',spacing:{after:80}
        }));
      } else {
        ch.push(line());
      }
    });
  });
  ch.push(new Paragraph({
    text:'— Descuento por errores normativos: −0,1 pts/error (máx. −2 pts) —',
    alignment:AlignmentType.CENTER,spacing:{before:600}
  }));
  try{
    const blob=await Packer.toBlob(new Document({
      creator:'PrePAU Lengua Castellana',
      title:'Simulacro PAU 2026',
      sections:[{children:ch}]
    }));
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='simulacro_pau_'+new Date().toISOString().slice(0,10)+'.docx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){
    alert('Error al generar el DOCX: '+e.message);
  }
}
</script>
