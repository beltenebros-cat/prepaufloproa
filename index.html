{block:9,type:"open",meta:"Par mínimo · Adverbio vs. determinante",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Comió mucho.\n(b) Comió muchos.",rubric:"(a) mucho es adverbio de cantidad que modifica al verbo. (b) muchos es determinante indefinido con flexión de número plural que indica cantidad de objetos. Cambio de categoría: intensidad → cantidad de objetos.",modelSolution:"Términos clave: adverbio, determinante indefinido, flexión de número.\n\nEn (a) «mucho» es un adverbio de cantidad que modifica al verbo: cuantifica la intensidad de la acción. En (b) «muchos» es un determinante indefinido con flexión de número plural: indica la cantidad de objetos consumidos. El cambio de categoría (adverbio → determinante) implica un cambio de significado: de «intensidad» a «cantidad de objetos»."},

{block:9,type:"open",meta:"Par mínimo · Pronombre vs. determinante demostrativo",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Me gusta esta.\n(b) Me gusta esta casa.",rubric:"(a) esta es pronombre demostrativo: núcleo del sujeto. (b) esta es determinante demostrativo que acompaña al sustantivo casa. Misma forma, diferente función sintáctica.",modelSolution:"Términos clave: pronombre demostrativo, determinante demostrativo.\n\nEn (a) «esta» funciona como pronombre demostrativo: es el núcleo del sujeto y se refiere a algo ya conocido. En (b) «esta» es un determinante demostrativo que introduce y acompaña al sustantivo «casa». Misma forma gráfica, diferente función sintáctica."},

{block:9,type:"open",meta:"Par mínimo · Verbo impersonal haber",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Había muchas personas.\n(b) Habían muchas personas.",rubric:"Haber existencial es impersonal: solo 3ª persona singular. (a) gramatical. (b) agramatical: intenta concordar con muchas personas, que es CD no sujeto.",modelSolution:"Términos clave: verbo impersonal, concordancia, complemento directo.\n\nEl verbo «haber» en sentido existencial es impersonal: solo se usa en 3.ª persona del singular. En (a) «había» es gramatical. En (b) «habían» intenta concordar con «muchas personas», lo cual es agramatical porque ese SN es el CD, no el sujeto."},

{block:9,type:"open",meta:"Par mínimo · Pasiva perifrástica vs. perífrasis aspectual",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Han sido publicados los datos.\n(b) Han ido publicados los datos.",rubric:"(a) pasiva perifrástica (ser + participio): acción terminada. (b) perífrasis aspectual (ir + participio): matiz acumulativo o de proceso gradual.",modelSolution:"Términos clave: voz pasiva, perífrasis verbal, participio.\n\n(a) es una pasiva perifrástica (ser + participio) que presenta la acción como terminada. (b) usa una perífrasis aspectual (ir + participio) que añade un matiz acumulativo o de proceso gradual. El cambio de auxiliar modifica el valor aspectual."},

{block:9,type:"open",meta:"Par mínimo · Laísmo",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) María le pegó.\n(b) María la pegó.",rubric:"(a) le es pronombre de CI: forma normativa. (b) la es pronombre de CD usado en función de CI: laísmo, agramatical en la norma estándar.",modelSolution:"Términos clave: complemento indirecto, complemento directo, laísmo.\n\nEn (a) «le» es el pronombre de CI: forma normativa cuando el referente es destinatario de la acción. En (b) «la» es pronombre de CD usado en función de CI, lo que constituye laísmo: agramatical en la norma estándar."},

{block:9,type:"open",meta:"Par mínimo · Queísmo",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Estoy seguro de que vendrá.\n(b) Estoy seguro que vendrá.",rubric:"El adjetivo seguro exige la preposición de. (a) gramatical. (b) queísmo: omisión agramatical de la preposición.",modelSolution:"Términos clave: queísmo, complemento de régimen, conjunción.\n\nEl adjetivo «seguro» exige la preposición «de» para introducir su complemento de régimen. En (a) la secuencia «de que» es gramatical. En (b) se omite la preposición: queísmo, agramatical en la lengua formal."},

{block:9,type:"open",meta:"Par mínimo · Pronombres CI+CD (se lo / le lo)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Se lo di a María.\n(b) Le lo di a María.",rubric:"Cuando coinciden CD (lo) y CI (le), el CI debe transformarse obligatoriamente en se. (a) gramatical. (b) agramatical.",modelSolution:"Términos clave: pronombre personal, variante de «le», complemento indirecto.\n\nCuando coinciden los clíticos de CD (lo) y CI (le), el CI «le» se transforma obligatoriamente en «se». (a) es gramatical. (b) es agramatical por no aplicar esta sustitución."},

{block:9,type:"open",meta:"Par mínimo · Sustantivación del adjetivo",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Juan es listo.\n(b) Juan es el listo.",rubric:"(a) listo es adjetivo calificativo: atributo que expresa cualidad. (b) el artículo sustantiva el adjetivo: identifica a Juan como individuo específico dentro de un grupo.",modelSolution:"Términos clave: adjetivo, sustantivación, atributo.\n\nEn (a) «listo» es adjetivo calificativo que funciona como atributo: expresa una cualidad del sujeto. En (b) el artículo «el» sustantiva el adjetivo: Juan queda identificado como el individuo conocido por ser el listo del grupo."},

{block:9,type:"open",meta:"Par mínimo · Relativa especificativa vs. explicativa",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Los alumnos que estudiaron aprobaron el último trimestral.\n(b) Los alumnos, que estudiaron, aprobaron el último trimestral.",rubric:"(a) especificativa (sin comas): solo aprobaron los que estudiaron. (b) explicativa (con comas): todos estudiaron y todos aprobaron.",modelSolution:"Términos clave: oración subordinada de relativo, especificativa, explicativa.\n\n(a) es especificativa (sin comas): restringe el referente, solo aprobaron los que estudiaron. (b) es explicativa (entre comas): no restringe sino que añade información sobre todos los alumnos."},

{block:9,type:"open",meta:"Par mínimo · Tilde diacrítica se/sé",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) No se nada.\n(b) No sé nada.",rubric:"(a) se sin tilde: pronombre átono, oración agramatical. (b) sé con tilde: 1.ª persona singular del presente de indicativo de saber.",modelSolution:"Términos clave: tilde diacrítica, verbo «saber», pronombre personal.\n\n(a) «se» sin tilde es pronombre clítico: la frase resulta agramatical. (b) «sé» con tilde diacrítica es la 1.ª persona singular del presente de indicativo de «saber». La tilde distingue el pronombre del verbo."},

{block:9,type:"open",meta:"Par mínimo · Coma de vocativo vs. negación",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) No, queremos comer.\n(b) No queremos comer.",rubric:"(a) la coma separa el adverbio no de la oración: responde negativamente a algo previo, pero sí quieren comer. (b) no modifica directamente al verbo: no quieren comer.",modelSolution:"Términos clave: adverbio de negación, vocativo, modalidad oracional.\n\nEn (a) la coma separa «no» del resto: responde negativamente a algo previo y la oración principal afirma que sí quieren comer. En (b) «no» modifica directamente a «queremos»: nadie quiere comer. Un signo de puntuación cambia radicalmente el significado."},

{block:9,type:"open",meta:"Par mínimo · Tilde diacrítica aún/aun",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Aún no ha llegado.\n(b) Aun no ha llegado.",rubric:"(a) aún con tilde = todavía: adverbio de tiempo. (b) aun sin tilde = incluso/siquiera: conjunción concesiva o adverbio de foco. (b) resulta agramatical o forzado en este contexto.",modelSolution:"Términos clave: tilde diacrítica, adverbio de tiempo, conjunción concesiva.\n\n(a) «Aún» con tilde equivale a «todavía»: adverbio de tiempo, oración gramatical. (b) «Aun» sin tilde equivale a «incluso/siquiera»: conjunción concesiva o adverbio de foco. En este contexto resulta agramatical salvo en una estructura concesiva explícita."},

{block:9,type:"open",meta:"Par mínimo · CN vs. CPred (barata)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Compré la fruta barata.\n(b) Compré barata la fruta.",rubric:"(a) barata es CN adjetival dentro del SN: propiedad previa. (b) barata desplazado es CPred del CD: énfasis en el estado en el momento de la compra.",modelSolution:"Términos clave: complemento del nombre, complemento predicativo, sintagma adjetival.\n\nEn (a) «barata» es complemento del nombre dentro del SN «la fruta barata»: propiedad que ya tenía. En (b) desplazado fuera del SN funciona como predicativo del CD: pone el foco en el estado resultante en el momento de la compra."},

{block:9,type:"open",meta:"Par mínimo · Homófonos votar/botar",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Juan votará a su padre en las siguientes elecciones.\n(b) Juan botará a su padre en las siguientes elecciones.",rubric:"Par mínimo ortográfico (homófonos): votar = emitir voto electoral; botar = echar o arrojar. Misma pronunciación, significado completamente distinto.",modelSolution:"Términos clave: verbo botar/votar, léxico, homófono.\n\nPar mínimo ortográfico: ambas palabras suenan igual pero se escriben distinto y tienen significados distintos. «Votar» (a): emitir un voto. «Botar» (b): echar o arrojar. El cambio de una letra transforma completamente el significado."},

{block:9,type:"open",meta:"Par mínimo · Reduplicación pronominal obligatoria",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Vi a ella.\n(b) La vi a ella.",rubric:"Cuando el CD es pronombre personal tónico precedido de a, es obligatorio el clítico átono. (a) agramatical. (b) gramatical con reduplicación.",modelSolution:"Términos clave: reduplicación pronominal, pronombre, complemento directo.\n\nCuando el CD es un pronombre tónico con «a» («a ella»), el clítico átono («la») es obligatorio. (a) es agramatical por omitirlo. (b) es la forma correcta con reduplicación pronominal."},

{block:9,type:"open",meta:"Par mínimo · Puntuación: imperativo vs. preposición",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Felipe sexto, para esto.\n(b) Felipe sexto para esto.",rubric:"(a) la coma convierte para en imperativo del verbo parar. (b) sin coma, para es preposición de finalidad. La puntuación cambia la categoría gramatical.",modelSolution:"Términos clave: verbo parar, numeral, imperativo.\n\nEn (a) la coma convierte «para» en imperativo del verbo «parar» (¡detente!). En (b) sin coma, «para» es preposición de finalidad (Felipe VI está destinado a esto). La puntuación cambia la categoría gramatical de «para»."},

{block:9,type:"open",meta:"Par mínimo · Sentido literal vs. figurado (bajo)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Vive bajo techo.\n(b) Vive bajo presión.",rubric:"(a) bajo: preposición con sentido físico/espacial. (b) bajo presión: locución con sentido abstracto/metafórico que indica condición psicológica.",modelSolution:"Términos clave: sentido literal, sentido figurado, locución.\n\n(a) «bajo» tiene sentido físico/espacial: vive en un lugar cubierto. (b) «bajo presión» es una locución con sentido abstracto/metafórico: indica una condición psicológica. Mismo elemento léxico, valores semánticos distintos."},

{block:9,type:"open",meta:"Par mínimo · Género del referente (se lo / se la)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Se lo di.\n(b) Se la di.",rubric:"La diferencia es el género del referente del CD: (a) lo = masculino; (b) la = femenino. El clítico refleja el género gramatical del antecedente.",modelSolution:"Términos clave: género, complemento directo, referente.\n\nLa diferencia reside en el género del referente del CD. En (a) «lo» es masculino (p. ej., el libro). En (b) «la» es femenino (p. ej., la carta). La forma del clítico refleja el género gramatical del antecedente."},

{block:9,type:"open",meta:"Par mínimo · Adverbio vs. CPred (solo/sola)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Ella bebió solo café.\n(b) Ella bebió sola café.",rubric:"(a) solo: adverbio = solamente. (b) sola: adjetivo que concuerda con ella, CPred del sujeto: estaba en soledad.",modelSolution:"Términos clave: adverbio, adjetivo, complemento predicativo.\n\nEn (a) «solo» es adverbio (= solamente): indica exclusividad del objeto. En (b) «sola» es adjetivo que concuerda con «ella»: CPred del sujeto, indica que estaba en soledad mientras bebía."},

{block:9,type:"open",meta:"Par mínimo · Ambigüedad sintáctica",prompt:"Explica por qué (b) genera ambigüedad y (a) no.",quote:"(a) La llegada a la luna del astronauta.\n(b) La llegada a la vivienda del astronauta.",rubric:"(a) sin ambigüedad: a la luna es destino, del astronauta es agente. (b) del astronauta puede ser agente (quien llega) o CN de vivienda (la vivienda que es suya).",modelSolution:"Términos clave: ambigüedad, complemento del nombre, papel temático.\n\n(a) no es ambigua: «a la luna» es el destino y «del astronauta» es el agente. (b) «del astronauta» puede modificar a «llegada» (agente) o a «vivienda» (posesivo), generando ambigüedad estructural."},

{block:9,type:"open",meta:"Par mínimo · Deber / deber de",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Deben ser las tres.\n(b) Deben de ser las tres.",rubric:"Tradición normativa: deber + inf. = obligación; deber de + inf. = probabilidad/suposición. La RAE admite (a) para ambos valores, pero el contraste es evaluable en la PAU.",modelSolution:"Términos clave: perífrasis verbal, obligación, probabilidad.\n\nSegún la norma tradicional, «deber + infinitivo» (a) expresa obligación; «deber de + infinitivo» (b) expresa probabilidad o suposición epistémica. En el contexto dado (la hora), (b) es la forma prescriptivamente más precisa."},

{block:9,type:"open",meta:"Par mínimo · CPred según género (hambrienta/hambriento)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) El león miró a la gacela hambrienta.\n(b) El león miró a la gacela hambriento.",rubric:"(a) hambrienta (fem.) concuerda con la gacela (CD): CPred del CD. (b) hambriento (masc.) concuerda con el león (sujeto): CPred del sujeto.",modelSolution:"Términos clave: concordancia, complemento predicativo, género.\n\n(a) «hambrienta» (fem.) concuerda con «la gacela» (CD): la gacela tiene hambre. (b) «hambriento» (masc.) concuerda con «el león» (sujeto): el león tiene hambre. El género del adjetivo determina quién es el predicado."},

{block:9,type:"open",meta:"Par mínimo · Pasiva (*desaparecidas)",prompt:"Explica por qué (a) es gramatical y (b) no.",quote:"(a) Las fotografías fueron eliminadas.\n(b) Las fotografías fueron desaparecidas.",rubric:"La pasiva perifrástica exige verbos transitivos. Eliminar (a) es transitivo. Desaparecer (b) es inacusativo: no puede construir pasiva.",modelSolution:"Términos clave: verbo transitivo, verbo intransitivo, pasiva.\n\nLa voz pasiva perifrástica solo se construye con verbos transitivos. «Eliminar» (a) es transitivo: la pasiva es gramatical. «Desaparecer» (b) es inacusativo: no admite pasiva perifrástica."},

{block:9,type:"open",meta:"Par mínimo · Adjetivo relacional no gradable",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) La propuesta me parece bastante absurda.\n(b) La propuesta me parece bastante estudiantil.",rubric:"Absurda (a) es adjetivo calificativo gradable. Estudiantil (b) es adjetivo relacional: no es gradable, por lo que bastante estudiantil resulta agramatical.",modelSolution:"Términos clave: adjetivo calificativo, adjetivo relacional, grado del adjetivo.\n\n«Absurda» (a) es calificativo gradable: admite «bastante». «Estudiantil» (b) es relacional (ámbito de los estudiantes): los adjetivos relacionales no admiten gradación, por lo que (b) es agramatical."},

{block:9,type:"open",meta:"Par mínimo · Inacusativo vs. transitivo (*lo murió)",prompt:"Explica por qué (a) es agramatical y (b) no.",quote:"(a) Juan lo murió.\n(b) Juan lo comió.",rubric:"Morir (a) es inacusativo: no admite CD ni pronombre lo. Comer (b) es transitivo: lo es perfectamente gramatical como CD.",modelSolution:"Términos clave: verbo inacusativo, complemento directo, verbo transitivo.\n\n«Morir» (a) es inacusativo: su único argumento es interno y no admite CD. El pronombre «lo» resulta agramatical. «Comer» (b) es transitivo: selecciona CD y «lo» es gramatical."},

{block:9,type:"open",meta:"Par mínimo · Reduplicación innecesaria del CD",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Vi a los periodistas.\n(b) Los vi a los periodistas.",rubric:"(a) gramatical: CD postverbal estándar. (b) pleonástico: el clítico no se duplica cuando el CD SN está en posición postverbal.",modelSolution:"Términos clave: pleonasmo, complemento directo, reduplicación.\n\n(a) es gramatical: «a los periodistas» en posición postverbal estándar. (b) es pleonástico: la duplicación del CD con clítico solo es correcta cuando el SN está dislocado a la izquierda del verbo."},

{block:9,type:"open",meta:"Par mínimo · Semicopulativo vs. verbo pleno (quedarse)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Se quedó petrificado.\n(b) Se quedó en Madrid.",rubric:"(a) quedarse semicopulativo de cambio de estado: petrificado es atributo. (b) quedarse predicativo pleno de permanencia: en Madrid es complemento locativo.",modelSolution:"Términos clave: verbo semicopulativo, verbo de movimiento, atributo.\n\nEn (a) «quedarse» es semicopulativo de cambio de estado: «petrificado» es atributo. En (b) es predicativo pleno de permanencia: «en Madrid» es complemento locativo argumental."},

{block:9,type:"open",meta:"Par mínimo · Verbo pronominal vs. impersonal (despedirse/despedir)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Se despidió de los trabajadores.\n(b) Se despidió a los trabajadores.",rubric:"(a) despedirse de: verbo pronominal + CRég. Sujeto dice adiós. (b) despedir a: impersonal refleja. Los trabajadores son echados (CD).",modelSolution:"Términos clave: verbo pronominal, complemento de régimen, complemento directo.\n\n(a) «despedirse de» es pronominal con CRég: el sujeto dice adiós. (b) «despedir a» en impersonal refleja: «los trabajadores» son el CD (son echados del empleo)."},

{block:9,type:"open",meta:"Par mínimo · Pasiva refleja vs. impersonal con se",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) En este hotel se admiten extranjeros.\n(b) En este hotel se admite a los extranjeros.",rubric:"(a) pasiva refleja: extranjeros es sujeto paciente concordado con el verbo. (b) impersonal: verbo en singular, a los extranjeros es CD de persona.",modelSolution:"Términos clave: pasiva refleja, impersonal con «se», concordancia.\n\n(a) es pasiva refleja: «extranjeros» es sujeto paciente y el verbo concuerda en plural. (b) es impersonal: verbo en singular, «a los extranjeros» es CD marcado con preposición «a»."},

{block:9,type:"open",meta:"Par mínimo · CD de persona con/sin preposición",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Vi Pedro.\n(b) Vi a Pedro.",rubric:"El CD de persona determinada exige la preposición a. (a) agramatical. (b) gramatical.",modelSolution:"Términos clave: complemento directo de persona, preposición.\n\nEl CD de persona determinada exige obligatoriamente la preposición «a». (a) es agramatical por omitirla. (b) es la forma correcta."},

{block:9,type:"open",meta:"Par mínimo · Pronombre reflexivo vs. adverbio (a sí mismo/asimismo)",prompt:"Explica la diferencia gramatical entre estas dos oraciones.",quote:"(a) Se hizo una falda a sí mismo.\n(b) Se hizo una falda asimismo.",rubric:"(a) a sí mismo: refuerzo del pronombre reflexivo (CI reflexivo). (b) asimismo: conector/adverbio que significa también o del mismo modo.",modelSolution:"Términos clave: pronombre reflexivo, adverbio, cohesión.\n\n(a) «a sí mismo» refuerza el pronombre reflexivo «se»: el sujeto es el propio beneficiario. (b) «asimismo» es conector discursivo que significa «también» o «del mismo modo»."},

{block:9,type:"open",meta:"Par mínimo · Fonológico r/rr (coro/corro)",prompt:"Explica la diferencia entre estas dos oraciones.",quote:"(a) Me apunté al coro gospel.\n(b) Me apunté al corro gospel.",rubric:"Par mínimo fonológico: cambio de vibrante simple /r/ por múltiple /rr/ en posición intervocálica. Coro (a): agrupación coral. Corro (b): círculo de personas.",modelSolution:"Términos clave: fonema, vibrante simple, vibrante múltiple.\n\nPar mínimo fonológico: el cambio de la vibrante simple /r/ por la múltiple /rr/ produce dos palabras con significados distintos. «Coro» (a): agrupación coral. «Corro» (b): círculo de personas."},

{block:12,type:"open",meta:"Análisis · Sociolecto vs. dialecto (texto juvenil)",prompt:"Explica por qué este uso lingüístico se asocia a un grupo sociolingüístico y no a una variedad dialectal.",quote:"«Loco, eso está to guapo, ¿vienes o qué?»",rubric:"Debe identificar que es un sociolecto (variedad diastrática/diafásica): rasgos propios del habla juvenil informal. «Loco» es vocativo coloquial juvenil; «to guapo» muestra reducción fonética frecuente en registros informales. Estos rasgos no dependen del territorio sino de la edad y el contexto social.",modelSolution:"Este uso lingüístico se asocia a un grupo sociolingüístico porque presenta rasgos propios del habla juvenil: el vocativo «loco» es característico del lenguaje coloquial entre jóvenes, y «to guapo» muestra una reducción fonética propia de registros informales. Estos elementos no dependen de un territorio específico, sino de factores sociales como la edad y el contexto comunicativo. Por ello se trata de un sociolecto, no de un dialecto."},

{block:12,type:"open",meta:"Análisis · Sociolecto (léxico LGTBIQ+)",prompt:"Explica por qué este uso lingüístico se asocia a un grupo sociolingüístico y no a una variedad dialectal.",quote:"«La CIS heteronorma margina y excluye a personas trans, personas no binarias, gente LGTBIQ+, familias disidentes y cuerpos diversos».",rubric:"Debe identificar léxico especializado vinculado a un ámbito social e ideológico (estudios de género, movimientos LGTBIQ+). Términos como «CIS heteronorma», «no binarias» o «personas trans» no dependen de una región geográfica sino del conocimiento y pertenencia a determinados discursos sociales.",modelSolution:"Este uso se asocia a un grupo sociolingüístico porque emplea un léxico específico vinculado a los estudios de género y los movimientos LGTBIQ+. Términos como «CIS heteronorma», «personas trans» o «no binarias» no dependen de un territorio, sino del conocimiento y la pertenencia a determinados discursos sociales. Se trata, por tanto, de un sociolecto y no de un dialecto."},

{block:12,type:"open",meta:"Análisis · Sociolecto juvenil (registro informal vulgar)",prompt:"Explica por qué este uso lingüístico se asocia a un grupo sociolingüístico y no a una variedad dialectal.",quote:"«Paso bastante de que me digan haz más en catalán, haz más en español, no hagas en inglés, hablas fatal inglés, tienes un acento de puta mierda, eh... Me la suda».",rubric:"Rasgos del habla juvenil informal: «paso bastante» y «me la suda» son propios del lenguaje coloquial juvenil; uso de intensificadores vulgares con carga expresiva. Estos rasgos no dependen del territorio sino de la edad y el contexto informal.",modelSolution:"Este uso lingüístico se asocia a un grupo sociolingüístico porque presenta rasgos del habla juvenil informal. Expresiones como «paso bastante» o «me la suda» son características del lenguaje coloquial de los jóvenes. Los intensificadores vulgares aportan carga expresiva propia de este sociolecto. Estos rasgos no dependen de la geografía sino de factores sociales como la edad y el registro informal."},

{block:12,type:"sent-mcq",meta:"Registros · Clasificación formal/informal",prompt:"¿Cuál de estas clasificaciones de registro es correcta para los ejemplos dados?",
options:[

{block:12,type:"open",meta:"Conceptos · Lengua minoritaria vs. minorizada",prompt:"Explica en 3-4 líneas la diferencia entre «lengua minoritaria» y «lengua minorizada» e incluye un ejemplo de cada una.",rubric:"Lengua minoritaria: pocos hablantes, no implica desventaja social (p. ej., el alemán en España). Lengua minorizada: en situación de subordinación social, política o institucional respecto a otra lengua, independientemente del número de hablantes (p. ej., el gallego frente al castellano en ciertos ámbitos).",modelSolution:"Una lengua minoritaria es aquella con un número reducido de hablantes, sin que ello implique necesariamente desventaja social; por ejemplo, el alemán en España. En cambio, una lengua minorizada es aquella en situación de subordinación social, política o institucional frente a otra lengua, independientemente de su número de hablantes; por ejemplo, el gallego en ciertos ámbitos frente al castellano."},

{block:12,type:"open",meta:"Conceptos · Glotofobia",prompt:"Define «glotofobia» y explica brevemente una situación en la que se manifieste.",rubric:"Glotofobia: discriminación o rechazo hacia una persona por su forma de hablar (acento, variedad). Ejemplo: «el murciano es el acento más feo» o negar empleo a alguien por su acento.",modelSolution:"La glotofobia es la discriminación o rechazo hacia una persona por su forma de hablar, ya sea por su acento, su variedad dialectal o su sociolecto. Por ejemplo, se manifiesta en afirmaciones como «el murciano es el acento más feo», donde se atribuye un valor negativo a una variedad dialectal, o en situaciones laborales donde se rechaza a un candidato por su acento."},

{block:12,type:"open",meta:"Identificación · Variedad diatópica (voseo rioplatense)",prompt:"Identifica la variedad diatópica utilizada y pon un ejemplo del texto que la justifique.",quote:"«Qué le vas a hacer, ñato, cuando estás abajo todos te fajan. Todos, che, hasta el más maula. Te sacuden contra las sogas, te encajan la biaba. Andá, andá, qué venís con consuelos vos».",rubric:"Español de América (variedad rioplatense/argentina). Rasgos: voseo (vos, venís, andá), americanismos (biaba = paliza, che, maula). El voseo consiste en el uso del pronombre vos en lugar de tú, con formas verbales específicas.",modelSolution:"La variedad diatópica utilizada es el español de América, concretamente la variedad rioplatense o argentina. Un ejemplo que lo justifica es el voseo: el pronombre «vos» y las formas verbales «venís» y «andá», características de esta variedad. Aparecen además americanismos como «biaba» (paliza) y el vocativo «che», propios del español del Río de la Plata."},

{block:12,type:"open",meta:"Identificación · Variedad diatópica (andaluz)",prompt:"Identifica la variedad diatópica utilizada y pon un ejemplo del texto que la justifique.",quote:"«Mare, me jeché arena zobre la quemaúra. Te yamé, te yamé dejde er camino... ¡Nunca ejtubo ejto tan zolo! Laj yama me comían, mare, y yo te yamaba, y tú nunca benía!».",rubric:"Variedad meridional: andaluz. Rasgos: aspiración/pérdida de la /s/ final (laj yama, ejto), yeísmo (yamé por llamé), aspiración de otros sonidos (dejde por desde), ceceo (tan zolo), sonorización de la /b/ fricativa (benía).",modelSolution:"La variedad diatópica utilizada es el andaluz, una variedad meridional del español. Lo justifican rasgos como: la aspiración o pérdida de la /s/ final («laj yama», «ejto»), el yeísmo («yamé» por «llamé»), la aspiración de otros sonidos («dejde» por «desde») y el ceceo («tan zolo»). Todos estos son rasgos fonológicos propios del andaluz."},

{block:12,type:"open",meta:"Identificación · Code-switching",prompt:"Identifica el concepto sociolingüístico presente en el siguiente enunciado y justifica tu respuesta.",quote:"«En una conversación cambia del catalán al español según con quién hable».",rubric:"Alternancia lingüística (code-switching): cambio de código entre dos lenguas en función del interlocutor o la situación. No es un error sino una estrategia comunicativa normal en contextos bilingües.",modelSolution:"El concepto sociolingüístico presente es la alternancia lingüística (code-switching). Se produce porque el hablante cambia de lengua (del catalán al español) en función del interlocutor y la situación comunicativa. Este fenómeno no constituye un error, sino una estrategia habitual en contextos bilingües para adaptarse al contexto y facilitar la comunicación."},

{block:12,type:"open",meta:"Identificación · Nivel culto",prompt:"Identifica el concepto sociolingüístico presente en el siguiente enunciado y justifica tu respuesta.",quote:"«El conferenciante utiliza un léxico preciso y estructuras complejas, y evita repeticiones innecesarias en su discurso».",rubric:"Nivel culto: alta competencia lingüística, léxico preciso, estructuras sintácticas complejas, discurso bien organizado. Propio de hablantes con formación elevada.",modelSolution:"Se trata del nivel culto (variedad diastrática alta). El conferenciante demuestra una alta competencia lingüística: usa léxico preciso, estructuras sintácticas complejas y un discurso bien organizado. Estos rasgos son propios de hablantes con formación elevada que emplean la lengua de manera elaborada y consciente."},

{block:12,type:"open",meta:"Identificación · Español estándar",prompt:"Identifica el concepto sociolingüístico presente en el siguiente enunciado y justifica tu respuesta.",quote:"«En los informativos de televisión los presentadores utilizan una pronunciación neutra y evitan rasgos propios de su región para que todos los espectadores comprendan el mensaje».",rubric:"Español estándar: variedad supradialectal que evita rasgos locales para facilitar la comprensión. Función unificadora en contextos formales como los medios de comunicación.",modelSolution:"Se trata del español estándar. Es una variedad supradialectal que evita rasgos locales para facilitar la comprensión entre todos los hablantes. Se caracteriza por su prestigio y su función unificadora, especialmente en contextos formales como los medios de comunicación."},

{block:12,type:"open",meta:"Análisis · Prejuicios (texto de Rinconete)",prompt:"Analiza el siguiente fragmento utilizando terminología sociolingüística adecuada e identifica los prejuicios y estereotipos lingüísticos presentes.",quote:"«Frente a la sequedad de la pronunciación de las clases bajas o rurales, los pijos intentan adornar su habla no solo a través del léxico, sino también con la pronunciación. De ahí que sean tan cantarines como un gallego o un argentino, aunque de forma más sui generis».",rubric:"Variedades diastráticas (clases bajas vs. pijos). Prejuicios lingüísticos: atribución de cualidades negativas (sequedad, adornar con sentido irónico) a determinadas pronunciaciones. Estereotipos: «cantarinos» para gallego o argentino, generalización subjetiva sin base objetiva.",modelSolution:"El fragmento presenta valoraciones de variedades diastráticas al asociar formas de hablar con clases sociales (clases bajas frente a pijos). Aparecen prejuicios lingüísticos: se atribuyen cualidades negativas («sequedad») y se ironiza sobre el intento de «adornar» el habla. También hay estereotipos lingüísticos: calificar el gallego o el argentino de «cantarinos» es una generalización subjetiva sin base objetiva que simplifica rasgos de estas variedades."},

{block:12,type:"open",meta:"Análisis · Fenómenos lingüísticos (look)",prompt:"Analiza el siguiente fragmento e identifica los fenómenos lingüísticos presentes (préstamos, alternancia lingüística, registro…).",quote:"«Este look me lo volvería a poner, este look me gusta, es un look que cromáticamente me gusta. Me da gustera el lila con el cremita. También el hecho de que tenga silk, el silk lo hace sentirse como expensive. La bota así medio rota lo hace sentir más grounded».",rubric:"Préstamos del inglés: look (integrado), silk. Code-switching: expensive, grounded (cambio de lengua dentro del enunciado). Registro coloquial: repeticiones, «me da gustera» (expresión subjetiva informal). Sufijos apreciativos: cremita.",modelSolution:"En el fragmento aparecen varios fenómenos sociolingüísticos. Hay préstamos del inglés integrados en el español: «look» y «silk». También se produce alternancia lingüística (code-switching) en términos como «expensive» y «grounded», donde se cambia directamente al inglés dentro del enunciado en español. El registro es coloquial: las repeticiones («este look me gusta»), el uso de sufijos apreciativos («cremita») y expresiones subjetivas informales («me da gustera») son propios de la conversación espontánea."},

{block:12,type:"open",meta:"V/F razonado · Diversidad lingüística",prompt:"Indica si las siguientes afirmaciones son verdaderas o falsas y justifica brevemente cada una.",quote:"a) «La diversidad lingüística dificulta el desarrollo humano».\\nb) «Es posible que en el futuro exista una única lengua estable durante mucho tiempo».\\nc) «Algunas lenguas son más completas que otras».",rubric:"a) Falsa: la diversidad es fuente de riqueza cultural y cognitiva. b) Falsa: aunque pudiera darse, la lengua acabaría fragmentándose en variedades. c) Falsa: todas las lenguas son igualmente válidas; la idea de que unas son más completas responde a prejuicios sociales.",modelSolution:"a) Falsa. La diversidad lingüística es una fuente de riqueza cultural y permite comprender mejor la capacidad del lenguaje humano; no dificulta el desarrollo sino que lo enriquece.\\nb) Falsa. Aunque pudiera existir una sola lengua de forma temporal, acabaría fragmentándose en variedades, pues la diversidad es inherente a las lenguas.\\nc) Falsa. Todas las lenguas son igualmente válidas y capaces de expresar cualquier realidad; considerarlas más o menos completas responde a prejuicios sociales, no a criterios lingüísticos."},

{block:12,type:"open",meta:"Reflexión · Prejuicio sobre los jóvenes",prompt:"Explica por qué la afirmación «los jóvenes hablan peor que antes» puede constituir un prejuicio lingüístico.",rubric:"Parte de una visión normativa que equipara cambio lingüístico con deterioro. Los jóvenes son agentes de innovación. Las variaciones no implican empeoramiento sino adaptación a nuevos contextos.",modelSolution:"Esta afirmación es un prejuicio lingüístico porque equipara el cambio lingüístico con un deterioro, cuando en realidad las lenguas evolucionan constantemente. Los jóvenes son agentes habituales de innovación lingüística que incorporan nuevas formas expresivas adaptadas a su grupo social y sus contextos comunicativos. Estas variaciones no implican un empeoramiento de la lengua, sino una adaptación natural."},

{block:12,type:"open",meta:"Identificación · Estereotipo lingüístico",prompt:"Identifica el concepto sociolingüístico presente y justifica tu respuesta.",quote:"«Se considera que el italiano es un idioma muy musical, mientras que el alemán es áspero, por lo que algunas lenguas serían más adecuadas que otras para expresar emociones».",rubric:"Estereotipo lingüístico: se atribuyen características subjetivas a lenguas sin base objetiva. Prejuicio lingüístico: se establece una jerarquía entre lenguas. Ambas valoraciones carecen de base científica.",modelSolution:"El concepto presente es el estereotipo lingüístico: se atribuyen características generales y subjetivas a lenguas concretas («musical», «áspero») sin base lingüística objetiva. Además se observa un prejuicio lingüístico al establecer una jerarquía implícita entre lenguas según su idoneidad para expresar emociones. Ambas valoraciones responden a factores culturales y sociales, no a criterios científicos."},

{block:12,type:"open",meta:"Reflexión · Una lengua = una nación",prompt:"Explica por qué la afirmación «una lengua corresponde siempre a una nación» es incorrecta desde el punto de vista sociolingüístico.",rubric:"No existe correspondencia directa entre lengua y nación: un país puede tener varias lenguas (España, Suiza) y una lengua puede hablarse en varios países (español). Las lenguas responden a procesos históricos, sociales y culturales, no a fronteras políticas.",modelSolution:"Esta afirmación es incorrecta porque no existe una correspondencia directa entre lengua y nación. Un mismo país puede tener varias lenguas oficiales (como España o Suiza) y una misma lengua puede hablarse en diferentes países (como el español). Las lenguas no se ajustan a las fronteras políticas sino que responden a procesos históricos, sociales y culturales."},

{block:12,type:"open",meta:"Conceptos · Diferencia dialecto y variedad lingüística",prompt:"Explica la diferencia entre «dialecto» y «variedad lingüística» utilizando terminología adecuada.",rubric:"Dialecto: variedad diatópica con rasgos propios en pronunciación, léxico o gramática. Variedad lingüística: concepto más amplio que incluye dialectos (diatópica), sociolectos (diastrática) y registros (diafásica).",modelSolution:"Un dialecto es una variedad diatópica asociada a un territorio que presenta rasgos propios en la pronunciación, el léxico o la gramática. En cambio, el concepto de variedad lingüística es más amplio: incluye todas las formas que puede adoptar una lengua según factores geográficos (dialectos), sociales (sociolectos) o situacionales (registros o variedades diafásicas)."},

{block:12,type:"open",meta:"Conceptos · Interferencia vs. préstamo",prompt:"Explica en 3-4 líneas la diferencia entre «interferencia lingüística» y «préstamo».",rubric:"Interferencia: influencia de una lengua que provoca errores o alteraciones (calcos, estructuras incorrectas), fenómeno no normativo. Préstamo: incorporación de elementos de otra lengua que pasan a integrarse en el sistema lingüístico; puede aceptarse normativamente.",modelSolution:"La interferencia lingüística es la influencia de una lengua sobre otra que provoca alteraciones o errores, como calcos o estructuras incorrectas. El préstamo, en cambio, es la incorporación de elementos de otra lengua (generalmente palabras) que se integran en el sistema lingüístico. Mientras la interferencia suele considerarse no normativa, el préstamo puede aceptarse normativamente si su uso se consolida."},

// STATE

let curB=0,curI=0,answered={},correctCount=0,fillSel={},viewMode='single';

// ── PERSISTENCIA (localStorage) ──────────────────────────
const STORAGE_KEY='prepau_progress_v1';

function saveProgress(){
  try{
    // Save answered, correctCount, fillSel, and per-exercise data
    const exData={};
    EX.forEach((ex,i)=>{
      if(ex._ans||ex._fb||ex._chosenIdx!==undefined||ex._listExpanded){
        exData[i]={
          ans:ex._ans||null,
          fb:ex._fb||null,
          chosenIdx:ex._chosenIdx!==undefined?ex._chosenIdx:null,
          listExpanded:ex._listExpanded||false,
          modelSolution:ex.modelSolution||null,
        };
      }
    });
    localStorage.setItem(STORAGE_KEY,JSON.stringify({
      answered,correctCount,fillSel,viewMode,exData
    }));
  }catch(e){}
}

function loadProgress(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data=JSON.parse(raw);
    if(data.answered)   answered=data.answered;
    if(data.correctCount!==undefined) correctCount=data.correctCount;
    if(data.fillSel)    fillSel=data.fillSel;
    if(data.viewMode)   viewMode=data.viewMode;
    if(data.exData){
      Object.entries(data.exData).forEach(([i,d])=>{
        const ex=EX[+i];
        if(!ex) return;
        if(d.ans)            ex._ans=d.ans;
        if(d.fb)             ex._fb=d.fb;
        if(d.chosenIdx!==null) ex._chosenIdx=d.chosenIdx;
        if(d.listExpanded)   ex._listExpanded=d.listExpanded;
      });
    }
  }catch(e){}
}

function resetAllProgress(){
  if(!confirm('¿Seguro que quieres borrar todo tu progreso? Esta acción no se puede deshacer.')) return;
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  answered={};correctCount=0;fillSel={};viewMode='single';
  EX.forEach(ex=>{ ex._ans=null;ex._fb=null;ex._chosenIdx=undefined;ex._listExpanded=false; });
  rHdr();rEx();updStats();saveProgress();
}

const bExs=()=>EX.filter(e=>e.block===curB);
const ek=e=>EX.indexOf(e);

function buildNav(){
  const c=document.getElementById('nav-c');c.innerHTML='';
  BLOCKS.forEach((b,i)=>{
    const bt=document.createElement('button');
    bt.className='nb'+(i===0?' active':'');bt.id='tab-'+i;
    bt.innerHTML=`<span class="dot"></span>${b.title}<span class="cnt" id="cnt-${i}">0</span>`;
    bt.onclick=()=>swB(i);
    c.appendChild(bt);
  });
}
function swB(b){
  curB=b;curI=0;fillSel={};
  document.querySelectorAll('.nb').forEach((bt,i)=>bt.classList.toggle('active',i===b));
  // Make sure app view is visible (user might click sidebar from homepage)
  document.getElementById('homepage').classList.add('hidden');
  document.getElementById('app-view').classList.add('visible');
  rHdr();rEx();
  if(window.innerWidth<=820)toggleSB();
}
function toggleSB(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('ovl').classList.toggle('open');
}

// MAIN RENDER

function rEx(){
  if(viewMode==='list') return rExList();
  const exs=bExs();
  if(!exs.length){document.getElementById('ea').innerHTML='<p style="color:var(--ink3)">Sin ejercicios.</p>';return;}
  curI=Math.min(curI,exs.length-1);
  const ex=exs[curI];const key=ek(ex);const done=!!answered[key];

  let h=`<div class="ex-card"><div class="ex-meta-row"><div class="ex-meta">${ex.meta}</div>${statusBadge(key,done,ex)}</div><div class="ex-prompt">${ex.prompt}</div>`;
  if(ex.quote) h+=`<div class="ex-quote">${ex.quote.replace(/\n/g,'<br>')}</div>`;

  if(ex.type==='cl-text')      h+=bClText(ex);
  else if(ex.type==='open')   h+=bOpen(key,ex,done);
  else if(ex.type==='mcq'||ex.type==='vocab-mcq') h+=bMCQ(key,ex,done);
  else if(ex.type==='sent-mcq') h+=bSentMCQ(key,ex,done);
  else if(ex.type==='fill'||ex.type==='paronyms') h+=bFill(key,ex,done);
  else if(ex.type==='join')   h+=bJoin(key,ex,done);
  else if(ex.type==='glossary-app') h+=bGlossary();
  else if(ex.type==='pau-exam')    h+=bPauExam();

  h+=`</div>`;
  if(ex.type!=='glossary-app'&&ex.type!=='pau-exam'){
  h+=`<div class="nr">
    <button class="btn bg2" onclick="nav(-1)" ${curI===0?'disabled':''}>← Anterior</button>
    <span class="ni">${curI+1} / ${exs.length}</span>
    <button class="btn bg2" onclick="nav(1)" ${curI===exs.length-1?'disabled':''}>Siguiente →</button>
  </div>`;

  }
  document.getElementById('ea').innerHTML=h;
  updStats();

  if(done&&(ex.type==='open'||ex.type==='join')&&!ex._fb){
    const el=document.getElementById('fb-'+key);
    if(el) getFB(key,ex,ex._ans,el);
  }
}

function statusBadge(key,done,ex){
  if(ex.type==='cl-text'||ex.type==='glossary-app'||ex.type==='pau-exam') return '';
  if(!done) return '<span class="lv-status pending">Pendiente</span>';
  // For MCQ/sent-mcq we know if correct
  if(ex.type==='mcq'||ex.type==='vocab-mcq'||ex.type==='sent-mcq'){
    const wasCorrect=ex._chosenIdx!==undefined?ex.options[ex._chosenIdx].correct
      : ex.options.some((o,i)=>o.correct&&fillSel[key+'-0']===undefined);
    // Simplify: just show done
    return '<span class="lv-status done-ok">✓ Hecho</span>';
  }
  if(ex.type==='fill'||ex.type==='paronyms'){
    const all=ex.items.every((_,i)=>fillSel[`${key}-${i}`]);
    if(all){
      const r=ex.items.filter((it,i)=>fillSel[`${key}-${i}`]===it.answer).length;
      return r===ex.items.length
        ? '<span class="lv-status done-ok">✓ Perfecto</span>'
        : `<span class="lv-status done-no">${r}/${ex.items.length} correctos</span>`;
    }
  }
  return '<span class="lv-status done-ok">✓ Enviado</span>';
}

function rExList(){
  const exs=bExs();
  if(!exs.length){document.getElementById('ea').innerHTML='<p style="color:var(--ink3)">Sin ejercicios.</p>';return;}
  const ea=document.getElementById('ea');
  ea.classList.add('list-view');

  let h='';
  exs.forEach((ex,i)=>{
    const key=ek(ex);
    const done=!!answered[key];
    const expanded=ex._listExpanded||ex.type==='cl-text'||false;
    const collapsedCls=expanded?'':'lv-collapsed';

    h+=`<div class="ex-card ${collapsedCls}" id="lvc-${key}">
      <div class="ex-meta-row">
        <div class="ex-meta">${ex.meta}</div>
        ${statusBadge(key,done,ex)}
      </div>
      <div class="ex-prompt">${ex.prompt}</div>`;

    if(ex.quote) h+=`<div class="ex-quote">${ex.quote.replace(/\n/g,'<br>')}</div>`;

    // Full exercise content
    if(ex.type==='cl-text')      h+=bClText(ex);
  else if(ex.type==='open')   h+=bOpen(key,ex,done);
    else if(ex.type==='mcq'||ex.type==='vocab-mcq') h+=bMCQ(key,ex,done);
    else if(ex.type==='sent-mcq') h+=bSentMCQ(key,ex,done);
    else if(ex.type==='fill'||ex.type==='paronyms') h+=bFill(key,ex,done);
    else if(ex.type==='join')   h+=bJoin(key,ex,done);
    else if(ex.type==='glossary-app') h+=bGlossary();
    else if(ex.type==='pau-exam')    h+=bPauExam();

    // Expand button (visible only when collapsed via CSS)
    h+=`<button class="lv-expand-btn" onclick="lvExpand(${key})">
      Ver ejercicio
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>`;

    h+=`</div>`;
  });

  ea.innerHTML=h;
  updStats();

  // Trigger pending AI feedback for expanded done exercises
  exs.forEach(ex=>{
    const key=ek(ex);
    const done=!!answered[key];
    if(done&&(ex.type==='open'||ex.type==='join')&&!ex._fb&&ex._listExpanded){
      const el=document.getElementById('fb-'+key);
      if(el) getFB(key,ex,ex._ans,el);
    }
  });
}

function lvExpand(key){
  EX[key]._listExpanded=true;
  const card=document.getElementById('lvc-'+key);
  if(card){
    card.classList.remove('lv-collapsed');
    // Trigger AI feedback if needed
    const ex=EX[key];
    const done=!!answered[key];
    if(done&&(ex.type==='open'||ex.type==='join')&&!ex._fb){
      const el=document.getElementById('fb-'+key);
      if(el) getFB(key,ex,ex._ans,el);
    }
    card.scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function setView(mode){

  const exs=bExs();

  if(ex){
    const key=ek(ex);
    const ta=document.getElementById('ans-'+key);

}

// ── TEXTO LITERARIO (comprensión lectora) ──────────────────────────────────────────
function bClText(ex){
  const key=EX.indexOf(ex);
  const collapsed=ex._textCollapsed||false;
  const btnLabel=collapsed?'Mostrar texto ▼':'Ocultar texto ▲';
  const bodyStyle=collapsed?'display:none':'';
  const formatted=ex.text.replace(/\\n\\n/g,'</p><p>').replace(/\\n/g,' ');
  return `<div class="text-card">
    <div class="text-card-label">Texto</div>
    <button class="text-toggle-btn" id="txt-btn-${key}" onclick="toggleText(${key})">${btnLabel}</button>
    <div class="text-card-body" id="txt-body-${key}" style="${bodyStyle}"><p>${formatted}</p></div>
    <div class="text-card-author">${ex.author}</div>
  </div>`;
}

function toggleText(key){
  const ex=EX[key];
  ex._textCollapsed=!ex._textCollapsed;
  const body=document.getElementById('txt-body-'+key);
  const btn=document.getElementById('txt-btn-'+key);
  if(ex._textCollapsed){
    body.style.display='none';
    btn.textContent='Mostrar texto ▼';
  } else {
    body.style.display='';
    btn.textContent='Ocultar texto ▲';
  }
}

// ── OPEN (expresión escrita / corrección) ─────────────────────────────────
function bOpen(key,ex,done){
  let h=`<textarea id="ans-${key}" placeholder="${ex.placeholder||''}" ${done?'readonly':''}>${ex._ans||''}</textarea>
  <div class="btn-row">
    <button class="btn bp" onclick="subOpen(${key})" ${done?'disabled':''}>Enviar →</button>
    ${done?`<button class="btn bg2" onclick="resetEx(${key})">Reintentar</button>`:''}
  </div>`;

  // Solución modelo (solo en expresión escrita, block 0)
  if(ex.block===0){
    if(ex.modelSolution){
      h+=`<div class="modelo-box">
        <div class="modelo-head" onclick="toggleModelo(this)">
          <span>Solución modelo</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="modelo-body">${ex.modelSolution}</div>
      </div>`;
    } else {
      h+=`<div class="modelo-box">
        <div class="modelo-head" style="cursor:default">
          <span>Solución modelo</span>
          <span style="font-size:10px;opacity:.6;font-style:italic;text-transform:none">Próximamente</span>
        </div>
        <div class="modelo-pending">El profesor añadirá la solución modelo próximamente.</div>
      </div>`;
    }
  }

  // AI feedback
  if(done){
    h+=`<div class="fb"><div class="fbh"><span class="fbd ${ex._fb?'':'loading'}"></span>Corrección IA</div>
    <div class="fbb ${ex._fb?'':'loading'}" id="fb-${key}">${ex._fb||'Analizando tu respuesta...'}</div></div>`;
  }
  return h;
}

// ── MCQ estándar ──────────────────────────────────────────────────────────
function bMCQ(key,ex,done){
  let h=`<div class="ol">`;
  ex.options.forEach((o,i)=>{
    const c=done?(o.correct?' correct':' wrong'):'';
    h+=`<button class="ob${c}" onclick="pickMCQ(${key},${i})" ${done?'disabled':''}>
      <span class="ltr">${String.fromCharCode(65+i)}</span><span>${o.text}</span></button>`;
  });
  h+=`</div>`;
  if(done) h+=`<div class="expl"><strong>Explicación</strong>${ex.explanation}</div>`;
  return h;
}

// ── SENT-MCQ (oraciones como opciones) ───────────────────────────────────
function bSentMCQ(key,ex,done){
  let h=`<div class="ol">`;
  ex.options.forEach((o,i)=>{
    let cls='';
    if(done) cls=o.correct?' correct':' wrong';
    h+=`<button class="sent-opt${cls}" onclick="pickSentMCQ(${key},${i})" ${done?'disabled':''}>
      <span class="ltr">${String.fromCharCode(65+i)}</span>
      <span>${o.text}</span>
    </button>`;
  });
  h+=`</div>`;
  if(done){
    // mostramos la explicación de la opción correcta + la que eligió si era incorrecta
    const chosen=ex._chosenIdx!==undefined?ex._chosenIdx:-1;
    h+=`<div class="expl"><strong>Explicación</strong>${ex.explanation}`;
    if(chosen>=0 && !ex.options[chosen].correct){
      h+=`<br><br><em>Por qué tu respuesta es incorrecta:</em> ${ex.options[chosen].expl}`;
    }
    h+=`</div>`;
  }
  return h;
}

// ── FILL / PARONYMS ───────────────────────────────────────────────────────
function bFill(key,ex,done){
  let h='';
  ex.items.forEach((it,i)=>{
    const ch=fillSel[`${key}-${i}`];const show=done||ch;
    h+=`<div class="fi"><div class="fs2">${it.sentence}</div><div class="fo">`;
    it.options.forEach(o=>{
      let c='';if(show){c=o===it.answer?' correct':(o===ch&&o!==it.answer?' wrong':'');}
      h+=`<button class="fo-btn${c}" onclick="pickF(${key},${i},'${o}')" ${show?'disabled':''}>${o}</button>`;
    });
    h+=`</div></div>`;
  });
  const all=ex.items.every((_,i)=>fillSel[`${key}-${i}`]);
  if(!done) h+=`<div class="btn-row"><button class="btn bp" onclick="subFill(${key})" ${all?'':'disabled'}>Comprobar</button></div>`;
  else{
    const r=ex.items.filter((it,i)=>fillSel[`${key}-${i}`]===it.answer).length;
    h+=`<div class="expl"><strong>${r}/${ex.items.length} correctos</strong>Verde = correcto · Rojo = incorrecto</div>`;
  }
  return h;
}

// ── JOIN ──────────────────────────────────────────────────────────────────
function bJoin(key,ex,done){
  let h=`<div class="ji"><div class="jp">${ex.parts.map((p,i)=>`<strong>${i===0?'A':'B'}.</strong> ${p}`).join('<br>')}</div>
  <input class="jinput" id="join-${key}" type="text" placeholder="${ex.placeholder||''}" value="${ex._ans||''}" ${done?'readonly':''}></div>
  <div class="btn-row">
    <button class="btn bp" onclick="subJoin(${key})" ${done?'disabled':''}>Enviar →</button>
    ${done?`<button class="btn bg2" onclick="resetEx(${key})">Reintentar</button>`:''}
  </div>`;
  if(done){
    h+=`<div class="fb"><div class="fbh"><span class="fbd ${ex._fb?'':'loading'}"></span>Corrección IA</div>
    <div class="fbb ${ex._fb?'':'loading'}" id="fb-${key}">${ex._fb||'Analizando tu oración...'}</div></div>`;
  }
  return h;
}

// ACTIONS
// ══════════════════════════════════════════
function pickMCQ(key,idx){
  if(answered[key]) return;
  answered[key]=true;EX[key]._listExpanded=true;
  if(EX[key].options[idx].correct) correctCount++;
  rEx();updStats();saveProgress();
}
function pickSentMCQ(key,idx){
  if(answered[key]) return;
  EX[key]._chosenIdx=idx;
  answered[key]=true;EX[key]._listExpanded=true;
  if(EX[key].options[idx].correct) correctCount++;
  rEx();updStats();saveProgress();
}
function pickF(key,ii,val){fillSel[`${key}-${ii}`]=val;EX[key]._listExpanded=true;rEx();}
function subFill(key){
  const ex=EX[key];
  const r=ex.items.filter((it,i)=>fillSel[`${key}-${i}`]===it.answer).length;
  answered[key]=true;EX[key]._listExpanded=true;if(r===ex.items.length) correctCount++;
  rEx();updStats();saveProgress();
}
function subOpen(key){
  const ta=document.getElementById('ans-'+key);
  const v=ta?.value?.trim()||'';
  if(v.length<10){ta.style.borderColor='#F87171';setTimeout(()=>ta.style.borderColor='',1200);return;}
  EX[key]._ans=v;EX[key]._listExpanded=true;answered[key]=true;rEx();updStats();saveProgress();
}
function subJoin(key){
  const inp=document.getElementById('join-'+key);
  const v=inp?.value?.trim()||'';
  if(v.length<5){inp.style.borderColor='#F87171';setTimeout(()=>inp.style.borderColor='',1200);return;}
  EX[key]._ans=v;EX[key]._listExpanded=true;answered[key]=true;rEx();updStats();saveProgress();
}
function resetEx(key){
  delete answered[key];EX[key]._fb=null;EX[key]._ans=null;EX[key]._chosenIdx=undefined;EX[key]._listExpanded=true;
  rEx();
}
function nav(dir){
  const exs=bExs();const ex=exs[curI];
  if(ex){
    const key=ek(ex);
    const ta=document.getElementById('ans-'+key);if(ta&&!answered[key]) ex._ans=ta.value;
    const ji=document.getElementById('join-'+key);if(ji&&!answered[key]) ex._ans=ji.value;
  }
  curI+=dir;rEx();window.scrollTo({top:0,behavior:'smooth'});
}

// AI FEEDBACK
// ══════════════════════════════════════════
async function getFB(key,ex,answer,el){
  const apiKey=GEMINI_KEY;
  if(!apiKey){
    el.classList.remove('loading');
    el.innerHTML='<span style="color:#991B1B">⚠️ La corrección IA no está configurada.</span>';
    const dot=el.closest('.fb')?.querySelector('.fbd');if(dot) dot.classList.remove('loading');
    return;
  }
  try{
    const sys=`Eres un profesor experto en PAU de Lengua Castellana para 2º de Bachillerato en España. Evalúa con rigor y pedagogía. Devuelve HTML simple (span, br, b). Estructura: 1) Valoración general en una frase. 2) Aciertos con <span style="color:#2D6A4F">✓</span>. 3) Errores con <span style="color:#991B1B">✗</span> y corrección. 4) Consejo breve. Sin markdown. Rúbrica interna: ${ex.rubric}`;
    const msg=`Ejercicio: ${ex.prompt}\n${ex.quote?'Texto: '+ex.quote:''}\n${ex.parts?'Partes: '+ex.parts.join(' / '):''}\nRespuesta del alumno:\n${answer}`;
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:sys}]},
        contents:[{role:'user',parts:[{text:msg}]}],
        generationConfig:{maxOutputTokens:900}
      })
    });
    const data=await r.json();
    if(data.error){
      el.classList.remove('loading');
      el.innerHTML=`<span style="color:#991B1B">⚠️ Error de API: ${data.error.message||'Comprueba que la API key es correcta.'}</span>`;
      const dot=el.closest('.fb')?.querySelector('.fbd');if(dot) dot.classList.remove('loading');
      return;
    }
    const text=data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'No se pudo obtener corrección.';
    EX[key]._fb=text;
    el.classList.remove('loading');el.innerHTML=text;
    const dot=el.closest('.fb')?.querySelector('.fbd');if(dot) dot.classList.remove('loading');
  }catch(e){el.innerHTML='Error de conexión. Inténtalo de nuevo.';}
}
