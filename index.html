// Funciones sintácticas — tipo test (11 preguntas del PDF)
{block:3,type:"sent-mcq",meta:"Función sint. · 1 — sopa recalentada",prompt:"¿Cuál es la función sintáctica de «la sopa recalentada» en: «Comieron en un restaurante la sopa recalentada»?",
options:[
  {text:"CD (complemento directo)",correct:true, expl:"«La sopa recalentada» es el objeto directo del verbo comer: responde a «¿qué comieron?»"},
  {text:"CLA (complemento locativo argumental)",correct:false,expl:"El CLA aquí es «en un restaurante», no la sopa."},
  {text:"CN (complemento del nombre)",correct:false,expl:"El CN modifica a un nombre; aquí no depende de ningún SN."},
  {text:"CCL (complemento circunstancial de lugar)",correct:false,expl:"CCL es «en un restaurante». La sopa es el objeto de la acción."},
],explanation:"«La sopa recalentada» es el CD: responde a «¿qué comieron?» y puede pronominalizarse por «la» (La comieron en un restaurante)."},

{block:3,type:"sent-mcq",meta:"Función sint. · 2 — Me estoy comiendo",prompt:"¿Qué función tiene «Me» en: «Me estoy comiendo un helado»?",
options:[
  {text:"CD (complemento directo)",correct:false,expl:"El CD es «un helado», no «me»."},
  {text:"CI argumental",correct:false,expl:"No hay CI argumental aquí; el beneficiario de comer es el propio sujeto."},
  {text:"Marca de pasiva refleja",correct:false,expl:"No es pasiva refleja; hay un CD explícito («un helado»)."},
  {text:"Dativo aspectual (dativo de interés propio)",correct:true,expl:"«Me» es un dativo aspectual o de interés: el sujeto realiza la acción en beneficio propio. Añade un matiz de implicación personal."},
],explanation:"«Me» en «Me estoy comiendo un helado» es un dativo aspectual (de interés propio): no cambia el significado básico pero añade implicación del sujeto en la acción."},

{block:3,type:"sent-mcq",meta:"Función sint. · 3 — Vive en Madrid",prompt:"¿Cuál es la función de «en Madrid» en: «Vive en Madrid desde hace años»?",
options:[
  {text:"CCL (circunstancial de lugar)",correct:false,expl:"Podría parecerlo, pero «vivir» selecciona obligatoriamente el lugar, así que es argumental."},
  {text:"CLA (complemento locativo argumental)",correct:true,expl:"«Vivir» selecciona el lugar como argumento obligatorio; sin él la oración queda incompleta (*Vive desde hace años)."},
  {text:"CRV (complemento de régimen verbal)",correct:false,expl:"El CRV va introducido por una preposición fija exigida por el verbo semánticamente, como «confiar en» o «depender de»."},
  {text:"Atributo",correct:false,expl:"El atributo aparece con verbos copulativos (ser/estar/parecer), no con «vivir»."},
],explanation:"«En Madrid» es CLA: el verbo «vivir» exige un locativo como argumento interno. La prueba: *«Vive desde hace años» resulta incompleta sin el lugar."},

{block:3,type:"sent-mcq",meta:"Función sint. · 4 — para su hermana",prompt:"¿Qué función tiene «para su hermana» en: «Compró un regalo para su hermana»?",
options:[
  {text:"CD (complemento directo)",correct:false,expl:"El CD es «un regalo»."},
  {text:"CI (complemento indirecto)",correct:false,expl:"El CI suele pronominalizarse por «le/les» y requiere verbo de transferencia con destinatario directo."},
  {text:"CC Beneficiario",correct:true,expl:"«Para su hermana» es un adjunto beneficiario: indica para quién se compra, pero no es el destinatario argumental del verbo comprar."},
  {text:"CRV (complemento de régimen verbal)",correct:false,expl:"«Comprar» no selecciona un CRV con «para»."},
],explanation:"«Para su hermana» es un CC Beneficiario (adjunto): indica el destinatario final del regalo pero no es argumento obligatorio de «comprar» como sí lo sería en «enviar algo a alguien»."},

{block:3,type:"sent-mcq",meta:"Función sint. · 5 — libro de historia",prompt:"¿Qué función tiene «de historia» en: «El libro de historia es muy interesante»?",
options:[
  {text:"CD",correct:false,expl:"No hay CD en oraciones copulativas."},
  {text:"CN (complemento del nombre)",correct:true,expl:"«De historia» complementa al nombre «libro» dentro del SN sujeto; indica la clase o tipo de libro."},
  {text:"CCL",correct:false,expl:"No indica lugar."},
  {text:"CI",correct:false,expl:"No hay CI en esta oración."},
],explanation:"«De historia» es CN: depende del nombre «libro» y especifica su tipo. Forma parte del SN «el libro de historia»."},

{block:3,type:"sent-mcq",meta:"Función sint. · 6 — gripazo del trabajo",prompt:"¿Qué función tiene «con un gripazo del trabajo» en: «Llegó con un gripazo del trabajo»?",
options:[
  {text:"CC instrumento",correct:false,expl:"El instrumento implica un objeto usado para hacer algo; aquí se describe un estado del sujeto."},
  {text:"Predicativo",correct:true,expl:"«Con un gripazo» describe el estado del sujeto («llegó enfermo/con gripe») a la vez que el evento verbal; es predicativo orientado al sujeto."},
  {text:"CCM (circunstancial de modo)",correct:false,expl:"El CCM describe la manera de realizar la acción, no el estado del sujeto."},
  {text:"CCCompañía",correct:false,expl:"La compañía implica que llegó acompañado de alguien, no de una enfermedad."},
],explanation:"«Con un gripazo» es un predicativo orientado al sujeto: predica simultáneamente del sujeto y del verbo. Indica el estado en que llegó, como «llegó enfermo»."},

{block:3,type:"sent-mcq",meta:"Función sint. · 7 — reparado por el mecánico",prompt:"¿Qué función tiene «por el mecánico» en: «El coche fue reparado por el mecánico»?",
options:[
  {text:"CRV",correct:false,expl:"El CRV es un complemento de régimen exigido semánticamente por el verbo, no el agente de una pasiva."},
  {text:"Complemento agente",correct:true,expl:"En la pasiva perifrástica, el agente que realiza la acción se expresa con «por + SN». Aquí «el mecánico» es quien repara."},
  {text:"Sujeto",correct:false,expl:"El sujeto es «el coche» (sujeto paciente en la pasiva)."},
  {text:"CD",correct:false,expl:"En la pasiva, el CD de la activa pasa a ser sujeto; no hay CD en esta oración."},
],explanation:"«Por el mecánico» es el complemento agente de la pasiva perifrástica. En la versión activa sería el sujeto: «El mecánico reparó el coche»."},

{block:3,type:"sent-mcq",meta:"Función sint. · 8 — que me lo recomendó",prompt:"¿Qué función tiene «que me lo recomendó» en: «La persona que me lo recomendó es alemana»?",
options:[
  {text:"Sujeto",correct:false,expl:"El sujeto es «La persona que me lo recomendó» como conjunto, no solo la subordinada."},
  {text:"CD",correct:false,expl:"No es un complemento directo; la oración principal es copulativa."},
  {text:"Atributo",correct:false,expl:"El atributo es «alemana»."},
  {text:"Complemento del nombre (CN) / subordinada relativa especificativa",correct:true,expl:"«Que me lo recomendó» es una subordinada relativa especificativa que complementa al nombre «persona», funcionando como CN dentro del SN sujeto."},
],explanation:"«Que me lo recomendó» es una relativa especificativa, función CN dentro del SN «La persona que me lo recomendó». Especifica de qué persona se habla."},

{block:3,type:"sent-mcq",meta:"Función sint. · 9 — con quién estás hablando",prompt:"¿Qué función tiene «con quién estás hablando» en: «No sabes con quién estás hablando»?",
options:[
  {text:"CCCompañía",correct:false,expl:"No es adjunto circunstancial; es un argumento del verbo saber."},
  {text:"CD (subordinada sustantiva interrogativa indirecta)",correct:true,expl:"«Con quién estás hablando» es una subordinada sustantiva interrogativa indirecta que funciona como CD del verbo «saber»."},
  {text:"CRV",correct:false,expl:"«Saber» no selecciona CRV con preposición fija."},
  {text:"Atributo",correct:false,expl:"No hay verbo copulativo."},
],explanation:"«Con quién estás hablando» es CD de «saber»: es una subordinada sustantiva interrogativa indirecta. Pronominalizamos: «No lo sabes» → CD confirmado."},

{block:3,type:"sent-mcq",meta:"Función sint. · 10 — que pienses eso",prompt:"¿Qué función tiene «que pienses eso» en: «Me asusta que pienses eso»?",
options:[
  {text:"CCCompañía",correct:false,expl:"No es adjunto circunstancial."},
  {text:"CD",correct:false,expl:"«Asustar» con sujeto oracional no toma CD sino sujeto."},
  {text:"Sujeto",correct:true,expl:"«Que pienses eso» es el sujeto de «asustar»: es lo que provoca el susto. Prueba: *«Eso me asusta» → sujeto. Verbo no concuerda con «me»."},
  {text:"CRV",correct:false,expl:"«Asustar» no selecciona CRV."},
],explanation:"«Que pienses eso» es sujeto de «asustar»: los verbos psicológicos (asustar, gustar, molestar…) toman un sujeto que expresa la causa del estado psicológico."},

{block:3,type:"sent-mcq",meta:"Función sint. · 11 — Te oí llorar",prompt:"¿Qué función tiene «llorar» en: «Te oí llorar en la habitación»?",
options:[
  {text:"CD",correct:false,expl:"«Te» ya es el CD; «llorar» no puede serlo también."},
  {text:"Sujeto",correct:false,expl:"El sujeto es el hablante (tácito)."},
  {text:"Predicativo",correct:true,expl:"«Llorar» es el predicativo del CD «te»: forma parte de la percepción (oír [a alguien] [hacer algo]). Es una construcción de verbos de percepción + infinitivo predicativo."},
  {text:"CCM",correct:false,expl:"No indica modo, sino el estado/acción del CD percibido."},
],explanation:"En construcciones de percepción (ver, oír, sentir + CD + infinitivo), el infinitivo es predicativo del CD: «te oí [a ti] [llorar]». Describe lo que hace el complemento directo."},

// Tipos de subordinadas — 14 preguntas MCQ
{block:4,type:"sent-mcq",meta:"Subordinadas · 1 — que hayas venido",prompt:"«Me alegra que hayas venido.» ¿Qué tipo de subordinada es «que hayas venido»?",
options:[
  {text:"Subordinada relativa libre",correct:false,expl:"Las relativas libres no tienen antecedente y funcionan como SN (lo que, quien...)."},
  {text:"Subordinada sustantiva de sujeto",correct:true,expl:"«Alegrar» es verbo psicológico que selecciona sujeto: «que hayas venido» es lo que alegra → sujeto."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa; expresa el argumento sujeto del verbo psicológico."},
  {text:"Subordinada sustantiva de CD",correct:false,expl:"Los verbos psicológicos del tipo «alegrar» seleccionan sujeto oracional, no CD."},
],explanation:"«Que hayas venido» es subordinada sustantiva de sujeto. Los verbos psicológicos como «alegrar, molestar, gustar» seleccionan un sujeto (la causa del estado) que puede ser oracional."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 2 — que compré ayer",prompt:"«El libro que compré ayer es muy interesante.» ¿Qué tipo de subordinada es «que compré ayer»?",
options:[
  {text:"Subordinada sustantiva",correct:false,expl:"No cumple función de SN; es modificadora del nombre «libro»."},
  {text:"Subordinada adverbial",correct:false,expl:"No expresa relación adverbial (tiempo, modo, causa…)."},
  {text:"Subordinada relativa especificativa",correct:true,expl:"Modifica al nombre «libro» sin comas, restringiendo el referente (de todos los libros, el que compré ayer)."},
  {text:"Subordinada relativa explicativa",correct:false,expl:"La explicativa va entre comas y no restringe el referente; aquí no hay comas."},
],explanation:"«Que compré ayer» es relativa especificativa: modifica al nombre «libro» sin comas, identificando cuál de entre todos los libros posibles."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 3 — porque estaba cansado",prompt:"«No salí porque estaba cansado.» ¿Qué tipo de subordinada es «porque estaba cansado»?",
options:[
  {text:"Subordinada relativa semilibre",correct:false,expl:"Las semilibres tienen antecedente implícito y funcionan como SN."},
  {text:"Subordinada sustantiva término de preposición",correct:false,expl:"No funciona como SN sino como adjunto causal."},
  {text:"Subordinada adverbial consecutiva",correct:false,expl:"La consecutiva expresa efecto de una causa («tan X que Y»)."},
  {text:"Subordinada adverbial causal",correct:true,expl:"«Porque estaba cansado» expresa la causa de no salir. Nexo causal: «porque»."},
],explanation:"«Porque estaba cansado» es subordinada adverbial causal: introduce la razón o motivo de la acción principal mediante el nexo «porque»."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 4 — cuando llegue a casa",prompt:"«Te llamaré cuando llegue a casa.» ¿Qué tipo de subordinada es «cuando llegue a casa»?",
options:[
  {text:"Subordinada sustantiva",correct:false,expl:"No funciona como SN."},
  {text:"Subordinada relativa libre",correct:false,expl:"No hay pronombre relativo con antecedente implícito."},
  {text:"Subordinada adverbial temporal",correct:true,expl:"«Cuando llegue a casa» expresa el momento en que ocurrirá la acción principal. Nexo temporal: «cuando»."},
  {text:"Subordinada adverbial concesiva",correct:false,expl:"La concesiva expresa un obstáculo que no impide la acción (aunque, a pesar de que…)."},
],explanation:"«Cuando llegue a casa» es subordinada adverbial temporal: indica el momento en que se producirá la acción. El subjuntivo («llegue») se usa porque el evento es futuro."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 5 — para que aprueben",prompt:"«Trabaja mucho para que aprueben el examen.» ¿Qué tipo de subordinada es «para que aprueben el examen»?",
options:[
  {text:"Subordinada adverbial final",correct:true,expl:"Expresa la finalidad o propósito de trabajar mucho. Nexo final: «para que» + subjuntivo."},
  {text:"Subordinada relativa especificativa",correct:false,expl:"No modifica ningún nombre."},
  {text:"Subordinada sustantiva término de preposición",correct:false,expl:"Aunque lleva «para», la relación es de finalidad adverbial, no sustantiva."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa sino finalidad (propósito)."},
],explanation:"«Para que aprueben» es subordinada adverbial final: expresa el propósito de la acción principal. Las finales llevan «para que / con el fin de que» + subjuntivo."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 6 — si vendrá mañana",prompt:"«No sé si vendrá mañana.» ¿Qué tipo de subordinada es «si vendrá mañana»?",
options:[
  {text:"Subordinada sustantiva parcial",correct:false,expl:"Las parciales van introducidas por pronombre/adverbio interrogativo (qué, cuándo, cómo…)."},
  {text:"Subordinada sustantiva interrogativa indirecta total",correct:true,expl:"«Si vendrá» es interrogativa indirecta total (sí/no), CD de «saber». «Si» introduce la pregunta total indirecta."},
  {text:"Subordinada adverbial condicional",correct:false,expl:"En las condicionales «si» introduce una condición; aquí introduce una pregunta encubierta."},
  {text:"Subordinada adverbial temporal",correct:false,expl:"No expresa tiempo."},
],explanation:"«Si vendrá mañana» es subordinada sustantiva interrogativa indirecta total: funciona como CD de «saber» y equivale a la pregunta directa «¿Vendrá mañana?»."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 7 — que digas eso",prompt:"«Me molesta que digas eso delante de todos.» ¿Qué tipo es «que digas eso»?",
options:[
  {text:"Subordinada sustantiva de CD",correct:false,expl:"«Molestar» es verbo psicológico que selecciona sujeto, no CD."},
  {text:"Subordinada sustantiva de sujeto",correct:true,expl:"«Que digas eso» es la causa del malestar → sujeto de «molestar»."},
  {text:"Subordinada relativa",correct:false,expl:"No hay antecedente nominal que modificar."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa sino el sujeto oracional del verbo psicológico."},
],explanation:"«Que digas eso» es subordinada sustantiva de sujeto: los verbos psicológicos como «molestar» toman como sujeto aquello que provoca el estado emocional."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 8 — dónde dejé las llaves",prompt:"«No recuerdo dónde dejé las llaves.» ¿Qué tipo es «dónde dejé las llaves»?",
options:[
  {text:"Subordinada adverbial de lugar",correct:false,expl:"No es adjunto adverbial de la oración principal; es argumento del verbo recordar."},
  {text:"Subordinada sustantiva interrogativa indirecta de CD",correct:true,expl:"Funciona como CD de «recordar» e introduce una pregunta parcial encubierta (¿dónde dejé las llaves?)."},
  {text:"Subordinada relativa libre",correct:false,expl:"Las relativas libres equivalen a «el lugar donde», no a una pregunta indirecta."},
  {text:"Subordinada sustantiva interrogativa de CI",correct:false,expl:"No es CI; «recordar» selecciona CD, no CI."},
],explanation:"«Dónde dejé las llaves» es subordinada sustantiva interrogativa indirecta parcial con función de CD: equivale a «¿Dónde dejé las llaves?» y es el objeto del verbo recordar."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 9 — Los que llegaron tarde",prompt:"«Los que llegaron tarde no entraron.» ¿Qué tipo es «los que llegaron tarde»?",
options:[
  {text:"Subordinada relativa libre con función de sujeto",correct:false,expl:"La relativa libre no lleva artículo antecedente; aquí «los» es el núcleo del SN."},
  {text:"Subordinada relativa semilibre con función de sujeto",correct:true,expl:"«Los que llegaron tarde» = artículo + relativa; el artículo actúa como núcleo nominal implícito. Es una relativa semilibre (o con antecedente incorporado)."},
  {text:"Subordinada sustantiva con función de sujeto",correct:false,expl:"No está introducida por conjunción «que» completiva."},
  {text:"Subordinada adverbial temporal",correct:false,expl:"No expresa tiempo como adjunto; es sujeto de la oración."},
],explanation:"«Los que llegaron tarde» es una relativa semilibre: el artículo «los» funciona como núcleo nominal (= «las personas que llegaron tarde»). El conjunto ejerce de sujeto."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 10 — lo cual nos sorprendió",prompt:"«Llegó tarde, lo cual nos sorprendió mucho.» ¿Qué tipo es «lo cual nos sorprendió mucho»?",
options:[
  {text:"Subordinada relativa explicativa con antecedente oracional",correct:true,expl:"«Lo cual» tiene como antecedente toda la oración anterior («Llegó tarde»). Es relativa explicativa (con coma) de antecedente oracional."},
  {text:"Subordinada sustantiva de CD",correct:false,expl:"No funciona como argumento de un verbo; es relativa con antecedente oracional."},
  {text:"Subordinada adverbial consecutiva",correct:false,expl:"Las consecutivas llevan «tan/tanto… que», no «lo cual»."},
  {text:"Subordinada relativa especificativa",correct:false,expl:"La especificativa no va entre comas y no tiene antecedente oracional."},
],explanation:"«Lo cual nos sorprendió mucho» es una subordinada relativa explicativa con antecedente oracional: el pronombre relativo «lo cual» retoma toda la proposición anterior."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 11 — de que nadie lo escucha",prompt:"«Se queja de que nadie lo escucha.» ¿Qué tipo es «de que nadie lo escucha»?",
options:[
  {text:"Subordinada sustantiva de CD",correct:false,expl:"El CD iría sin preposición; aquí hay «de» porque es CRV."},
  {text:"Subordinada sustantiva de CRV",correct:true,expl:"«Quejarse de» selecciona un CRV; la subordinada sustantiva funciona como término de esa preposición argumental."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa; es el complemento de régimen verbal del verbo quejarse."},
  {text:"Subordinada adverbial concesiva",correct:false,expl:"No hay valor concesivo."},
],explanation:"«De que nadie lo escucha» es subordinada sustantiva de CRV: el verbo «quejarse» selecciona obligatoriamente la preposición «de», y la subordinada es término de esa preposición."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 12 — aunque esté cansado",prompt:"«Iré contigo, aunque esté cansado.» ¿Qué tipo es «aunque esté cansado»?",
options:[
  {text:"Subordinada adverbial causal",correct:false,expl:"No expresa causa sino un obstáculo que no impide la acción."},
  {text:"Subordinada adverbial concesiva",correct:true,expl:"«Aunque» + subjuntivo expresa un obstáculo que no impide la acción principal. Es adverbial concesiva."},
  {text:"Subordinada sustantiva término de preposición",correct:false,expl:"No funciona como SN complemento de preposición."},
  {text:"Subordinada relativa",correct:false,expl:"No hay antecedente nominal."},
],explanation:"«Aunque esté cansado» es subordinada adverbial concesiva: presenta un obstáculo (el cansancio) que no impide la acción. El subjuntivo añade matiz de hipótesis."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 13 — por la que no vino",prompt:"«Esa es la razón por la que no vino.» ¿Qué tipo es «por la que no vino»?",
options:[
  {text:"Subordinada sustantiva término de preposición",correct:false,expl:"No funciona como SN sino como modificadora del nombre «razón»."},
  {text:"Subordinada relativa especificativa con antecedente expreso",correct:true,expl:"«Por la que» es pronombre relativo con antecedente «razón». Especifica cuál razón: la que motivó no venir."},
  {text:"Subordinada relativa libre",correct:false,expl:"La relativa libre no tiene antecedente expreso."},
  {text:"Subordinada adverbial causal",correct:false,expl:"No es adjunto causal; es relativa que modifica al nombre «razón»."},
],explanation:"«Por la que no vino» es subordinada relativa especificativa con antecedente expreso «razón»: identifica cuál es la razón. El pronombre relativo «la que» lleva la preposición «por» que exige el verbo."},

{block:4,type:"sent-mcq",meta:"Subordinadas · 14 — quien me ayude",prompt:"«No tengo quien me ayude.» ¿Qué tipo es «quien me ayude»?",
options:[
  {text:"Subordinada relativa semilibre especificativa",correct:false,expl:"Las semilibres llevan artículo (los que, la que…); «quien» es relativo libre."},
  {text:"Subordinada sustantiva sujeto",correct:false,expl:"No es sujeto; funciona como CD de «tener»."},
  {text:"Subordinada de relativo libre de sujeto",correct:false,expl:"No es sujeto."},
  {text:"Subordinada de relativo libre de complemento directo",correct:true,expl:"«Quien me ayude» es CD de «tener»: equivale a «No tengo [una persona que me ayude]». Es relativa libre porque «quien» lleva el antecedente implícito."},
],explanation:"«Quien me ayude» es una subordinada relativa libre funcionando como CD: «quien» incluye el antecedente («la persona que») y el conjunto actúa como objeto de «tener»."},

// Pares mínimos avanzados
{block:1,type:"sent-mcq",meta:"Par mínimo · «hacer» vs. «estornudar»",prompt:"¿Por qué es agramatical «*Juan hizo» pero gramatical «Juan estornudó»?",
options:[
  {text:"Porque «hacer» es transitivo y exige CD; «estornudar» es inergativo y solo selecciona sujeto.",correct:true,expl:"Correcto. «Hacer» requiere un objeto directo sin el que no puede usarse (*Juan hizo). «Estornudar» es inergativo: solo necesita sujeto agente."},
  {text:"Porque «hacer» y «estornudar» son verbos ditransitivos.",correct:false,expl:"Ninguno de los dos es ditransitivo."},
  {text:"Porque «hacer» puede omitir el CD en uso absoluto.",correct:false,expl:"«Hacer» NO puede omitir el CD en uso absoluto; es subcategorización obligatoria."},
  {text:"Porque «hacer» necesita siempre un complemento circunstancial.",correct:false,expl:"«Hacer» no exige CC sino CD."},
],explanation:"«Hacer» es transitivo estricto: su CD es argumento obligatorio. Sin él la oración es agramatical. «Estornudar» es inergativo: el sujeto agente es el único argumento; no selecciona CD."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «óptima» vs. «buena»",prompt:"¿Por qué «*Es una situación muy óptima» es agramatical pero «Es una situación muy buena» es gramatical?",
options:[
  {text:"Las dos son gramaticales, pero una indica grado mayor.",correct:false,expl:"No; «muy óptima» es agramatical por razones morfológicas."},
  {text:"«Buena» es agramatical porque la expresión correcta es «mejor».",correct:false,expl:"«Buena» es perfectamente gramatical con grado positivo."},
  {text:"«Óptima» es superlativo absoluto y no admite adverbios de grado como «muy».",correct:true,expl:"«Óptimo» ya es superlativo absoluto (≈ «muy bueno»); añadir «muy» genera redundancia morfológica agramatical."},
  {text:"La palabra «óptima» no existe.",correct:false,expl:"«Óptima» existe y es gramatical; el problema es su combinación con «muy»."},
],explanation:"«Óptimo/a» es superlativo absoluto sintético (del latín *optimus*): ya contiene el significado de 'el mejor / muy bueno'. Añadir «muy» produce una doble gradación agramatical."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «Esos» vs. «Numerosos»",prompt:"¿Por qué «*Numerosos entraron en casa» es agramatical pero «Esos entraron en casa» es gramatical?",
options:[
  {text:"La 2 es agramatical porque falta el sujeto.",correct:false,expl:"Ambas tienen sujeto; el problema es la categoría del determinante."},
  {text:"La 1 es agramatical porque falta sujeto.",correct:false,expl:"«Esos» puede funcionar como pronombre demostrativo → sujeto válido."},
  {text:"La 1 es agramatical porque los determinantes con núcleo tácito no pueden ser sujeto.",correct:false,expl:"Los determinantes demostrativos SÍ pueden funcionar como pronombres (sujeto)."},
  {text:"La 2 es agramatical porque los adjetivos determinativos con núcleo tácito no pueden ser sujeto preverbal.",correct:true,expl:"«Numerosos» es adjetivo determinativo que necesita un nombre que modificar; sin núcleo nominal explícito no puede legitimar el sujeto preverbal."},
],explanation:"«Esos» es determinante demostrativo que puede pronominalizarse (= «esas personas»). «Numerosos» es adjetivo determinativo que necesita un nombre: *«numerosos» solo es agramatical como sujeto preverbal."},

{block:1,type:"sent-mcq",meta:"Par mínimo · predicativo y alcance",prompt:"¿Cuál es la diferencia entre «María llevaba a su hijo al colegio la mar de tranquilo» y «la mar de tranquila»?",
options:[
  {text:"La oración con «tranquilo» es agramatical porque un niño nunca va tranquilo al colegio.",correct:false,expl:"La gramaticalidad no depende del contenido sino de la concordancia del predicativo."},
  {text:"«Tranquila» es agramatical porque «hijo» es masculino.",correct:false,expl:"«Tranquila» es gramatical; concuerda con el sujeto femenino «María»."},
  {text:"Las dos son gramaticales pero el alcance del predicativo cambia: «tranquilo» se orienta al CD («hijo»); «tranquila» se orienta al sujeto («María»).",correct:true,expl:"«Tranquilo» (masc.) concuerda con «hijo» (CD) → predicativo del CD. «Tranquila» (fem.) concuerda con «María» (sujeto) → predicativo del sujeto."},
  {text:"Las dos son gramaticales y el predicativo afecta al circunstancial.",correct:false,expl:"El predicativo afecta al sujeto o al CD, no al CC."},
],explanation:"La concordancia del predicativo revela su orientación: «tranquilo» (masc.) se orienta al CD «hijo»; «tranquila» (fem.) se orienta al sujeto «María». Ambas son gramaticales con distinto significado."},

{block:7,type:"sent-mcq",meta:"Morfología · jerarquía — interminable",prompt:"¿Cuál es la jerarquía correcta de formación de «interminable»?",
options:[
  {text:"término > terminable > interminable",correct:false,expl:"La base verbal es «terminar», no el sustantivo «término»."},
  {text:"terminar > terminable > interminable",correct:true,expl:"terminar [verbo] → terminable [sufijo -ble: 'que puede terminarse'] → interminable [prefijo in-: negación]. Derivación en dos pasos."},
  {text:"terminar > interminar > interminable",correct:false,expl:"*«Interminar» no existe como paso intermedio."},
  {text:"minar > minable > interminable",correct:false,expl:"La base no es «minar» sino «terminar»."},
],explanation:"«Interminable»: terminar → terminable (sufijo -ble) → interminable (prefijo in-). Primero se añade el sufijo que crea el adjetivo, luego el prefijo negativo."},

{block:7,type:"sent-mcq",meta:"Morfología · jerarquía — desigualdades",prompt:"¿Cuál es la jerarquía correcta de formación de «desigualdades»?",
options:[
  {text:"igual > iguales > desiguales > desigualdades",correct:false,expl:"No se parte de la forma plural ni se añade «des-» al adjetivo."},
  {text:"igual > igualdad > igualdades > desigualdades",correct:false,expl:"No se pluraliza antes de añadir el prefijo."},
  {text:"igual > igualdad > desigualdad > desigualdades",correct:true,expl:"igual [adj.] → igualdad [-dad: sustantivo abstracto] → desigualdad [des-: negación] → desigualdades [-es: plural]. Cuatro pasos."},
  {text:"igual > iguales > desigualdad > desigualdades",correct:false,expl:"El plural del adjetivo no es un paso en la formación del sustantivo."},
],explanation:"«Desigualdades»: igual → igualdad (sufijo -dad) → desigualdad (prefijo des-) → desigualdades (morfema de plural -es). Proceso de derivación con tres afijos."},

{block:7,type:"sent-mcq",meta:"Morfología · jerarquía — desenamoramiento",prompt:"¿Cuál es la jerarquía correcta de formación de «desenamoramiento»?",
options:[
  {text:"amor > desamor > desenamorar > desenamoramiento",correct:false,expl:"«Desamor» no es paso necesario; el prefijo des- se añade al verbo."},
  {text:"amor > amar > enamoramiento > desenamoramiento",correct:false,expl:"No se puede añadir «des-» directamente a «enamoramiento»; hay un paso verbal intermedio."},
  {text:"amor > desamor > desamoramiento > desenamoramiento",correct:false,expl:"*«Desamoramiento» no existe."},
  {text:"amor > enamorar > desenamorar > desenamoramiento",correct:true,expl:"amor → enamorar [en- + amor + -ar] → desenamorar [des-] → desenamoramiento [-miento]."},
],explanation:"«Desenamoramiento»: amor → enamorar (parasíntesis: en- + -ar) → desenamorar (des-) → desenamoramiento (-miento). Cuatro etapas con prefijos y sufijos acumulados."},

{block:7,type:"sent-mcq",meta:"Morfología · jerarquía — indiscriminadamente",prompt:"¿Cuál es la jerarquía correcta de formación de «indiscriminadamente»?",
options:[
  {text:"discriminación > discriminar > discriminada > indiscriminada > indiscriminadamente",correct:false,expl:"La base correcta es el verbo, no el sustantivo."},
  {text:"discriminar > discriminada > indiscriminada > indiscriminadamente",correct:true,expl:"discriminar → discriminada [-ada: participio/adj.] → indiscriminada [in-: negación] → indiscriminadamente [-mente: adverbio]. Cuatro pasos."},
  {text:"discriminar > discriminación > discriminadamente > indiscriminadamente",correct:false,expl:"*«Discriminadamente» no existe como paso intermedio real."},
  {text:"discriminar > indiscriminar > indiscriminada > indiscriminadamente",correct:false,expl:"*«Indiscriminar» no existe."},
],explanation:"discriminar → discriminada (participio/adj.) → indiscriminada (prefijo in-) → indiscriminadamente (sufijo -mente). El adverbio en -mente siempre se forma sobre adjetivo."},

options:[

  {text:"Palabra derivada",correct:false,expl:"La derivación añade afijos derivativos que crean nueva palabra. Los morfemas de 'refugios' son solo flexivos (género y número)."},
  {text:"Palabra compuesta",correct:false,expl:"La composición une dos o más bases léxicas. 'Refugios' tiene una sola base léxica."},

],explanation:"Palabra simple: [refugio + s]. La base 'refugio' no se puede descomponer en morfemas derivativos; solo se le añaden los morfemas flexivos de género (∅) y número (-s)."},

{block:7,type:"mcq",meta:"Formación de palabras · refugios (análisis)",

  {text:"re- (prefijo) + fug- (raíz) + -ios (sufijo)",correct:false,expl:"Aunque 're-' y 'fug-' existen en latín, en español moderno 'refugio' no se analiza sincrónicamente como derivada de 'fugio'. Es una palabra simple."},

  {text:"refug- (raíz) + -io (sufijo) + -s (número)",correct:false,expl:"El análisis sincrónico no segmenta 'refugio' en raíz + sufijo en español actual. Es una palabra simple."},
],explanation:"[refugio + s]: lexema 'refugio' + ∅ morfema flexivo de género masculino + -s morfema flexivo de número plural. Palabra simple."},

{block:7,type:"mcq",meta:"Formación de palabras · fotofobia (tipo)",

options:[

  {text:"Palabra derivada",correct:false,expl:"La derivación añade afijos (prefijos o sufijos) a una base léxica libre. Aquí ambos elementos son raíces ligadas, no afijos."},

{block:7,type:"mcq",meta:"Formación de palabras · fotofobia (análisis)",
prompt:"¿Cuál es el análisis morfológico correcto de «fotofobia»?",

  {text:"foto- (prefijo) + fobia (raíz libre)",correct:false,expl:"'Foto-' no es prefijo sino raíz ligada: no puede aparecer sola ni tiene función gramatical de prefijo. Los prefijos son morfemas gramaticales."},

  {text:"Ninguna es correcta.",correct:false,expl:"Sí hay una opción correcta."},
],explanation:"La coma de vocativo cambia radicalmente el significado: CON coma = 'oye, María, ellos no saben nada' (apelación). SIN coma = 'María es quien no sabe nada' (sujeto)."},

{block:4,type:"sent-mcq",meta:"Puntuación · Vamos a comprar",prompt:"¿Cuál de las dos opciones es correcta para expresar que vais a comprar a unos chicos (personas)?",
options:[
  {text:"Vamos a comprar, chicos.",correct:false,expl:"La coma convierte 'chicos' en vocativo: alguien se dirige a los chicos proponiéndoles ir a comprar."},
  {text:"Vamos a comprar chicos.",correct:true,expl:"Sin coma, 'chicos' es el CD del verbo comprar: el objeto comprado son los chicos (sentido literal o figurado)."},
  {text:"Las dos son correctas.",correct:false,expl:"Tienen significados diferentes; solo una expresa lo pedido."},
  {text:"Ninguna es correcta.",correct:false,expl:"Sí hay una correcta."},
],explanation:"SIN coma: 'chicos' = CD (compramos chicos). CON coma: 'chicos' = vocativo (nos dirigimos a ellos). La coma de vocativo cambia la función sintáctica del SN."},

{block:4,type:"sent-mcq",meta:"Puntuación · relativa explicativa",prompt:"¿Cuál de las dos opciones es gramaticalmente correcta para una relativa explicativa?",
options:[
  {text:"María que vive en Barcelona vendrá mañana.",correct:false,expl:"Sin comas, la relativa es especificativa: implica que hay varias Marías y solo vendrá la de Barcelona."},
  {text:"María, que vive en Barcelona, vendrá mañana.",correct:true,expl:"Con comas, la relativa es explicativa: añade información sobre la única María mencionada, sin restringir el referente."},
  {text:"Las dos son correctas.",correct:false,expl:"Tienen significados y estructuras diferentes."},
  {text:"María que vive en Barcelona, vendrá mañana.",correct:false,expl:"La coma sola al final no basta; necesita coma también al abrir la relativa."},
],explanation:"Las relativas EXPLICATIVAS van entre comas y aportan información adicional (puede suprimirse). Las ESPECIFICATIVAS van sin comas y restringen el referente."},

{block:0,type:"open",meta:"Coherencia · Ejercicio 22",prompt:"Reescribe el texto para mejorar su coherencia y explica qué cambios has realizado y por qué.",quote:"«En mi ciudad hay muchos parques donde la gente pasea y hace deporte al aire libre. Los árboles ayudan a mejorar la calidad del aire y a reducir la contaminación. Además, es importante cuidar el medio ambiente para tener una vida más saludable. El otro día fui al cine con mis amigos y vimos una película muy interesante. Los parques también son un buen lugar para descansar y desconectar del ruido de la ciudad. Por eso, cada vez más personas utilizan la bicicleta para moverse.»",
placeholder:"",rubric:"Debe: 1) Eliminar la oración del cine (rompe la unidad temática). 2) Unificar el tema (parques/medioambiente). 3) Reorganizar las ideas en orden lógico (beneficios→consecuencias). 4) Explicar cada cambio justificando coherencia temática y progresión de la información."},

{block:0,type:"open",meta:"Coherencia · Ejercicio 23 — ¿por qué mejora?",prompt:"Explica por qué las correcciones del texto mejorado son más adecuadas para una argumentación PAU.",quote:"ORIGINAL: «La alimentación es muy importante y hay que comer bien para estar sano. Yo ayer me comí una hamburguesa enorme y estaba brutal. También es bueno hacer deporte y esas cosas. La fruta tiene vitaminas y tal, aunque a veces no apetece mucho. En general hay que cuidarse porque si no luego te encuentras fatal.»\n\nCORREGIDO: «La alimentación equilibrada es fundamental para mantener una buena salud. Consumir alimentos ricos en nutrientes, como frutas y verduras, aporta vitaminas esenciales para el organismo. Además, la práctica regular de ejercicio físico contribuye al bienestar general. De modo que la adopción de hábitos saludables resulta clave para prevenir problemas de salud.»",
placeholder:"",rubric:"Debe explicar: 1) Eliminación de registro coloquial y anécdotas personales (inadecuados en argumentación PAU). 2) Uso de léxico preciso y abstracto (alimentación equilibrada, práctica regular). 3) Conectores argumentativos que marcan la progresión lógica. 4) Generalización vs. particularización (yo→el ser humano/las personas)."},

{block:0,type:"open",meta:"Conectores equivalentes · 24",prompt:"Sustituye los conectores del texto por otros equivalentes manteniendo el significado.",quote:"«La actividad física es fundamental para la salud, ya que mejora la condición física y reduce el estrés. Además, contribuye al bienestar emocional. Sin embargo, muchas personas no practican ejercicio con regularidad. Por eso, es importante fomentar hábitos saludables desde una edad temprana.»",
placeholder:"",rubric:"'ya que'→puesto que/dado que/porque. 'Además'→asimismo/del mismo modo/igualmente. 'Sin embargo'→no obstante/pero/con todo. 'Por eso'→por lo tanto/en consecuencia/de ahí que. Penalizar cambio de relación lógica."},

{block:0,type:"open",meta:"Tesis, arg. y contraarg. · 27 (teletrabajo)",prompt:"Identifica la tesis, el argumento y el contraargumento del texto. Después, sustituye los conectores por equivalentes.",quote:"«El teletrabajo ha mejorado la calidad de vida de muchos empleados, ya que permite conciliar mejor la vida laboral y personal. Sin embargo, algunos opinan que reduce la productividad y dificulta el trabajo en equipo. Aun así, muchas empresas siguen apostando por este modelo. Por ello, es necesario encontrar un equilibrio entre ambas modalidades.»",
placeholder:"",rubric:"Tesis: primera oración (el teletrabajo ha mejorado la calidad de vida). Argumento: cláusula causal ('ya que permite conciliar...'). Contraargumento: 'Sin embargo, algunos opinan...'. Refutación: 'Aun así, muchas empresas...'. Conectores: 'ya que'→puesto que, 'Sin embargo'→no obstante, 'Aun así'→con todo, 'Por ello'→por lo tanto."},

// ── BLOQUE 13: Clasificación y comparación de oraciones ───────────────────
{block:4,type:"sent-mcq",meta:"Modalidad · Me gustaría que apruebes",prompt:"¿Cómo se clasifica la oración «Me gustaría que apruebes el examen»?",
options:[
  {text:"Desiderativa o de optativo con verbo principal en condicional",correct:true,expl:"'Me gustaría' expresa deseo en condicional; la subordinada va en subjuntivo. Es una oración compuesta desiderativa."},
  {text:"Interrogativa indirecta",correct:false,expl:"No hay pregunta encubierta; expresa un deseo."},
  {text:"Enunciativa afirmativa simple",correct:false,expl:"No es simple (tiene subordinada) ni meramente enunciativa."},
  {text:"Exclamativa",correct:false,expl:"No hay exclamación ni entonación exclamativa."},
],explanation:"«Me gustaría que apruebes el examen» es una oración compuesta desiderativa: el verbo principal en condicional ('gustaría') expresa deseo; la subordinada sustantiva en subjuntivo es su sujeto."},

{block:4,type:"sent-mcq",meta:"Modalidad · ¿Me puedes acercar la sal?",prompt:"¿Cómo se clasifica «¿Me puedes acercar la sal?»?",
options:[
  {text:"Interrogativa directa total con valor de petición (acto de habla indirecto)",correct:true,expl:"Formalmente es interrogativa total, pero pragmáticamente funciona como petición cortés (acto de habla indirecto)."},
  {text:"Interrogativa parcial",correct:false,expl:"No hay pronombre interrogativo parcial (quién, qué, cuándo…)."},
  {text:"Imperativa",correct:false,expl:"Gramaticalmente no es imperativa, aunque pragmáticamente funcione como orden suavizada."},
  {text:"Enunciativa",correct:false,expl:"No afirma ni niega; pregunta (aunque con función de petición)."},
],explanation:"Es una interrogativa total con función pragmática de petición (acto de habla indirecto): la forma es una pregunta pero el propósito es pedir que pasen la sal."},

{block:4,type:"sent-mcq",meta:"Modalidad · Se vieron ayer al salir",prompt:"¿Cómo se clasifica «Se vieron ayer al salir de la clase»?",
options:[
  {text:"Enunciativa afirmativa con 'se' recíproco",correct:true,expl:"'Se' indica acción recíproca (el sujeto plural se vio mutuamente). Es enunciativa: afirma un hecho."},
  {text:"Impersonal con 'se'",correct:false,expl:"En las impersonales con 'se' no hay sujeto; aquí el sujeto es el grupo que se vio."},
  {text:"Pasiva refleja",correct:false,expl:"La pasiva refleja requiere CD que pase a sujeto paciente; aquí 'se' es recíproco."},
  {text:"Dubitativa",correct:false,expl:"No expresa duda; afirma un hecho pasado."},
],explanation:"«Se vieron ayer» es enunciativa afirmativa con 'se' recíproco: el sujeto plural realizó la acción el uno sobre el otro. El 'al salir' es una subordinada temporal de infinitivo."},

{block:4,type:"sent-mcq",meta:"Modalidad · El paquete fue enviado",prompt:"¿Cómo se clasifica «El paquete fue enviado hace dos días»?",
options:[
  {text:"Enunciativa afirmativa en voz pasiva perifrástica",correct:true,expl:"'Fue enviado' = pasiva perifrástica (ser + participio). Afirma un hecho. Sujeto paciente: 'el paquete'."},
  {text:"Impersonal con 'se'",correct:false,expl:"La pasiva refleja llevaría 'se envió'; aquí es pasiva perifrástica con 'ser'."},
  {text:"Enunciativa con verbo copulativo",correct:false,expl:"'Ser' aquí forma la pasiva, no es copulativo."},
  {text:"Interrogativa",correct:false,expl:"Es afirmativa, no interrogativa."},
],explanation:"«Fue enviado» es pasiva perifrástica (ser + participio pasado). La oración es enunciativa afirmativa: afirma el hecho de que el paquete fue enviado hace dos días."},

{block:4,type:"open",meta:"Comparación · par activa/pasiva",prompt:"Compara estas dos oraciones y explica qué cambia en su estructura y función informativa.",quote:"(a) Juan compró el coche.\n(b) El coche fue comprado por Juan.",
placeholder:"",rubric:"Estructura: activa (sujeto agente + verbo transitivo + CD) → pasiva perifrástica (sujeto paciente + ser + participio + complemento agente). Función informativa (tema/rema): en (a) Juan es tema → se tematiza al agente; en (b) el coche es tema → se tematiza al paciente. La pasiva permite topicalizar el objeto."},

{block:4,type:"open",meta:"Comparación · dislocación (el coche lo compró Juan)",prompt:"Compara estas dos oraciones y explica qué cambia en su estructura y función informativa.",quote:"(a) Juan compró el coche.\n(b) El coche lo compró Juan.",
placeholder:"",rubric:"(a) Orden canónico SVO. (b) Dislocación a la izquierda: el CD 'el coche' se convierte en tópico (información dada), retomado por el clítico 'lo'. El foco recae sobre 'Juan' al final. No es pasiva; el sujeto sigue siendo agente. Fenómeno de topicalización para reorganizar la estructura informativa."},

{block:4,type:"open",meta:"Comparación · focalización (De eso es de lo que hablaré)",prompt:"Compara estas dos oraciones y explica qué cambia en su estructura y función informativa.",quote:"(a) Hablaré de eso.\n(b) De eso es de lo que hablaré.",
placeholder:"",rubric:"(a) Oración simple con CRV 'de eso'. (b) Oración hendida/ecuacional de relieve (cleft sentence): 'de eso ES de lo que hablaré'. Función: focalización contrastiva del CRV. La construcción copulativa de relieve extrae un constituyente y lo convierte en foco. Contraste posible con 'De eso es de lo que hablaré, no de otra cosa'."},

// ── BLOQUE 14: Funciones completas + pronombres + relacionar ──────────────
{block:3,type:"sent-mcq",meta:"Función sint. · La libreta roja / sobre la mesa",prompt:"¿Qué función tiene «sobre la mesa» en: «La libreta roja está sobre la mesa»?",
options:[
  {text:"CLA (complemento locativo argumental)",correct:true,expl:"'Estar' selecciona un locativo como argumento: *'La libreta roja está' está incompleto sin el lugar."},
  {text:"CCL (circunstancial de lugar)",correct:false,expl:"El CCL es adjunto optativo; aquí el lugar es argumento obligatorio de 'estar'."},
  {text:"Atributo",correct:false,expl:"El atributo caracteriza al sujeto con adjetivos o SN; aquí es un SPrep locativo."},
  {text:"CN (complemento del nombre)",correct:false,expl:"No modifica a ningún nombre; es complemento del verbo."},
],explanation:"«Sobre la mesa» es CLA: el verbo 'estar' exige un locativo como argumento interno (*«La libreta roja está» resulta incompleto). A diferencia del CCL, no es suprimible sin afectar la gramaticalidad."},

{block:3,type:"sent-mcq",meta:"Función sint. · Ayer llegó con gripe",prompt:"¿Qué función tiene «con gripe» en: «Ayer llegó mi hermano con gripe»?",
options:[
  {text:"CC de compañía",correct:false,expl:"La compañía implica una persona que acompaña, no una enfermedad."},
  {text:"Predicativo orientado al sujeto",correct:true,expl:"'Con gripe' describe el estado en que llegó el sujeto ('llegó enfermo/con gripe'). Predica simultáneamente del sujeto y del verbo."},
  {text:"CC de instrumento",correct:false,expl:"El instrumento implica un objeto con el que se realiza la acción."},
  {text:"CC de modo",correct:false,expl:"El modo describe cómo se realiza la acción; 'con gripe' describe el estado del sujeto."},
],explanation:"«Con gripe» es predicativo del sujeto: describe el estado de «mi hermano» en el momento de llegar. Se orienta al sujeto y predica sobre él simultáneamente con el verbo."},

{block:3,type:"sent-mcq",meta:"Función sint. · Andrés vive en su habitación",prompt:"¿Qué función tiene «en su habitación» en: «Andrés vive en su habitación»?",
options:[
  {text:"CCL",correct:false,expl:"El CCL es adjunto; aquí el lugar es argumento seleccionado por 'vivir'."},
  {text:"CLA",correct:true,expl:"'Vivir' selecciona el locativo como argumento: *'Andrés vive' está incompleto sin especificar dónde."},
  {text:"CN",correct:false,expl:"No modifica ningún nombre."},
  {text:"CRV",correct:false,expl:"El CRV exige preposición fija semánticamente seleccionada; 'vivir' no tiene esa restricción preposicional."},
],explanation:"«En su habitación» es CLA: «vivir» exige un locativo como argumento interno. Sin él la oración queda incompleta o indefinida."},

{block:3,type:"sent-mcq",meta:"Función sint. · por la lluvia",prompt:"¿Qué función tiene «por la lluvia» en: «Se anuló el partido por la lluvia»?",
options:[
  {text:"Complemento agente",correct:false,expl:"El complemento agente aparece en pasivas perifrásticas; aquí 'se' no forma pasiva perifrástica."},
  {text:"CC de causa",correct:true,expl:"'Por la lluvia' expresa la causa de la anulación del partido. Es un adjunto causal, no argumento del verbo."},
  {text:"CRV",correct:false,expl:"'Anular' no selecciona obligatoriamente un complemento con 'por'."},
  {text:"CC de modo",correct:false,expl:"No indica cómo se anuló sino por qué."},
],explanation:"«Por la lluvia» es CC de causa: expresa el motivo de la anulación. La preposición «por» introduce causa en adjuntos no argumentales."},

{block:3,type:"sent-mcq",meta:"Función sint. · pese a su esfuerzo",prompt:"¿Qué función tiene «pese a su esfuerzo» en: «No ganó pese a su esfuerzo»?",
options:[
  {text:"CC concesivo",correct:true,expl:"'Pese a' introduce un complemento concesivo: expresa el obstáculo que no impidió la situación (no ganar a pesar del esfuerzo)."},
  {text:"CRV",correct:false,expl:"'Ganar' no selecciona obligatoriamente este complemento."},
  {text:"CC de causa",correct:false,expl:"No es la causa de no ganar; es un obstáculo concesivo."},
  {text:"CN",correct:false,expl:"No modifica ningún nombre."},
],explanation:"«Pese a su esfuerzo» es CC concesivo: la locución preposicional «pese a» introduce un complemento que expresa un obstáculo que no impide la acción principal."},

{block:3,type:"sent-mcq",meta:"Función sint. · me costó 45€",prompt:"¿Qué función tiene «45€» en: «La excursión me costó 45€»?",
options:[
  {text:"CD (complemento directo)",correct:false,expl:"'Costar' no es transitivo en el sentido estándar; no admite pasiva: *'45€ fueron costados'."},
  {text:"Atributo de cantidad / complemento de medida",correct:true,expl:"'Costar' es un verbo pseudocopulativo de precio; '45€' expresa el valor/precio y funciona como atributo o complemento de medida."},
  {text:"CC de cantidad",correct:false,expl:"No es adjunto circunstancial; es argumento del verbo 'costar'."},
  {text:"CI",correct:false,expl:"'Me' es el CI (la persona que paga); '45€' es el precio, no el destinatario."},
],explanation:"«45€» es complemento de precio/medida del verbo «costar». El verbo «costar» es pseudocopulativo de precio: selecciona un argumento que expresa el valor de algo."},

{block:3,type:"sent-mcq",meta:"Función sint. · para correr la maratón",prompt:"¿Qué función tiene «para correr la maratón» en: «Entrenaré mucho para correr la maratón»?",
options:[
  {text:"CC final (subordinada adverbial de finalidad)",correct:true,expl:"'Para + infinitivo' expresa la finalidad del entrenamiento. Es adjunto final."},
  {text:"CRV",correct:false,expl:"'Entrenar' no selecciona obligatoriamente un complemento con 'para'."},
  {text:"CD",correct:false,expl:"No puede ser CD; 'para' impide que funcione directamente como objeto."},
  {text:"Predicativo",correct:false,expl:"No describe el estado del sujeto sino la finalidad de la acción."},
],explanation:"«Para correr la maratón» es CC final: la preposición «para» + infinitivo expresa el propósito del entrenamiento. Es un adjunto no argumental del verbo."},

{block:3,type:"sent-mcq",meta:"Función sint. · mientras puedas",prompt:"¿Qué función tiene «mientras puedas» en: «Hazlo mientras puedas»?",
options:[
  {text:"CC temporal (subordinada adverbial temporal)",correct:true,expl:"'Mientras' introduce una subordinada adverbial temporal: delimita el tiempo durante el que debe hacerse la acción."},
  {text:"CC concesivo",correct:false,expl:"No expresa obstáculo; expresa tiempo."},
  {text:"Subordinada sustantiva de CD",correct:false,expl:"No funciona como SN objeto; es adjunto temporal."},
  {text:"CRV",correct:false,expl:"'Hacer' no selecciona obligatoriamente un complemento temporal con 'mientras'."},
],explanation:"«Mientras puedas» es CC temporal: la conjunción «mientras» introduce una subordinada adverbial que delimita el período durante el que debe realizarse la acción del imperativo."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «muy óptima» (29)",prompt:"«Es una situación muy buena» / «*Es una situación muy óptima». ¿Cuál es la explicación correcta?",
options:[
  {text:"Las dos son gramaticales, pero una indica grado mayor.",correct:false,expl:"No; «muy óptima» es agramatical."},
  {text:"La oración 1 es agramatical porque la expresión correcta es 'mejor'.",correct:false,expl:"«Muy buena» es perfectamente gramatical; «bueno» admite modificación de grado."},
  {text:"La oración 2 es agramatical porque «óptima» es superlativo absoluto y no admite adverbios de grado.",correct:true,expl:"«Óptimo» ya contiene el valor superlativo ('el mejor'). Añadir «muy» es redundante e agramatical."},
  {text:"La oración 2 es agramatical porque la palabra «óptima» no existe.",correct:false,expl:"«Óptima» existe y es correcta; el problema es su combinación con «muy»."},
],explanation:"«Óptimo» es superlativo absoluto sintético (< latín *optimus*): ya incluye el significado de 'muy bueno / el mejor'. Combinarlo con «muy» produce doble gradación agramatical."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «Numerosos» (30)",prompt:"«Esos entraron en casa» / «*Numerosos entraron en casa». ¿Cuál es la explicación correcta?",
options:[
  {text:"La 2 es agramatical porque falta el sujeto.",correct:false,expl:"El problema no es la ausencia de sujeto sino la categoría de «numerosos»."},
  {text:"La 1 es agramatical porque los determinantes con núcleo tácito no pueden ser sujeto.",correct:false,expl:"Los demostrativos SÍ pueden pronominalizarse y funcionar como sujeto."},
  {text:"La 2 es agramatical porque los adjetivos determinativos con núcleo tácito no pueden funcionar como sujeto preverbal.",correct:true,expl:"«Numerosos» necesita un nombre explícito que modificar; sin él no puede legitimar el sujeto preverbal."},
  {text:"Las dos son agramaticales.",correct:false,expl:"La oración 1 es perfectamente gramatical."},
],explanation:"«Esos» es pronombre demostrativo que puede funcionar como sujeto (= 'esas personas'). «Numerosos» es adjetivo determinativo que requiere un nombre; sin él no puede encabezar el SN sujeto."},

{block:1,type:"sent-mcq",meta:"Par mínimo · adjetivo relacional (31)",prompt:"«Una novela muy policíaca» / «Una novela muy entretenida». ¿Cuál es la explicación correcta?",
options:[
  {text:"La 1 es agramatical porque los adjetivos relacionales no pueden ser modificados por un adverbio de grado.",correct:true,expl:"«Policíaca» es relacional (indica tipo o clase); los relacionales no son gradables."},
  {text:"La 2 es agramatical porque los adjetivos calificativos no pueden modificarse por adverbio de grado.",correct:false,expl:"Los calificativos SÍ son gradables («muy entretenida» es gramatical)."},
  {text:"Las dos son agramaticales.",correct:false,expl:"Solo la 1 es agramatical."},
  {text:"Las dos son correctas pero con contraste de significado.",correct:false,expl:"La 1 es agramatical; no hay contraste de significado."},
],explanation:"Los adjetivos RELACIONALES (policíaca, laboral, médico…) indican clase o tipo; no admiten modificación de grado. Los CALIFICATIVOS (entretenida, bonito, cansado…) sí son gradables."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «ciertas personas» (33)",prompt:"«Ciertas personas llegan tarde» / «Antipáticas personas llegan tarde». ¿Cuál es la explicación correcta?",
options:[
  {text:"Las dos son correctas; el adjetivo calificativo en posición preverbal sirve para enfatizar.",correct:false,expl:"«Ciertas» no es calificativo; es determinativo. La gramaticalidad difiere."},
  {text:"La 2 es agramatical porque necesita un determinante.",correct:false,expl:"Un adjetivo calificativo antepuesto puede legitimar el sujeto ('antipáticas personas' es marginal pero no por falta de determinante)."},
  {text:"La 1 es agramatical porque «ciertas» es un adjetivo determinativo que no legitima al sujeto preverbal.",correct:true,expl:"«Ciertas» es determinativo (cuantificador); sin artículo u otro determinante no puede legitimar el sujeto preverbal en posición inicial."},
  {text:"La 1 es agramatical porque «cierto» es adjetivo relacional.",correct:false,expl:"«Cierto» no es relacional; es determinativo/cuantificador."},
],explanation:"«Ciertas» es adjetivo determinativo (cuantificador indefinido): no puede legitimar el sujeto preverbal por sí solo. «Antipáticas» es calificativo y puede anteponerse con valor enfático, lo que hace la oración marginal pero más aceptable."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «está inteligente» (34)",prompt:"«Ana está feliz» / «*Ana está inteligente». ¿Cuál es la explicación correcta?",
options:[
  {text:"Ambas son gramaticales porque los adjetivos calificativos suelen funcionar como atributo.",correct:false,expl:"No todos los adjetivos son compatibles con «estar»."},
  {text:"La 2 es agramatical porque «inteligente» expresa cualidad permanente e «estar» describe estados transitorios.",correct:true,expl:"«Estar» selecciona adjetivos que expresan estados episódicos o cambios. «Inteligente» es una propiedad estable, incompatible con «estar»."},
  {text:"La 2 es agramatical porque «inteligente» es adjetivo relacional.",correct:false,expl:"«Inteligente» es calificativo, no relacional."},
  {text:"La 2 es agramatical porque «estar» no admite atributos en grado positivo.",correct:false,expl:"«Estar» admite atributos en grado positivo ('está contenta', 'está cansada')."},
],explanation:"La distinción ser/estar con adjetivos: «ser» → propiedades estables/inherentes. «Estar» → estados episódicos, transitorios o resultantes de un cambio. «Inteligente» expresa cualidad permanente → incompatible con «estar»."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «Juan ha roto» (49)",prompt:"«*Juan ha roto» / «Juan y Ana han roto». ¿Cuál es la explicación correcta?",
options:[
  {text:"Ambas son agramaticales porque falta el complemento directo.",correct:false,expl:"La 2 es gramatical en contexto."},
  {text:"La 2 es gramatical porque el contexto permite inferir el significado.",correct:false,expl:"El contexto no es la razón; la razón es sintáctica."},
  {text:"La 2 es gramatical porque con sujeto plural «romper» adquiere lectura recíproca y no necesita CD.",correct:true,expl:"Con sujeto plural, «romper» se interpreta como recíproco ('el uno con el otro'): Juan y Ana han roto [su relación mutuamente]. La lectura recíproca satura el argumento interno."},
  {text:"La 2 es gramatical porque «romper» es verbo transitivo y requiere argumento interno.",correct:false,expl:"Precisamente porque es transitivo, el argumento se satura por la lectura recíproca del sujeto plural."},
],explanation:"Con sujeto singular, «romper» exige CD explícito (*Juan ha roto). Con sujeto plural, la lectura recíproca ('el uno con el otro') satura el argumento interno: «Juan y Ana han roto» = 'han roto su relación mutuamente'."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «qué» vs. «que» (50)",prompt:"«Piensan que es normal» / «Piensan qué es normal». ¿Cuál describe correctamente el contraste?",
options:[
  {text:"En la 2, «qué» es conjunción que introduce una subordinada sustantiva.",correct:false,expl:"«Qué» tónico no es conjunción sino pronombre interrogativo."},
  {text:"En la 2, «qué» es un pronombre en función de sujeto.",correct:false,expl:"No es sujeto de la subordinada; es pronombre interrogativo en función de atributo o CD dentro de la subordinada."},
  {text:"En la 1, el «que» átono introduce una subordinada declarativa (CD); en la 2, «qué» tónico introduce una interrogativa indirecta (también CD).",correct:true,expl:"En la 1 'que' es conjunción completiva → CD declarativo. En la 2 'qué' es pronombre interrogativo → CD interrogativo indirecto."},
  {text:"En ambas el elemento subordinante es una conjunción.",correct:false,expl:"En la 2, «qué» es pronombre interrogativo, no conjunción."},
],explanation:"1: «que» átono = conjunción completiva → subordinada sustantiva declarativa (CD). 2: «qué» tónico = pronombre interrogativo → subordinada sustantiva interrogativa indirecta (CD). Mismo función (CD) pero diferente tipo de subordinada."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «se consume» / «me consume» (51)",prompt:"«Este amor se consume» / «Este amor me consume». ¿Cuál describe correctamente el contraste?",
options:[
  {text:"El verbo de la 1 es transitivo.",correct:false,expl:"En la 1, «consumir» es pronominal (intransitivo); en la 2, sí es transitivo."},
  {text:"El verbo de la 2 es pronominal.",correct:false,expl:"En la 2, «consumir» es transitivo: tiene CD implícito ('me' = CD, el sujeto activo es 'este amor')."},
  {text:"El verbo de la 1 es pronominal (se consume = se agota a sí mismo).",correct:true,expl:"En la 1, 'se consume' es pronominal intransitivo: el amor se agota por sí solo. En la 2, 'me consume' es transitivo: el amor me devora ('me' = CD)."},
  {text:"En ambas «consumir» es transitivo.",correct:false,expl:"En la 1 es pronominal/intransitivo; en la 2 es transitivo."},
],explanation:"1: «se consume» → pronominal intransitivo (el amor se agota). 2: «me consume» → transitivo ('me' = CD; el amor consume al hablante). El «se» pronominal cambia la estructura argumental del verbo."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «lógicamente» (52)",prompt:"«Respondió a su hermana lógicamente» / «Respondió a su hermana, lógicamente». ¿Cuál describe el contraste?",
options:[
  {text:"La coma se puede poner o quitar sin cambio de significado.",correct:false,expl:"La coma cambia el alcance semántico de «lógicamente»."},
  {text:"En la 1, «lógicamente» es adjunto oracional (actitud del hablante).",correct:false,expl:"Sin coma, es adjunto verbal (describe el modo de responder)."},
  {text:"En la 1, «lógicamente» es adjunto verbal (describe el modo de responder); en la 2, es adjunto oracional (actitud del hablante ante lo enunciado).",correct:true,expl:"Sin coma: 'respondió lógicamente' = de forma lógica (modo). Con coma: 'lógicamente, respondió' = 'como era lógico que ocurriera' (evaluación del hablante)."},
  {text:"En 1 y 2, «lógicamente» afecta a toda la oración.",correct:false,expl:"Solo en la 2 (con coma) afecta a toda la oración como modificador oracional."},
],explanation:"Sin coma: «lógicamente» es adjunto verbal de modo (describe cómo respondió). Con coma: es adjunto oracional o modificador de modalidad (expresa la actitud del hablante: 'como era de esperar')."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «sabe rara/raro» (53)",prompt:"«La carne sabe rara» / «La carne sabe raro». ¿Cuál describe correctamente el contraste?",
options:[
  {text:"En la 1 hay complemento predicativo.",correct:true,expl:"'Rara' concuerda en género y número con 'la carne' (femenino singular): es predicativo del sujeto con verbo pseudocopulativo 'saber'."},
  {text:"En la 2 hay complemento predicativo.",correct:false,expl:"'Raro' no concuerda con 'la carne'; funciona como adverbio de modo (circunstancial)."},

  {text:"En ambas hay circunstancial.",correct:false,expl:"Solo en la 2 'raro' funciona como adverbio/circunstancial."},
],explanation:"'Rara' (fem.) concuerda con 'la carne' → PREDICATIVO del sujeto. 'Raro' (neutro/adverbial) no concuerda → CIRCUNSTANCIAL de modo. La concordancia del adjetivo determina su función."},

{block:1,type:"sent-mcq",meta:"Par mínimo · «se detuvo al ladrón» (54)",prompt:"«Se detuvo al ladrón» / «Se detuvo el ladrón». ¿Cuál describe correctamente el contraste?",
options:[

  {text:"En la 1 hay sujeto tácito.",correct:false,expl:"En la 1, la oración es impersonal con 'se': el CD de persona 'al ladrón' lleva preposición 'a'. No hay sujeto."},

],explanation:"1: Impersonal con 'se' + CD de persona ('al ladrón', marcado con 'a'). No hay sujeto. 2: 'El ladrón' es sujeto de 'detenerse' (pronominal) o sujeto paciente (pasiva refleja). La preposición 'a' distingue CD de sujeto."},

{block:8,type:"cl-text",meta:"Texto 1 · Irene Vallejo",
text:"«La leyenda de Alejandría no dejó de crecer. Dos siglos después de que se escribiera el diálogo de Gilide y la chica tentada, Alejandría fue el escenario de uno de los grandes amores más eróticos de todos los tiempos: la historia de amor de Cleopatra y Marco Antonio.\n\nRoma, que para entonces se había convertido en el centro del mayor imperio mediterráneo, era todavía un laberinto de calles tortuosas, oscuras y embarradas cuando Marco Antonio desembarcó por primera vez en Alejandría. De pronto, se vio transportado a una ciudad embriagadora cuyos palacios, templos, amplias avenidas y monumentos irradiaban grandeza. Los romanos se sentían seguros de su poder militar y dueños del futuro, pero no podían competir con la seducción de un pasado dorado y del lujo decadente. Con una mezcla de excitación, orgullo y cálculos tácticos, el poderoso general y la última reina de Egipto construyeron una alianza política y sexual que escandalizó a los romanos tradicionales.\n\nAl igual que su ciudad, Cleopatra encarna esa peculiar fusión de cultura y sensualidad alejandrina. Dice Plutarco que en realidad Cleopatra no era una gran belleza. La gente no se paraba en seco a mirarla por la calle. Pero a cambio rebosaba atractivo, inteligencia y labia. El timbre de su voz poseía tal dulzura que dejaba clavado un aguijón en todo aquel que la escuchara. Y su lengua se acomodaba al idioma que quisiese hablar, un instrumento musical de muchas cuerdas. Era capaz de hablar sin intérpretes con etíopes, hebreos, árabes, sirios, medos y partos. Astuta, bien informada, ganó varios asaltos en el combate por el poder. Su problema es que solo han hablado de ella desde el bando enemigo.\n\nCuando Marco Antonio quiso deslumbrar a Cleopatra con un gran regalo, eligió uno que no podría desdeñar: puso a sus pies doscientos mil volúmenes para la Gran Biblioteca. En Alejandría, los libros eran combustible para las pasiones.»",
author:"Irene Vallejo, El infinito en un junco (2000)"},

// ── TEXTO 2: Rosa Montero — Los malentendidos ────────────────────────────
{block:8,type:"cl-text",meta:"Texto 2 · Rosa Montero",
text:"«A veces me pregunto si los humanos nos entendemos de verdad. O si en realidad vivimos en un espejismo de falso diálogo. Nos inventamos al otro y, cuando hablamos, creemos que nos estamos refiriendo a las mismas cosas, pero en realidad cada uno es una isla. Entendemos a partir de lo que hemos vivido, de lo que nos duele, de todos nuestros miedos y deseos y prejuicios y necesidades. Por eso no puede haber dos escuchas iguales.\n\nHace unas semanas ganó el Premio Biblioteca Breve la mexicana Elma Correa. Escribí un texto en mis redes publicitando su libro, dándole la enhorabuena. Al principio dije que la pobre Elma había tenido la mala suerte del vendaval, y media docena de personas comentaron que la estaba «pobreando», como si fuera un trato ofensivo. Porque las palabras, que deberían ser nuestro lazo de unión, a menudo separan. Y hasta torturan y matan, como explica el filólogo Victor Klemperer en La lengua del Tercer Reich.\n\nHace muchos años publiqué un artículo criticando a una piscina que impidió la entrada a un hombre negro. La noticia era tan demencial que escribí un texto burlesco llevando el racismo hasta la estratosfera. Poco después recibí una carta en la que una persona de color se dolía de mis palabras. ¡Había tomado mi delirante artículo en serio! Como era una carta anónima, nunca pude escribirle, explicarme, disculparme. Guardo ese sangrante malentendido clavado en el corazón. Los humanos somos icebergs y la parte sumergida es inalcanzable. Qué clamorosa sensación de soledad produce la incomprensión.»",
author:"Rosa Montero, Los malentendidos, El País (2026)"},

// ── TEXTO 3: Jesús G. Maestro — Literatura infantil ──────────────────────
{block:8,type:"cl-text",meta:"Texto 3 · Jesús G. Maestro",
text:"«Los niños realmente inteligentes no leen libros durante su infancia: los protagonizan. La imagen de un niño lector es una interpretación con frecuencia ilusa y siempre retrospectiva de adultos idealizados por una autocomplacencia en sus creencias y pretensiones pedagógicas. Insisto en que los niños inteligentes no leen libros, porque no lo necesitan. Su imaginación es muy superior a la perturbada, y con frecuencia también atrofiada, imaginación de los adultos que los escriben.\n\nDe «literatura infantil» solo cabe hablar en términos editoriales y comerciales. Lo cierto es que no conviene confundir la denominada comercialmente «literatura infantil» con las interpretaciones infantiles de la literatura. Porque la literatura, si es «infantil», no es literatura, y si es literatura, no podrá interpretarse como tal por un niño, desde el momento en que el hecho literario habrá de objetivar formalmente un complejo sistema de ideas ilegible e inasequible para una inteligencia infantil.\n\nEn el mejor de los casos, la llamada «literatura infantil» no es sino un discurso asequible a una inteligencia propia de un niño, pero no de un adulto. La literatura se reduce así a un hecho que se desvanece en la medida en que se hace comprensible, cuando no resulta ser, en el peor de ellos, una historieta lamentablemente concebida y, si cabe, aún peor escrita.»",
author:"Jesús G. Maestro, Una filosofía para sobrevivir en el siglo XXI (2025)"},
