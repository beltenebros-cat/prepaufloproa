<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrePAU Lengua · 2º Bachillerato</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F4EF;--surface:#FFF;--surface2:#F0EDE6;
  --ink:#1A1714;--ink2:#6B6560;--ink3:#9E9890;
  --accent:#2D6A4F;--al:#D8EDDF;--ad:#1B4332;
  --danger:#991B1B;--dl:#FEE2E2;
  --border:rgba(26,23,20,.1);--border2:rgba(26,23,20,.18);
  --r:12px;--rs:8px;
}


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:268px;min-width:268px;background:var(--ink);color:#fff;display:flex;flex-direction:column;padding:1.5rem 1.25rem;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:2px}
.logo span{color:#74C69D}
.sub{font-size:10.5px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;margin-bottom:1.25rem;font-weight:300}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:1.1rem}
.stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--rs);padding:8px 10px}
.stat .num{font-size:20px;font-weight:500;color:#74C69D;display:block}
.stat .lbl{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em}
.pw{margin-bottom:1.1rem}
.pl{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.35);margin-bottom:4px}
.pt{background:rgba(255,255,255,.1);border-radius:99px;height:3px;overflow:hidden}
.pf{height:100%;background:#74C69D;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.nav-label{font-size:9.5px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;padding:0 4px;margin:7px 0 2px}
.nb{display:flex;align-items:center;gap:7px;width:100%;padding:6px 9px;border-radius:var(--rs);border:none;background:transparent;color:rgba(255,255,255,.52);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;transition:all .15s;margin-bottom:1px}
.nb:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nb.active{background:rgba(116,198,157,.18);color:#74C69D;font-weight:500}
.nb .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0}
.nb.active .dot{background:#74C69D}
.nb .cnt{margin-left:auto;background:#74C69D;color:var(--ad);border-radius:99px;font-size:9.5px;font-weight:600;padding:1px 5px;display:none}
.nb .cnt.show{display:inline}
.nav-sep{font-size:9px;color:rgba(255,255,255,.22);text-transform:uppercase;letter-spacing:.12em;padding:10px 4px 2px;margin-top:4px;border-top:1px solid rgba(255,255,255,.07)}
.nav-sep:first-child{border-top:none;margin-top:0;padding-top:0}

/* ── TEXTO LITERARIO (comprensión lectora) ── */
.text-card{background:#FAFAF8;border:1px solid var(--border);border-radius:var(--r);padding:1.5rem 1.75rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.text-card-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:500;margin-bottom:.75rem;display:flex;align-items:center;gap:7px}
.text-card-label::before{content:"";display:inline-block;width:16px;height:2px;background:var(--accent);border-radius:99px}
.text-card-body{font-size:15px;line-height:1.85;color:var(--ink);border-left:3px solid #b8dfc8;padding-left:1.1rem;margin-bottom:.85rem}.text-card-body p{margin-bottom:.9rem}.text-card-body p:last-child{margin-bottom:0}
.text-card-author{font-size:12.5px;color:var(--ink3);font-style:italic;text-align:right}
.text-toggle-btn{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:.5rem}
.text-toggle-btn svg{transition:transform .2s}
.text-toggle-btn.collapsed svg{transform:rotate(-90deg)}

/* ── VIEW TOGGLE ── */
.view-toggle{display:flex;gap:4px;background:var(--surface2);border-radius:var(--rs);padding:3px}
.vt-btn{padding:5px 12px;border-radius:6px;border:none;background:transparent;font-size:12.5px;font-family:'DM Sans',sans-serif;color:var(--ink2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.vt-btn.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);font-weight:500}
.vt-btn svg{flex-shrink:0}

/* ── LIST VIEW ── */
.list-view .ex-card{margin-bottom:.6rem;padding:1.1rem 1.4rem}
.list-view .ex-card.lv-collapsed .ex-prompt{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:0}
.list-view .ex-card.lv-collapsed .ex-quote,.list-view .ex-card.lv-collapsed .ol,.list-view .ex-card.lv-collapsed .sent-opt,.list-view .ex-card.lv-collapsed textarea,.list-view .ex-card.lv-collapsed .btn-row,.list-view .ex-card.lv-collapsed .fb,.list-view .ex-card.lv-collapsed .modelo-box,.list-view .ex-card.lv-collapsed .expl,.list-view .ex-card.lv-collapsed .fi,.list-view .ex-card.lv-collapsed .ji,.list-view .ex-card.lv-collapsed .jinput,.list-view .ex-card.lv-collapsed .fo{display:none}
.list-view .ex-card .lv-expand-btn{display:none}
.list-view .ex-card.lv-collapsed .lv-expand-btn{display:inline-flex;align-items:center;gap:4px;margin-top:.5rem;font-size:12px;color:var(--accent);border:none;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0}
.list-view .ex-card .lv-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;margin-left:auto}
.lv-status.done-ok{background:var(--al);color:var(--ad)}
.lv-status.done-no{background:#FEE2E2;color:#991B1B}
.lv-status.pending{background:var(--surface2);color:var(--ink3)}
.ex-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ex-meta-row .ex-meta{margin-bottom:0}
.sf{margin-top:auto;padding-top:.85rem;border-top:1px solid rgba(255,255,255,.08);font-size:10.5px;color:rgba(255,255,255,.2)}

/* ── MAIN ── */
.main{flex:1;padding:2.5rem 3rem;max-width:780px}
.ph{margin-bottom:1.75rem;animation:fu .35s ease both}
.ey{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:500;margin-bottom:4px}
.pt2{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.15;margin-bottom:5px}
.pd{font-size:14px;color:var(--ink2);font-weight:300}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.65rem;margin-bottom:.85rem;box-shadow:0 1px 3px rgba(0,0,0,.06);animation:fu .3s ease both}
@keyframes fu{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.ex-meta{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ex-meta::before{content:'';display:inline-block;width:16px;height:2px;background:var(--accent);border-radius:99px}
.ex-prompt{font-size:15px;line-height:1.65;margin-bottom:1rem}
.ex-quote{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 var(--rs) var(--rs) 0;padding:.8rem 1rem;font-size:13.5px;color:var(--ink2);margin-bottom:1rem;line-height:1.7;font-style:italic;white-space:pre-line}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:7px;margin-top:.75rem;align-items:center;flex-wrap:wrap}
.btn{padding:7px 16px;border-radius:var(--rs);font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--accent);color:#fff}.bp:hover:not(:disabled){background:var(--ad)}.bp:disabled{opacity:.4;cursor:not-allowed}
.bg2{background:transparent;color:var(--ink2);border:1px solid var(--border2)}.bg2:hover{background:var(--surface2);color:var(--ink)}.bg2:disabled{opacity:.35;cursor:not-allowed}

/* ── TEXTAREA (expresión escrita) ── */
textarea{width:100%;min-height:120px;resize:vertical;border:1.5px solid var(--border2);border-radius:var(--rs);padding:.75rem .85rem;font-size:13.5px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--bg);line-height:1.65;transition:border-color .15s;outline:none}
textarea:focus{border-color:var(--accent);background:#fff}
textarea[readonly]{opacity:.75;cursor:default}
textarea::placeholder{color:var(--ink3)}

/* ── MODELO SOLUCIÓN (expresión escrita) ── */
.modelo-box{margin-top:.9rem;border:1px solid #A7D7BB;border-radius:var(--rs);overflow:hidden}
.modelo-head{display:flex;align-items:center;justify-content:space-between;padding:7px 13px;background:#EFF8F3;border-bottom:1px solid #A7D7BB;font-size:10.5px;font-weight:500;color:var(--ad);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;user-select:none}
.modelo-head svg{transition:transform .2s}
.modelo-head.open svg{transform:rotate(180deg)}
.modelo-body{display:none;padding:.9rem 1.05rem;font-size:13.5px;line-height:1.75;background:#fff;color:var(--ink);white-space:pre-line}
.modelo-body.show{display:block}
.modelo-pending{padding:.9rem 1.05rem;font-size:13px;color:var(--ink3);font-style:italic;background:#fff}

/* ── AI FEEDBACK (expresión escrita) ── */
.fb{margin-top:.85rem;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.fbh{display:flex;align-items:center;gap:6px;padding:7px 13px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10.5px;font-weight:500;color:var(--ink2);text-transform:uppercase;letter-spacing:.07em}
.fbd{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.fbd.loading{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.fbb{padding:.9rem 1.05rem;font-size:13.5px;line-height:1.75;background:#fff}
.fbb.loading{color:var(--ink3);font-style:italic}

/* ── MCQ (tipo test) ── */
.ol{display:flex;flex-direction:column;gap:7px;margin-bottom:.8rem}
.ob{text-align:left;padding:10px 13px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg);font-size:14px;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;line-height:1.5;transition:all .15s;display:flex;gap:9px;align-items:flex-start}
.ob .ltr{font-weight:600;font-size:11.5px;min-width:19px;height:19px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin-top:1px;flex-shrink:0;color:var(--ink2);transition:all .15s}
.ob:hover:not(:disabled){border-color:var(--accent);background:var(--al)}.ob:hover:not(:disabled) .ltr{background:var(--accent);color:#fff}
.ob.correct{background:var(--al);border-color:var(--accent);color:var(--ad)}.ob.correct .ltr{background:var(--accent);color:#fff}
.ob.wrong{background:var(--dl);border-color:#F87171;color:var(--danger)}.ob.wrong .ltr{background:#F87171;color:#fff}
.ob:disabled{cursor:default}
.expl{background:#EFF8F3;border:1px solid #A7D7BB;border-radius:var(--rs);padding:.8rem 1rem;font-size:13px;color:var(--ad);line-height:1.7;margin-top:.45rem}
.expl strong{display:block;font-weight:500;margin-bottom:2px;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;opacity:.7}

/* ── SENTENCE MCQ (reflexión: cada oración es opción) ── */
.sent-opt{text-align:left;padding:11px 14px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--bg);font-size:13.5px;color:var(--ink);cursor:pointer;font-family:'DM Sans',sans-serif;line-height:1.6;transition:all .15s;display:flex;gap:10px;align-items:flex-start;margin-bottom:7px;font-style:italic}
.sent-opt .ltr{font-style:normal;font-weight:600;font-size:11.5px;min-width:19px;height:19px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;margin-top:2px;flex-shrink:0;color:var(--ink2);transition:all .15s}
.sent-opt:hover:not(:disabled){border-color:var(--accent);background:var(--al)}.sent-opt:hover:not(:disabled) .ltr{background:var(--accent);color:#fff}
.sent-opt.correct{background:var(--al);border-color:var(--accent);color:var(--ad)}.sent-opt.correct .ltr{background:var(--accent);color:#fff}
.sent-opt.wrong{background:var(--dl);border-color:#F87171;color:var(--danger)}.sent-opt.wrong .ltr{background:#F87171;color:#fff}
.sent-opt:disabled{cursor:default}

/* ── FILL ── */
.fi{background:var(--surface2);border-radius:var(--rs);padding:.75rem .9rem;margin-bottom:7px}
.fs2{font-size:14px;margin-bottom:8px;line-height:1.6}
.fo{display:flex;gap:6px;flex-wrap:wrap}
.fo-btn{padding:4px 12px;border-radius:99px;border:1.5px solid var(--border2);background:var(--surface);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;color:var(--ink);transition:all .15s}
.fo-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--al)}
.fo-btn.correct{background:var(--al);border-color:var(--accent);color:var(--ad);font-weight:500}
.fo-btn.wrong{background:var(--dl);border-color:#F87171;color:var(--danger)}
.fo-btn:disabled{cursor:default}

/* ── JOIN ── */
.ji{background:var(--surface2);border-radius:var(--rs);padding:.75rem .9rem;margin-bottom:8px}
.jp{font-size:13.5px;color:var(--ink2);margin-bottom:7px;line-height:1.6}
.jinput{width:100%;border:1.5px solid var(--border2);border-radius:var(--rs);padding:.45rem .75rem;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--surface);outline:none;transition:border-color .15s}
.jinput:focus{border-color:var(--accent)}

/* ── NAV ── */
.nr{display:flex;justify-content:space-between;align-items:center;margin-top:1.1rem}
.ni{font-size:12px;color:var(--ink3)}

/* ── HAMBURGER ── */
.hamburger{display:none;position:fixed;top:1rem;left:1rem;z-index:200;background:var(--ink);border:none;border-radius:7px;width:37px;height:37px;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.hamburger span{display:block;width:15px;height:1.5px;background:#fff;border-radius:99px}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
@media(max-width:820px){
  .hamburger{display:flex}.layout{flex-direction:column}
  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .3s ease}
  .sidebar.open{transform:translateX(0)}.ovl.open{display:block}
  .main{padding:1.1rem;padding-top:3.25rem;max-width:100%}.pt2{font-size:22px}
}

/* ── HOMEPAGE ── */
#homepage{display:flex;flex-direction:column;min-height:100vh;background:var(--bg)}
#homepage.hidden{display:none}
.hp-hero{background:var(--ink);color:#fff;padding:3rem 2.5rem 2.25rem;text-align:center}
.hp-logo{font-family:'DM Serif Display',serif;font-size:42px;margin-bottom:6px;line-height:1.1}
.hp-logo span{color:#74C69D}
.hp-tagline{font-size:14px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2rem;font-weight:300}
.hp-stats-row{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap}
.hp-stat{text-align:center}
.hp-stat .n{font-size:28px;font-weight:300;font-family:'DM Serif Display',serif;color:#74C69D}
.hp-stat .l{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.06em}
.hp-body{flex:1;padding:2rem 2rem;max-width:960px;margin:0 auto;width:100%}
.hp-footer{text-align:center;padding:1.5rem;font-size:11.5px;color:var(--ink3)}

/* ── BIG BUTTONS ── */
.hp-big-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:2rem}
.hp-big-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:1.5rem 1rem;border-radius:var(--r);border:none;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;text-align:center;min-height:110px}
.hp-big-btn.primary{background:var(--accent);color:#fff;box-shadow:0 4px 18px rgba(45,106,79,.25)}
.hp-big-btn.primary:hover{background:var(--ad);box-shadow:0 6px 24px rgba(45,106,79,.35);transform:translateY(-2px)}
.hp-big-btn.secondary{background:var(--ink);color:#fff;box-shadow:0 4px 18px rgba(26,23,20,.2)}
.hp-big-btn.secondary:hover{background:#2c2825;box-shadow:0 6px 24px rgba(26,23,20,.3);transform:translateY(-2px)}
.hp-big-btn .bb-icon{font-size:26px;line-height:1}
.hp-big-btn .bb-title{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.2}
.hp-big-btn .bb-sub{font-size:11px;opacity:.65;letter-spacing:.04em;font-weight:300}
@media(max-width:540px){.hp-big-row{grid-template-columns:1fr}}

/* ── TAB NAVIGATION ── */
.hp-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:1rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.hp-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hp-tabs::-webkit-scrollbar{display:none}
.hp-tab{padding:8px 16px;border:none;background:transparent;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-weight:400;white-space:nowrap;flex-shrink:0}
.hp-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.hp-tab:hover:not(.active){color:var(--ink)}
.hp-tab-panel{display:none}
.hp-tab-panel.active{display:block}

/* ── EXERCISE CARDS ── */
.hp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;margin-bottom:1rem}
.hp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem;cursor:pointer;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;display:flex;flex-direction:column;gap:5px;text-align:left}
.hp-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(45,106,79,.12);transform:translateY(-2px)}
.hp-card-icon{font-size:20px;margin-bottom:2px}
.hp-card-title{font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.hp-card-desc{font-size:12px;color:var(--ink2);line-height:1.5;font-weight:300}
.hp-card-count{font-size:11px;color:var(--ink3);margin-top:auto;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.hp-card-progress{height:3px;background:var(--border);border-radius:99px;overflow:hidden;flex:1;margin:0 8px}
.hp-card-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.hp-card-pct{font-size:10.5px;color:var(--accent);font-weight:500;min-width:28px;text-align:right}

/* ── APP VIEW ── */
#app-view{display:none}
#app-view.visible{display:flex}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:1.25rem;transition:color .15s}
.back-btn:hover{color:#fff}
.back-btn svg{flex-shrink:0}


/* ── GLOSARIO APP ── */
.gl-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem}
.gl-tab{padding:8px 18px;border:none;background:transparent;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;font-weight:400}
.gl-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.gl-tab:hover:not(.active){color:var(--ink)}
.gl-panel{display:none}.gl-panel.active{display:block}

// ── BLOQUE 14: Valores del SE ─────────────────────────────────────────────
{block:14,type:"mcq",meta:"Valores del se · 1",prompt:"«Se lo preguntó a sí mismo.»\n\n¿Cuál es el valor del 'se' en esta oración?",
options:[
  {text:"Reflexivo — CI",correct:true,expl:"'Se' es pronombre reflexivo: la acción recae sobre el propio sujeto. Funciona como CI porque 'lo' (CD) ya ocupa esa función."},
  {text:"Impersonal refleja",correct:false,expl:"La impersonal no tiene sujeto gramatical. Aquí hay un sujeto que realiza y recibe la acción."},
  {text:"Parte de verbo pronominal",correct:false,expl:"'Preguntar' existe sin 'se'; no es un verbo inherentemente pronominal."},
  {text:"Recíproco",correct:false,expl:"La reciprocidad requiere un sujeto plural. Aquí el sujeto es singular."},
],explanation:"Reflexivo–CI: el sujeto realiza la acción sobre sí mismo. 'Se' = CI (a sí mismo); 'lo' = CD. Prueba: se puede recuperar como 'a sí mismo'."},

{block:14,type:"mcq",meta:"Valores del se · 2",prompt:"«Se juzgó al terrorista.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Impersonal refleja",correct:true,expl:"La presencia de 'a' personal ante el objeto ('al terrorista') impide la lectura de pasiva refleja. No hay sujeto explícito: es impersonal."},
  {text:"Pasiva refleja",correct:false,expl:"En la pasiva refleja el objeto directo (sin 'a') concuerda con el verbo. La 'a' personal bloquea esa lectura aquí."},
  {text:"Reflexivo",correct:false,expl:"El terrorista no se juzga a sí mismo; no hay correferencia entre sujeto y objeto."},
  {text:"Dativo aspectual",correct:false,expl:"El dativo aspectual añade implicación del sujeto en la acción, no marca impersonalidad."},
],explanation:"Impersonal refleja: 'a' personal ante el objeto imposibilita la pasiva refleja. El verbo va en singular sin sujeto explícito. Prueba: no se puede transformar en pasiva perifrástica con sujeto."},

{block:14,type:"mcq",meta:"Valores del se · 3",prompt:"«María se pintó las uñas.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Reflexivo — CI",correct:true,expl:"María realiza la acción sobre sí misma. 'Se' = CI (a sí misma); 'las uñas' = CD. El CI reflexivo aparece con verbos de aseo y cuidado personal."},
  {text:"Reflexivo — CD",correct:false,expl:"El CD es 'las uñas'. Si el CD ya está ocupado, 'se' solo puede ser CI."},
  {text:"Dativo aspectual",correct:false,expl:"El dativo aspectual no implica que la acción recaiga sobre una parte del propio cuerpo del sujeto como objeto directo."},
  {text:"Parte de verbo pronominal",correct:false,expl:"'Pintar' existe sin 'se' con el mismo significado básico."},
],explanation:"Reflexivo–CI: 'se' = CI (a sí misma), 'las uñas' = CD. Frecuente con verbos de cuidado personal (pintarse, lavarse, peinarse…) cuando hay CD explícito."},

{block:14,type:"mcq",meta:"Valores del se · 4",prompt:"«Se alquilan apartamentos.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Pasiva refleja",correct:true,expl:"'Apartamentos' es el sujeto paciente; el verbo concuerda con él (plural). 'Se' marca voz pasiva. Equivale a 'Los apartamentos son alquilados'."},
  {text:"Impersonal refleja",correct:false,expl:"En la impersonal el verbo va en singular sin sujeto. Aquí 'apartamentos' es sujeto y el verbo concuerda en plural."},
  {text:"Reflexivo",correct:false,expl:"Los apartamentos no realizan la acción sobre sí mismos."},
  {text:"Dativo aspectual",correct:false,expl:"El dativo aspectual no crea construcciones pasivas."},
],explanation:"Pasiva refleja: 'apartamentos' = sujeto paciente; verbo en plural concordando con él. Equivalente pasiva perifrástica: 'Los apartamentos son alquilados'."},

{block:14,type:"mcq",meta:"Valores del se · 5",prompt:"«Se comió el pan como si no hubiera comido en años.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Dativo aspectual",correct:true,expl:"'Se' añade un matiz de implicación total del sujeto en la acción (la completó entera, con intensidad). No cambia el significado básico pero intensifica el aspecto télico."},
  {text:"Reflexivo — CD",correct:false,expl:"El sujeto no se come a sí mismo. 'El pan' es el CD."},
  {text:"Pasiva refleja",correct:false,expl:"El verbo no concuerda con 'el pan' como sujeto paciente de forma regular; además el contexto indica agentividad."},
  {text:"Parte de verbo pronominal",correct:false,expl:"'Comer' existe perfectamente sin 'se'."},
],explanation:"Dativo aspectual (también llamado 'se' de interés o dativo concordado): indica que el sujeto lleva la acción hasta el final con plena implicación. Prueba: eliminar 'se' no hace la oración agramatical, solo pierde ese matiz aspectual."},

{block:14,type:"mcq",meta:"Valores del se · 6",prompt:"«Marco y Julia se besaron apasionadamente.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Recíproco — CD",correct:true,expl:"El sujeto plural realiza la acción mutuamente: Marco besa a Julia y Julia besa a Marco. 'Se' = CD recíproco (se besan el uno al otro)."},
  {text:"Reflexivo",correct:false,expl:"En el reflexivo cada sujeto actúa sobre sí mismo. Aquí la acción es mutua entre dos personas distintas."},
  {text:"Impersonal refleja",correct:false,expl:"La impersonal no tiene sujeto. Aquí el sujeto es 'Marco y Julia'."},
  {text:"Pasiva refleja",correct:false,expl:"La pasiva refleja requiere un sujeto paciente inanimado o sin 'a' personal."},
],explanation:"Recíproco–CD: con sujeto plural, cada miembro realiza la acción sobre el otro. 'Se' = CD (el uno al otro). Prueba de reciprocidad: 'se besaron mutuamente / el uno al otro'."},

{block:14,type:"mcq",meta:"Valores del se · 7",prompt:"«Mi padre se ha ido a las siete al trabajo.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Dativo aspectual",correct:true,expl:"'Se' añade un matiz de desvinculación o alejamiento del punto de referencia y de implicación del sujeto. Sin 'se' la oración es gramatical ('Mi padre ha ido'), pero 'irse' enfatiza el alejamiento voluntario y definitivo."},
  {text:"Parte de verbo pronominal",correct:false,expl:"Aunque 'irse' funciona como pronominal, en este contexto el 'se' tiene valor dativo-aspectual de alejamiento."},
  {text:"Reflexivo",correct:false,expl:"El padre no actúa sobre sí mismo."},
  {text:"Recíproco",correct:false,expl:"No hay reciprocidad; el sujeto es singular."},
],explanation:"Dativo aspectual (de alejamiento): 'irse' frente a 'ir' añade implicación y el matiz de partida voluntaria y definitiva desde el punto de referencia. Frecuente con verbos de movimiento: irse, venirse, bajarse, subirse…"},

{block:14,type:"mcq",meta:"Valores del se · 8",prompt:"«Miguel se peina con raya al medio.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Reflexivo — CD",correct:true,expl:"Miguel realiza la acción sobre sí mismo y 'se' funciona como CD (a sí mismo lo peina). No hay otro CD explícito."},
  {text:"Reflexivo — CI",correct:false,expl:"Sería CI si hubiera un CD explícito como en 'se peina el cabello'. Sin CD nominal, 'se' es CD."},
  {text:"Dativo aspectual",correct:false,expl:"El dativo aspectual no implica que la acción recaiga directamente sobre el sujeto como objeto."},
  {text:"Parte de verbo pronominal",correct:false,expl:"'Peinar' existe sin 'se'; el 'se' aquí tiene valor reflexivo claro."},
],explanation:"Reflexivo–CD: no hay CD nominal, así que 'se' ocupa esa función (Miguel se peina = peina a sí mismo). Contrasta con 'se peina el cabello' donde 'el cabello' = CD y 'se' = CI."},

{block:14,type:"mcq",meta:"Valores del se · 9",prompt:"«Se atenderán todo tipo de solicitudes.»\n\n¿Cuál es el valor del 'se'?",
options:[
  {text:"Pasiva refleja",correct:true,expl:"'Todo tipo de solicitudes' es el sujeto paciente; el verbo concuerda en plural ('atenderán'). Equivale a 'Todo tipo de solicitudes será atendido'."},

// 3.1 Modalidad oracional
{block:0,type:"sent-mcq",meta:"Modalidad · Interrogativa total",prompt:"¿Cuál de estas oraciones es una interrogativa directa total?",
options:[
  {text:"¿Cuándo llegaste?",          correct:false, expl:"Interrogativa parcial: contiene pronombre interrogativo «cuándo»."},
  {text:"¿Llegaste ayer?",            correct:true,  expl:"Interrogativa total: no hay pronombre interrogativo, la respuesta es sí/no."},
  {text:"¡Qué tarde llegaste!",       correct:false, expl:"Exclamativa, introducida por «qué» exclamativo."},
  {text:"Quizás llegaras ayer.",      correct:false, expl:"Dubitativa con adverbio modal «quizás» + subjuntivo."},
],explanation:"Las interrogativas totales no tienen pronombre interrogativo y admiten respuesta sí/no. Las parciales preguntan por un elemento concreto (cuándo, quién, cómo...)."},

{block:0,type:"sent-mcq",meta:"Modalidad · Exclamativa",prompt:"¿Cuál de estas oraciones es exclamativa?",
options:[
  {text:"¿Qué calor hace?",           correct:false, expl:"Interrogativa parcial con «qué» interrogativo."},
  {text:"Hace mucho calor.",          correct:false, expl:"Enunciativa afirmativa."},
  {text:"¡Qué calor tengo!",          correct:true,  expl:"Exclamativa: marcada por entonación exclamativa y «qué» exclamativo + sustantivo."},
  {text:"Ojалá haga calor.",          correct:false, expl:"Desiderativa con «ojalá» + subjuntivo."},
],explanation:"Las exclamativas se caracterizan por entonación exclamativa y frecuentemente por «qué/cuánto/cómo» en función exclamativa, no interrogativa."},

{block:0,type:"sent-mcq",meta:"Modalidad · Impersonal con se",prompt:"¿Cuál de estas oraciones contiene un «se» impersonal (sin sujeto gramatical)?",
options:[
  {text:"Se vendieron todos los libros.",   correct:false, expl:"Pasiva refleja: «todos los libros» es sujeto paciente con el que concuerda el verbo."},
  {text:"Se está muy bien aquí.",           correct:true,  expl:"Impersonal con «se»: el verbo no concuerda con ningún SN; no hay sujeto gramatical."},
  {text:"Se construyeron dos edificios.",   correct:false, expl:"Pasiva refleja: «dos edificios» es sujeto paciente."},
  {text:"Se compró el piso.",               correct:false, expl:"Pasiva refleja o reflexiva; «el piso» puede funcionar como sujeto."},
],explanation:"En las impersonales con «se», el verbo no tiene sujeto y va siempre en 3ª persona del singular. Las pasivas reflejas tienen un SN sujeto con el que concuerda el verbo."},

{block:0,type:"sent-mcq",meta:"Modalidad · Dubitativa",prompt:"¿Cuál de estas oraciones es dubitativa?",
options:[
  {text:"No sé si vendrá mañana.",    correct:false, expl:"Interrogativa indirecta subordinada, no principal."},
  {text:"Tal vez venga mañana.",      correct:true,  expl:"Dubitativa: adverbio modal «tal vez» + subjuntivo expresa probabilidad o duda."},
  {text:"Vendrá mañana seguro.",      correct:false, expl:"Enunciativa afirmativa con adverbio de certeza."},
  {text:"¿Vendrá mañana?",           correct:false, expl:"Interrogativa directa total."},
],explanation:"Las oraciones dubitativas expresan duda o probabilidad mediante adverbios modales (quizás, tal vez, acaso, igual) que rigen indicativo (mayor certeza) o subjuntivo (menor certeza)."},

// 3.2 Par mínimo — gramática (tipo test)
{block:1,type:"sent-mcq",meta:"Par mínimo · Relativa",prompt:"¿Cuál de estas oraciones es gramatical y por qué?",
options:[
  {text:"Es una persona que la vi ayer.",    correct:false, expl:"Agramatical: duplicación del CD. «que» ya es CD; añadir «la» es redundante."},
  {text:"Es una persona a la que vi ayer.",  correct:true,  expl:"Gramatical: el relativo «a la que» ejerce de CD con su preposición; no hay duplicación."},
  {text:"Es una persona que le vi ayer.",    correct:false, expl:"Agramatical: leísmo de persona (uso incorrecto del CI «le» por CD)."},
  {text:"Es una persona que la vi a ella.",  correct:false, expl:"Agramatical: duplicación con pronombre tónico, no aceptable en relativa especificativa."},
],explanation:"En relativas especificativas, el pronombre relativo debe llevar la preposición que le corresponde a su función («a la que» = CD). No se añade pronombre de retoma."},

{block:1,type:"sent-mcq",meta:"Par mínimo · Inacusativo vs. transitivo",prompt:"¿Cuál de estas oraciones es gramatical?",
options:[
  {text:"*El árbol fue florecido.",      correct:false, expl:"Agramatical: «florecer» es inacusativo, no tiene agente; no admite pasiva perifrástica."},
  {text:"El árbol fue talado.",          correct:true,  expl:"Gramatical: «talar» es transitivo (hay agente implícito); admite pasiva perifrástica."},
  {text:"*El árbol fue aparecido.",      correct:false, expl:"Agramatical: «aparecer» es inacusativo; misma razón que «florecer»."},
  {text:"*El árbol fue crecido por él.", correct:false, expl:"Agramatical: «crecer» es inacusativo; no admite pasiva perifrástica."},
],explanation:"Solo los verbos transitivos (con argumento externo/agente) admiten pasiva perifrástica con «ser + participio». Los verbos inacusativos solo tienen argumento interno y no pueden tener agente."},

{block:1,type:"sent-mcq",meta:"Par mínimo · Colectivo singular",prompt:"¿Cuál de estas oraciones es gramatical?",
options:[
  {text:"*El equipo llegaron tarde.",   correct:false, expl:"Agramatical: «equipo» es sustantivo colectivo singular; el verbo debe ir en singular."},
  {text:"El equipo llegó tarde.",       correct:true,  expl:"Gramatical: verbo en singular concordando con el núcleo colectivo «equipo»."},
  {text:"*La gente deciden solos.",     correct:false, expl:"Agramatical: «gente» es colectivo singular → «decide» (singular); «solos» tampoco concuerda."},
  {text:"*El alumnado entregaron.",     correct:false, expl:"Agramatical: «alumnado» es colectivo singular → «entregó»."},
],explanation:"Los sustantivos colectivos (equipo, alumnado, gente, grupo...) son morfológicamente singulares en español y rigen concordancia verbal en singular, a diferencia de algunas otras lenguas."},

{block:3,type:"sent-mcq",meta:"Función sintáctica · Sujeto oracional",prompt:"¿En cuál de estas oraciones el sujeto es una oración subordinada sustantiva?",

{block:3,type:"sent-mcq",meta:"Función sintáctica · Complemento predicativo",prompt:"¿En cuál de estas oraciones el adjetivo en mayúsculas es un complemento predicativo?",
options:[

{block:5,type:"sent-mcq",meta:"Figura retórica · 1",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«A las aladas almas de las rosas.»",
options:[
  {text:"Aliteración",correct:true,expl:"Repetición del sonido /a/ a lo largo del verso: 'aladas almas'."},
  {text:"Hipérbaton",correct:false,expl:"El hipérbaton altera el orden sintáctico; aquí el fenómeno es fónico."},
  {text:"Metonimia",correct:false,expl:"La metonimia sustituye un término por otro contiguo; aquí hay repetición de sonidos."},
  {text:"Anáfora",correct:false,expl:"La anáfora repite palabras al inicio de versos; aquí la repetición es de sonidos."},
],explanation:"Aliteración: repetición del sonido /a/ ('aladas almas'). Es un recurso fónico muy frecuente en la poesía lorquiana."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 2",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Al olmo viejo, hendido por el rayo / y en su mitad podrido, / con las lluvias de abril y el sol de mayo, / algunas hojas verdes le han salido.»",
options:[
  {text:"Epíteto",correct:true,expl:"'Olmo viejo' y 'hojas verdes' usan adjetivos que expresan cualidades inherentes sin añadir información nueva."},
  {text:"Hipérbole",correct:false,expl:"La hipérbole exagera; aquí se describe una realidad sin exageración."},
  {text:"Paradoja",correct:false,expl:"La paradoja une ideas contradictorias; aquí hay descripción con adjetivos inherentes."},
  {text:"Sinestesia",correct:false,expl:"La sinestesia mezcla sensaciones de distintos sentidos; aquí solo hay descripción visual."},
],explanation:"Epíteto: 'olmo viejo', 'hojas verdes'. Adjetivos que resaltan cualidades inherentes del sustantivo sin aportar información nueva. Es el poema 'A un olmo seco' de Machado."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 3",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Ay, si las palabras fuesen solo un suave sonido.»",
options:[
  {text:"Aliteración",correct:true,expl:"Repetición del sonido /s/: 'si', 'solo', 'suave', 'sonido'."},
  {text:"Asíndeton",correct:false,expl:"El asíndeton omite conjunciones; aquí hay conjunción 'si' y el fenómeno es fónico."},
  {text:"Anáfora",correct:false,expl:"La anáfora repite palabras al comienzo; aquí la repetición es de sonidos a lo largo del verso."},
  {text:"Epanadiplosis",correct:false,expl:"La epanadiplosis repite la misma palabra al inicio y final; aquí la repetición es fónica."},
],explanation:"Aliteración del sonido /s/: 'si', 'solo', 'suave', 'sonido'. La acumulación de sibilantes crea un efecto de suavidad."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 4",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Bajan las aguas, suben, cantan.»",
options:[
  {text:"Asíndeton",correct:true,expl:"Omisión de conjunciones entre 'bajan', 'suben' y 'cantan', lo que acelera el ritmo."},
  {text:"Polisíndeton",correct:false,expl:"El polisíndeton usa conjunciones repetidas; aquí faltan."},
  {text:"Enumeración",correct:false,expl:"Hay enumeración, pero la figura que más la define es el asíndeton por la ausencia de conjunciones."},
  {text:"Paralelismo",correct:false,expl:"El paralelismo repite estructuras similares; aquí la figura clave es la ausencia de nexos."},
],explanation:"Asíndeton: omisión de conjunciones entre los tres verbos ('bajan', 'suben', 'cantan'), lo que agiliza y dinamiza el ritmo."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 5",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Busco la dulce miel de tus labios.»",
options:[
  {text:"Metáfora",correct:true,expl:"Identifica el término real (los labios) con el imaginario (la miel) sin nexo comparativo."},
  {text:"Símil",correct:false,expl:"El símil usa un nexo ('como'); aquí la identificación es directa."},
  {text:"Metonimia",correct:false,expl:"La metonimia sustituye por contigüidad; aquí hay identificación imaginaria."},
  {text:"Hipérbole",correct:false,expl:"No hay exageración; hay una imagen poética de identificación."},
],explanation:"Metáfora: 'la dulce miel de tus labios'. Los labios (término real) se identifican con la miel (término imaginario) sin nexo comparativo."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 6",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Canta el cantor su canción.»",
options:[
  {text:"Aliteración",correct:true,expl:"Repetición del sonido /k/ y /an/: 'canta', 'cantor', 'canción'."},
  {text:"Epanadiplosis",correct:false,expl:"La epanadiplosis repite una palabra al principio y al final; aquí la repetición es fónica."},
  {text:"Pleonasmo",correct:false,expl:"El pleonasmo usa palabras redundantes; aquí la figura clave es la repetición de sonidos."},
  {text:"Políptoton",correct:false,expl:"El políptoton usa palabras de la misma raíz con distintos morfemas; aquí son palabras distintas."},
],explanation:"Aliteración: repetición del sonido /k/ en 'canta', 'cantor' y 'canción'. También hay un efecto de políptoton por la raíz común."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 7",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Cerró su boca de ballena el piano / y él anduvo hacia atrás, / hacia el silencio.»",
options:[
  {text:"Metáfora",correct:true,expl:"La tapa del piano se identifica con la boca de una ballena (término real: tapa/piano; término imaginario: boca de ballena)."},
  {text:"Símil",correct:false,expl:"El símil necesita nexo comparativo; aquí la identificación es directa."},
  {text:"Personificación",correct:false,expl:"Aunque el piano actúa, la figura más relevante es la metáfora de la boca de ballena."},
  {text:"Hipérbaton",correct:false,expl:"Hay inversión sintáctica, pero la figura más notable es la metáfora."},
],explanation:"Metáfora: 'boca de ballena' identifica la tapa del piano (R) con la mandíbula de una ballena (I). Poema de Rafael Alberti."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 8",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«¿Cómo era, Dios mío, cómo era?»",
options:[
  {text:"Epanadiplosis",correct:true,expl:"La expresión '¿Cómo era?' se repite al inicio y al final del verso."},
  {text:"Anáfora",correct:false,expl:"La anáfora repite al inicio de versos consecutivos distintos; aquí es inicio y final del mismo verso."},
  {text:"Epífora",correct:false,expl:"La epífora repite al final de versos consecutivos; aquí es inicio y final del mismo verso."},
  {text:"Interrogación retórica",correct:false,expl:"Aunque es una pregunta, la figura estructural clave es la epanadiplosis."},
],explanation:"Epanadiplosis: '¿Cómo era?' aparece al principio y al final del mismo verso ('¿Cómo era, Dios mío, cómo era?')."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 9",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Cual gusano que va de sí tejiendo su cárcel y su eterna sepultura.»",
options:[

  {text:"Metáfora",correct:false,expl:"La metáfora no usa nexo comparativo; 'cual' es nexo explícito."},

],explanation:"Símil: 'cual gusano' introduce la comparación con nexo explícito. El término real es el ser humano; el imaginario, el gusano que se encierra."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 11",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«Cuando se miran de frente / los vertiginosos ojos claros de la muerte, / se dicen las verdades: / las bárbaras, terribles, amorosas crueldades.»",
options:[

  {text:"Antítesis",correct:false,expl:"La antítesis contrapone dos ideas en estructuras paralelas; aquí la contradicción está dentro de un mismo sintagma."},

  {text:"Hipérbole",correct:false,expl:"No hay exageración; hay unión de términos contradictorios."},
],explanation:"Oxímoron: 'amorosas crueldades' une dos términos semánticamente opuestos en un único sintagma nominal."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 12",

{block:5,type:"sent-mcq",meta:"Figura retórica · 13",

{block:5,type:"sent-mcq",meta:"Figura retórica · 14",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«El dictador, cuyo poder había sido tan grande que alguna vez preguntó qué horas son y le habían contestado las que usted ordene mi general.»",

],explanation:"Hipérbole: la anécdota de que el dictador puede ordenar la hora exagera su poder de forma grotesca. Es un recurso del realismo mágico de García Márquez."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 15",

{block:5,type:"sent-mcq",meta:"Figura retórica · 16",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«El ojo que ves no es ojo porque tú lo veas; / es ojo porque te ve.»",
options:[
  {text:"Paradoja",correct:true,expl:"Aparente contradicción que encierra una verdad profunda sobre la percepción y la identidad."},
  {text:"Antítesis",correct:false,expl:"La antítesis contrapone ideas opuestas en estructura paralela, pero no implica una verdad profunda aparentemente imposible."},
  {text:"Oxímoron",correct:false,expl:"El oxímoron une dos términos contradictorios en un sintagma; aquí la contradicción es proposicional."},
  {text:"Quiasmo",correct:false,expl:"El quiasmo invierte el orden de los elementos; aquí la figura es la contradicción aparente con verdad profunda."},
],explanation:"Paradoja: la idea de que el ojo no existe porque lo veas sino porque te ve invierte la lógica habitual y revela una verdad sobre la percepción. Es un apotegma de Machado."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 17",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«El tímido perfume de tus rosas.»",

  {text:"Metáfora",correct:false,expl:"No hay identificación de término real con imaginario; hay desplazamiento de complemento."},
  {text:"Sinestesia",correct:false,expl:"No hay mezcla de sentidos diferentes; hay desplazamiento del adjetivo."},
],explanation:"Hipálage: 'tímido' debería referirse a las rosas (o a su propietaria), pero se atribuye al perfume. Es el desplazamiento lógico de un complemento."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 18",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«El trino amarillo del canario.»",
options:[

{block:5,type:"sent-mcq",meta:"Figura retórica · 19",
prompt:"Identifica la figura retórica presente en el siguiente fragmento.",
quote:"«El viaje a ninguna parte.»",
options:[
  {text:"Oxímoron",correct:true,expl:"'Viaje' implica movimiento hacia algún destino; 'ninguna parte' niega cualquier destino: contradicción en un sintagma."},
  {text:"Metáfora",correct:false,expl:"No hay identificación de términos real e imaginario."},
  {text:"Paradoja",correct:false,expl:"La paradoja formula una proposición; el oxímoron es una combinación de términos opuestos en un sintagma."},
  {text:"Antítesis",correct:false,expl:"La antítesis contrapone estructuras; aquí la contradicción está dentro de un sintagma nominal."},
],explanation:"Oxímoron: 'viaje' (movimiento con destino) + 'ninguna parte' (negación del destino). Es el título de la obra de Fernando Fernán Gómez."},

{block:5,type:"sent-mcq",meta:"Figura retórica · 20",

{block:5,type:"sent-mcq",meta:"Figura retórica · 21",

{block:5,type:"sent-mcq",meta:"Figura retórica · 23",

{block:5,type:"sent-mcq",meta:"Figura retórica · 24",

{block:15,type:"open",meta:"Tópico literario · 1 (Aleixandre)",

quote:"«Adolescencia. Vinieras y te fueras dulcemente, / de otro camino / a otro camino. Verte, / y ya otra vez no verte.» Vicente Aleixandre.",
rubric:"Tempus fugit: el tiempo se escapa. La adolescencia pasa fugaz, con la misma rapidez con que llega; el hablante apenas puede contemplarla antes de que desaparezca. También podría relacionarse con el Carpe diem (la brevedad del momento).",
modelSolution:"El texto trata la fugacidad del tiempo, concretamente de la adolescencia, que llega y se va sin apenas dar tiempo a vivirla. Se relaciona con el tópico del Tempus fugit ('el tiempo se escapa'): la adolescencia es presentada como un instante brevísimo, un 'verte y ya otra vez no verte', que subraya la imposibilidad de detener el paso del tiempo."},

{block:15,type:"open",meta:"Tópico literario · 2 (García Lorca)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«Agua, ¿dónde vas? / Riendo voy por el río / a las orillas del mar.» Federico García Lorca.",
rubric:"Vita flumen: la vida es como un río que fluye hacia su destino inevitable (el mar = la muerte). El agua como símbolo del paso del tiempo y la vida que discurre hacia su fin. También puede relacionarse con el Ubi sunt o el Tempus fugit.",
modelSolution:"El texto relaciona el fluir del agua con el discurrir de la vida. El tópico es Vita flumen ('la vida es un río'): el agua 'ríe' mientras avanza hacia el mar, que simboliza la muerte o el destino inevitable. La imagen del río que 'va hacia las orillas del mar' representa el paso irreversible de la vida hacia su fin."},

{block:15,type:"open",meta:"Tópico literario · 3 (Gómez de la Serna)",

rubric:"Contemptus mundi: desprecio del mundo. El joven, por ver en la oscuridad, ha visto la verdad de la vida y la degradación de la humanidad, lo que lo ha convertido en un misántropo. El conocimiento de la realidad lleva al rechazo del mundo terrenal.",
modelSolution:"El texto desarrolla el tópico del Contemptus mundi ('desprecio del mundo'): el protagonista, al ver en la oscuridad, ha descubierto la verdad cruda de la humanidad y su degradación moral, lo que lo ha convertido en un misántropo. El conocimiento de 'lo cochina que es la humanidad' lleva al rechazo del mundo."},

{block:15,type:"open",meta:"Tópico literario · 4 (Laforet)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«Me marchaba ahora sin haber conocido nada de lo que confusamente esperaba: la vida en su plenitud, la alegría, el interés profundo, el amor.» Carmen Laforet.",
rubric:"Ubi sunt: reflexión sobre lo que no llegó a ser, la desaparición de las esperanzas y los sueños. La narradora lamenta no haber vivido lo que esperaba, igual que el tópico lamenta la desaparición de personas o cosas del pasado. También puede relacionarse con el Contemptus mundi.",
modelSolution:"El fragmento expresa la decepción ante una vida que no ha cumplido las expectativas. El tópico es Ubi sunt ('¿dónde están?'): la narradora llora la ausencia de aquello que esperaba vivir (la alegría, el amor, la plenitud), igual que el tópico lamenta la desaparición de lo que fue bello o valioso. Es el final de 'Nada' de Carmen Laforet."},

{block:15,type:"open",meta:"Tópico literario · 5 (Blasco Ibáñez)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«Desperezose la inmensa vega bajo el resplandor azulado del amanecer [...] Despertaba la huerta, y sus bostezos eran cada vez más ruidosos.» Vicente Blasco Ibáñez.",
rubric:"Locus amoenus: descripción idealizada de un lugar en la naturaleza, asociado a la tranquilidad y el placer. La huerta valenciana al amanecer se presenta como un espacio armonioso y placentero. La personificación de la naturaleza refuerza el carácter idílico del paisaje.",
modelSolution:"El texto describe un amanecer en la huerta valenciana como un lugar idílico y armonioso. El tópico es el Locus amoenus ('lugar ameno'): la naturaleza despierta de forma armoniosa, con ruiseñores, campanarios y la luz del alba, configurando un espacio placentero y tranquilizador. La personificación de la huerta ('sus bostezos') refuerza el carácter vivo e idílico del lugar."},

{block:15,type:"open",meta:"Tópico literario · 6 (Salinas)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«¿Dónde está mi vida, di? / ¿Tú sabes por dónde anda? / ¿Está alternando con pájaros / por las salas de los aires?» Pedro Salinas.",
rubric:"Ubi sunt: reflexión sobre la transitoriedad y la desaparición. El hablante busca su propia vida, que parece haberse perdido. Las preguntas sucesivas refuerzan la angustia ante la fugacidad de la existencia.",
modelSolution:"El poema expresa la búsqueda angustiosa de la propia vida, que el hablante siente perdida o inalcanzable. El tópico es el Ubi sunt ('¿dónde están?'): las preguntas sucesivas ('¿Dónde está mi vida?', '¿por dónde anda?') expresan la reflexión sobre la transitoriedad y la imposibilidad de aferrar la existencia."},

{block:15,type:"open",meta:"Tópico literario · 7 (Gil de Biedma)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«En un viejo país ineficiente, algo así como España entre dos guerras civiles, en un pueblo junto al mar, poseer una casa y poca hacienda y memoria ninguna. No leer, no sufrir, no escribir, no pagar cuentas, y vivir como un noble arruinado entre las ruinas de mi inteligencia.» Jaime Gil de Biedma.",
rubric:"Beatus ille: elogio de la vida sencilla y retirada, lejos de las complicaciones. El hablante aspira a una existencia simple: una casa, poca hacienda, sin obligaciones. La ironía de 'noble arruinado' y 'ruinas de mi inteligencia' añade un tono moderno y autoirónico al tópico clásico.",
modelSolution:"El poema desarrolla una versión irónica y moderna del tópico Beatus ille ('bienaventurado aquel que vive retirado'): el hablante aspira a una vida simple, sin lecturas, sufrimientos ni cuentas que pagar, en un pueblo junto al mar. La ironía de 'vivir como un noble arruinado entre las ruinas de mi inteligencia' añade distancia crítica al tópico clásico."},

{block:15,type:"open",meta:"Tópico literario · 8 (Böhl de Faber)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«Era pequeña, delgada y blanca como el alabastro. Su espesa y rubia cabellera ondeaba en tirabuzones a la inglesa. Sus ojos pardos y grandes, su nariz, sus dientes, su boca, el óvalo de su rostro, eran modelos de perfección.» Cecilia Böhl de Faber.",
rubric:"Descriptio puellae: descripción física idealizada de una joven siguiendo el canon de belleza clásico (cabellera rubia, ojos claros, piel blanca, rasgos perfectos). Cada elemento del retrato sigue el esquema fijo de la tradición literaria.",
modelSolution:"El fragmento describe la belleza idealizada de una joven siguiendo el canon clásico. El tópico es la Descriptio puellae ('descripción de la joven'): cabellera rubia, piel blanca como el alabastro, ojos grandes, rasgos de 'modelos de perfección'. Cada elemento sigue el esquema fijo de la tradición literaria que idealiza la belleza femenina."},

{block:15,type:"open",meta:"Tópico literario · 9 (Pereda)",

modelSolution:"El fragmento presenta una descripción idealizada del paisaje natural de Cantabria. El tópico es el Locus amoenus ('lugar ameno'): el narrador enumera los elementos que hacen del paisaje un espacio bello y armonioso (praderas verdes, montes, arboledas, luz), configurando un cuadro idílico de la naturaleza."},

{block:15,type:"open",meta:"Tópico literario · 10 (Luis Mateo Díez)",
prompt:"Identifica el tema del siguiente texto y relaciónalo con un tópico literario. Justifica tu respuesta.",
quote:"«Es el sueño precisamente quien mejor establece la costumbre de morir, un hábito que sostiene el imprescindible descanso diario que, cuando llegue la ocasión, enlazará con el descanso eterno.» Luis Mateo Díez.",
rubric:"Somnium imago mortis: el sueño como imagen o anticipo de la muerte. El texto establece explícitamente que el sueño diario nos acostumbra a morir y que el descanso nocturno enlaza con el descanso eterno (la muerte).",
modelSolution:"El texto desarrolla el tópico del Somnium imago mortis ('el sueño es imagen de la muerte'): el sueño diario se presenta como un 'ensayo' o costumbre de morir, y el descanso nocturno se vincula con el 'descanso eterno'. La idea de que dormir nos prepara para la muerte es un tópico clásico de la literatura occidental."},

modelSolution:"El poema desarrolla el tópico del Homo viator ('el hombre es un caminante'): aunque el hablante ha perdido el rumbo, el camino recorrido le ha permitido conocer la vida. El trayecto vital, aunque sin dirección fija, tiene valor en sí mismo como experiencia y aprendizaje."},
